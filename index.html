/* ---------- STATE ---------- */
const STATE = {
  unlocked: localStorage.getItem('promptdeed_unlocked') === '1',
  view: 'home',
  catId: null,
  promptId: null
};

/* ---------- OPENCLAW ---------- */
const OC = {
  getUrl() { return localStorage.getItem('oc_url') || 'http://localhost:11434'; },
  getModel() { return localStorage.getItem('oc_model') || ''; },
  save(url, model) {
    localStorage.setItem('oc_url', (url || 'http://localhost:11434').replace(/\/$/, ''));
    localStorage.setItem('oc_model', model || '');
  },
  async listModels(url) {
    const r = await fetch(`${url}/api/tags`, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    return (j.models || []).map(m => m.name);
  },
  async generate(url, model, systemText, userText, onChunk, signal) {
    const r = await fetch(`${url}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, system: systemText, prompt: userText, stream: true }),
      signal
    });
    if (!r.ok) {
      const msg = await r.text().catch(() => '');
      throw new Error(`Ollama ${r.status}${msg ? ': ' + msg.slice(0, 200) : ''}`);
    }
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        try { const obj = JSON.parse(line); if (obj.response) onChunk(obj.response); } catch {}
      }
    }
  }
};

/* ---------- HELPERS ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const root = $('#root');
const modal = $('#modal');

function showModal(title, body) {
  $('#modal-title').textContent = title;
  $('#modal-body').textContent = body;
  modal.classList.add('show');
}
$('#modal-ok').addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

function isLocked(promptIdx) {
  // first 5 prompts (by global ID 1-5) are free; rest locked unless unlocked
  return !STATE.unlocked && promptIdx > DATA.free_prompt_count;
}

function copyToClipboard(text, btn) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  if (btn) {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- VIEWS ---------- */
function renderHome() {
  STATE.view = 'home'; STATE.catId = null; STATE.promptId = null;
  const intro = `
    <p class="section-title">Browse Categories</p>
    <div class="unlock-state">
      ${STATE.unlocked
        ? '<strong>Unlocked.</strong> All 50 prompts available.'
        : `<strong>Free preview.</strong> First ${DATA.free_prompt_count} prompts unlocked. Enter your code in Settings to unlock all 50.`}
    </div>
  `;
  const cards = DATA.categories.map((c) => {
    const promptCount = DATA.prompts.filter((p) => p.category_id === c.id).length;
    return `
      <div class="card" data-cat="${c.id}">
        <h3>${escapeHtml(c.name)}</h3>
        <p>${escapeHtml(c.description)}</p>
        <div class="meta">${promptCount} prompts</div>
      </div>
    `;
  }).join('');
  root.innerHTML = intro + '<div class="cards">' + cards + '</div>';
  root.querySelectorAll('.card').forEach((el) => {
    el.addEventListener('click', () => renderCategory(parseInt(el.dataset.cat, 10)));
  });
}

function renderCategory(catId) {
  STATE.view = 'category'; STATE.catId = catId;
  const cat = DATA.categories.find((c) => c.id === catId);
  const items = DATA.prompts.filter((p) => p.category_id === catId);
  const list = items.map((p) => {
    const locked = isLocked(p.id);
    return `
      <div class="prompt-item ${locked ? 'locked' : ''}" data-pid="${p.id}">
        <div class="pi-title">${escapeHtml(p.title)}</div>
        <div class="pi-num">#${p.id}</div>
      </div>
    `;
  }).join('');
  root.innerHTML = `
    <button class="back" id="back-home">â All Categories</button>
    <p class="section-title">${escapeHtml(cat.name)}</p>
    <div class="prompt-list">${list}</div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  root.querySelectorAll('.prompt-item').forEach((el) => {
    el.addEventListener('click', () => renderPrompt(parseInt(el.dataset.pid, 10)));
  });
}

function renderPrompt(pid) {
  STATE.view = 'prompt'; STATE.promptId = pid;
  const p = DATA.prompts.find((x) => x.id === pid);
  const cat = DATA.categories.find((c) => c.id === p.category_id);
  if (isLocked(p.id)) {
    root.innerHTML = `
      <button class="back" id="back-cat">â ${escapeHtml(cat.name)}</button>
      <div class="prompt-block">
        <div class="pb-cat">${escapeHtml(cat.name)}</div>
        <h2>${escapeHtml(p.title)}</h2>
      </div>
      <div class="locked-banner">
        <h3>Locked Prompt</h3>
        <p>This prompt unlocks with your Promptdeed access code.</p>
        <button id="go-settings">Enter Unlock Code</button>
      </div>
    `;
    $('#back-cat').addEventListener('click', () => renderCategory(cat.id));
    $('#go-settings').addEventListener('click', renderSettings);
    return;
  }
  root.innerHTML = `
    <button class="back" id="back-cat">â ${escapeHtml(cat.name)}</button>
    <div class="prompt-block">
      <div class="pb-cat">${escapeHtml(cat.name)} Â· #${p.id}</div>
      <h2>${escapeHtml(p.title)}</h2>
      <div class="pb-section-label">Prompt</div>
      <pre id="prompt-text"></pre>
      <button class="copy-btn" id="copy-prompt">Copy Prompt to Clipboard</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Input</div>
      <pre id="ex-in"></pre>
      <button class="copy-btn" id="copy-input" style="background:#B8743D">Copy Example Input</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Output</div>
      <pre id="ex-out"></pre>
    </div>
    <div class="prompt-block" id="oc-panel">
      <div class="pb-cat" style="display:flex;align-items:center;gap:6px">OpenClaw<span class="oc-badge">LOCAL AI</span></div>
      <p style="margin:6px 0 10px;font-size:13px;color:#6B7280">Edit the prompt and inputs below, then run against your local Ollama model. Requires Ollama running at the configured endpoint.</p>
      <div class="pb-section-label">Editable Prompt</div>
      <textarea class="oc-textarea" id="oc-prompt-ta" rows="8"></textarea>
      <div class="pb-section-label">Your Input</div>
      <textarea class="oc-textarea" id="oc-input-ta" rows="5"></textarea>
      <button class="oc-run-btn" id="oc-run"></button>
      <pre class="oc-response" id="oc-out"></pre>
      <div class="oc-note" id="oc-err"></div>
    </div>
  `;
  $('#prompt-text').textContent = p.text;
  $('#ex-in').textContent = p.input;
  $('#ex-out').textContent = p.output;
  $('#oc-prompt-ta').value = p.text;
  $('#oc-input-ta').value = p.input;
  const ocModel = OC.getModel();
  const ocRunBtn = $('#oc-run');
  ocRunBtn.textContent = ocModel ? '▶ Run with Ollama (' + ocModel + ')' : '⚙ Configure Ollama in Settings first';
  if (!ocModel) ocRunBtn.disabled = true;
  $('#back-cat').addEventListener('click', () => renderCategory(cat.id));
  $('#copy-prompt').addEventListener('click', (e) => copyToClipboard(p.text, e.currentTarget));
  $('#copy-input').addEventListener('click', (e) => copyToClipboard(p.input, e.currentTarget));
  let _ocAbort = null;
  ocRunBtn.addEventListener('click', async () => {
    const model = OC.getModel();
    if (!model) { showModal('OpenClaw', 'No model configured. Go to Settings → OpenClaw to set your Ollama endpoint and model.'); return; }
    const url = OC.getUrl();
    const out = $('#oc-out');
    const errEl = $('#oc-err');
    const btn = $('#oc-run');
    if (_ocAbort) { _ocAbort.abort(); _ocAbort = null; }
    _ocAbort = new AbortController();
    btn.disabled = true;
    btn.textContent = '⏳ Generating…';
    out.textContent = '';
    out.classList.add('active');
    errEl.textContent = '';
    try {
      await OC.generate(url, model, $('#oc-prompt-ta').value, $('#oc-input-ta').value, (c) => { out.textContent += c; }, _ocAbort.signal);
      btn.textContent = '✓ Done — Run Again (' + model + ')';
    } catch (e) {
      if (e.name !== 'AbortError') {
        errEl.textContent = 'Error: ' + e.message + '. Is Ollama running? If you see a CORS error, try: OLLAMA_ORIGINS=* ollama serve';
      }
      btn.textContent = '▶ Run with Ollama (' + model + ')';
    }
    btn.disabled = false;
    _ocAbort = null;
  });
}

function renderSettings() {
  STATE.view = 'settings';
  root.innerHTML = `
    <button class="back" id="back-home">â Home</button>
    <p class="section-title">Settings</p>
    <div class="prompt-block">
      <div class="settings-row">
        <label for="code">Unlock Code</label>
        <input class="input" id="code" type="text" placeholder="PROMPTDEED-XXXXXX-XXXX" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <div class="help">Enter the access code you received with your purchase to unlock all 50 prompts.</div>
        <button class="btn-primary" id="apply-code">Apply Code</button>
        <div class="status" id="code-status"></div>
      </div>
      <div class="unlock-state">
        Status: <strong>${STATE.unlocked ? 'Unlocked â all 50 prompts available' : `Free preview (first ${DATA.free_prompt_count} prompts)`}</strong>
      </div>
      ${STATE.unlocked ? '<button class="btn-primary" id="reset-unlock" style="background:#8B2A1A">Reset to Free Preview</button>' : ''}
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">OpenClaw — Local AI via Ollama</div>
      <p style="margin:4px 0 12px;font-size:13px;color:#6B7280">Connect to a locally-running Ollama instance to run any prompt against a local LLM model directly in the app.</p>
      <div class="settings-row">
        <label for="oc-url-in">Ollama Endpoint</label>
        <input class="input" id="oc-url-in" type="url" placeholder="http://localhost:11434" value="${escapeHtml(OC.getUrl())}">
        <div class="help">Default: http://localhost:11434. If you see CORS errors, start Ollama with: OLLAMA_ORIGINS=* ollama serve</div>
      </div>
      <div class="settings-row">
        <label for="oc-model-in">Model</label>
        <input class="input" id="oc-model-in" type="text" placeholder="llama3.2, mistral, phi3…" value="${escapeHtml(OC.getModel())}">
        <select class="input" id="oc-model-sel" style="display:none;margin-top:8px"></select>
        <div class="help">Enter an Ollama model name, or click Load Models to fetch installed models.</div>
      </div>
      <button class="btn-primary" id="oc-load">Load Models</button>
      <button class="btn-primary" id="oc-save" style="background:#2F7D5C;margin-left:8px">Save Settings</button>
      <div class="status" id="oc-status"></div>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">About Promptdeed</div>
      <p style="margin:6px 0 0;font-size:14px">${escapeHtml(DATA.brand.subheadline)}</p>
      <p style="margin:10px 0 0;font-size:13px;color:#6B7280">Version 1.0.0 Â· ${DATA.prompts.length} prompts Â· ${DATA.categories.length} categories</p>
    </div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  const apply = () => {
    const v = $('#code').value.trim().toUpperCase();
    const status = $('#code-status');
    if (v === DATA.unlock_code) {
      localStorage.setItem('promptdeed_unlocked', '1');
      STATE.unlocked = true;
      status.className = 'status ok';
      status.textContent = 'Unlocked! All 50 prompts are now available.';
      setTimeout(renderSettings, 900);
    } else {
      status.className = 'status err';
      status.textContent = 'Invalid code. Check your purchase email or contact support.';
    }
  };
  $('#apply-code').addEventListener('click', apply);
  $('#code').addEventListener('keydown', (e) => { if (e.key === 'Enter') apply(); });
  const reset = $('#reset-unlock');
  if (reset) reset.addEventListener('click', () => {
    localStorage.removeItem('promptdeed_unlocked');
    STATE.unlocked = false;
    renderSettings();
  });
  const ocStatus = $('#oc-status');
  $('#oc-load').addEventListener('click', async () => {
    const url = ($('#oc-url-in').value.trim().replace(/\/$/, '')) || OC.getUrl();
    ocStatus.style.display = 'block';
    ocStatus.className = 'status';
    ocStatus.textContent = 'Connecting to Ollama…';
    try {
      const models = await OC.listModels(url);
      if (models.length === 0) {
        ocStatus.className = 'status err';
        ocStatus.textContent = 'Connected but no models installed. Run: ollama pull llama3.2';
      } else {
        const sel = $('#oc-model-sel');
        const cur = $('#oc-model-in').value || OC.getModel();
        sel.innerHTML = models.map(m => `<option value="${escapeHtml(m)}"${m === cur ? ' selected' : ''}>${escapeHtml(m)}</option>`).join('');
        sel.style.display = 'block';
        sel.addEventListener('change', () => { $('#oc-model-in').value = sel.value; });
        if (!$('#oc-model-in').value) $('#oc-model-in').value = models[0];
        ocStatus.className = 'status ok';
        ocStatus.textContent = `Connected — ${models.length} model${models.length !== 1 ? 's' : ''} found.`;
      }
    } catch (e) {
      ocStatus.className = 'status err';
      ocStatus.textContent = 'Cannot reach Ollama. Is it running? ' + e.message;
    }
  });
  $('#oc-save').addEventListener('click', () => {
    const url = $('#oc-url-in').value.trim() || 'http://localhost:11434';
    const model = $('#oc-model-in').value.trim();
    OC.save(url, model);
    ocStatus.className = 'status ok';
    ocStatus.style.display = 'block';
    ocStatus.textContent = 'OpenClaw settings saved' + (model ? ' — model: ' + model : '') + '.';
  });
}

/* ---------- WIRE ---------- */
$('#brand-home').addEventListener('click', renderHome);
$('#settings-btn').addEventListener('click', renderSettings);

renderHome();

/* ---------- SERVICE WORKER ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
