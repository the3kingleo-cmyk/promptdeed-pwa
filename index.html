*,*::before,*::after{box-sizing:border-box}

.tagline{font-size:13px;color:#C8CDD7;margin:4px 0 0;max-width:780px;margin-left:auto;margin-right:auto}
nav button{background:transparent;color:#FAF7F2;border:1px solid #3a4769;padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}

.container{max-width:780px;margin:0 auto;padding:20px}
.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#6B7280;margin:0 0 12px;font-weight:600}
.cards{display:grid;grid-template-columns:1fr;gap:10px}

.card{background:#fff;border:1px solid #E6E1D9;border-radius:10px;padding:16px;cursor:pointer;transition:transform .08s ease,box-shadow .08s ease,border-color .08s ease}

.card .meta{margin-top:10px;font-size:12px;color:#B8743D;font-weight:600}

.prompt-item:hover{border-color:#B8743D}
.prompt-item .pi-title{font-weight:600;font-size:15px}

turns, no language that could be construed as steering.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[KEY FEATURES] (comma-separated)\n[NEIGHBORHOOD]\n[UNIQUE SELLING POINTS]\n[COMPARABLE CONTEXT]\n[TARGET BUYER]\n[TONE] (e.g. aspirational, editorial, sophisticated)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Lead with a magnetic opening sentence that paints a lifestyle picture.\n- Body in 2–4 short paragraphs (no bullet lists). Weave in 3–5 of the strongest features naturally — don't list every input.\n- Close with a paragraph that anchors location and a soft call-to-tour.\n- Stay within ±10% of [WORD COUNT].\n- Avoid: \"must see,\" \"won't last,\" \"motivated seller,\" any reference to protected classes, any school-quality claim.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 4821 Harborview Lane, Newport Beach, CA\n[LIST PRICE]: $3,250,000\n[BEDROOMS]: 5\n[BATHROOMS]: 4 full, 1 half\n[SQUARE FEET]: 4,850\n[LOT SIZE]: 0.38 acres\n[YEAR BUILT]: 2019\n[KEY FEATURES]: chef's kitchen with Sub-Zero and Wolf appliances, primary suite with ocean-view balcony, temperature-controlled wine cellar, resort-style pool and spa, 4-car garage, whole-home Lutron smart lighting, solar panels\n[NEIGHBORHOOD]: Newport Beach, steps from Back Bay Nature Preserve\n[UNIQUE SELLING POINTS]: unobstructed Catalina Island views, no HOA, corner lot with maximum privacy\n[COMPARABLE CONTEXT]: similar homes sold $3.1M–$3.5M in past 6 months\n[TARGET BUYER]: affluent move-up buyer or second-home buyer seeking coastal California lifestyle\n[TONE]: aspirational, editorial, sophisticated — think Architectural Digest\n[WORD COUNT]: 280","output":"Rarely does a residence so effortlessly merge architectural precision with the boundless spirit of the California coast. Set on a private corner lot in one of Newport Beach's most coveted enclaves, 4821 Harborview Lane is a 2019-built masterwork where every detail has been curated for those who refuse to compromise.\n\nFive bedrooms and four-and-a-half baths unfold across 4,850 square feet of light-drenched living space, anchored by a chef's kitchen outfitted with Sub-Zero refrigeration and Wolf professional appliances. Entertain without limitation — a temperature-controlled wine cellar awaits your collection while the resort-style pool and spa transform the 0.38-acre grounds into a private retreat.\n\nAscend to the primary suite and step onto your private balcony where unobstructed views of Catalina Island greet each morning. Whole-home Lutron smart lighting, owned solar panels, and a 4-car garage ensure every modern convenience is accounted for — without the constraints of an HOA.\n\nSteps from the Back Bay Nature Preserve and minutes from Newport Beach's most celebrated dining and coastline, this is more than a home — it's a deed to the coastal California lifestyle most can only imagine. Schedule your private tour today."},{"id":2,"category_id":1,"idx":2,"title":"Entry-Level Home Description for First-Time Buyers","text":"This prompt is on the way.\n\nThe full write-up — a ready-to-use prompt template, example inputs, and a worked example — is being finished and will appear in a future update. For a complete example of the format every prompt follows, see Prompt #1 (\"Luxury Listing Description\").","input":"Example inputs are coming in a future update.","output":"A worked example is coming in a future update."},{"id":3,"category_id":1,"idx":3,"title":"Fixer-Upper / Investor Listing Description","text":"This prompt is on the way.\n\nThe full write-up — a ready-to-use prompt template, example inputs, and a worked example — is being finished and will appear in a future update. For a complete example of the format every prompt follows, see Prompt #1 (\"Luxury Listing Description\").","input":"Example inputs are coming in a future update.","output":"A worked example is coming in a future update."},{"id":4,"categor /* ---------- SAFE STORAGE (guards iOS private mode / disabled storage) ---------- */
const store = {
  get(k){ try { return window.localStorage ? localStorage.getItem(k) : null; } catch (e) { return null; } },
  set(k, v){ try { localStorage.setItem(k, v); return true; } catch (e) { return false; } },
  remove(k){ try { localStorage.removeItem(k); } catch (e) {} }
};
const LOCK_KEY = 'promptdeed_lock_hash';

/* ---------- STATE ---------- */
const STATE = {
  view: 'home',
  catId: null,
  promptId: null,
  appUnlocked: false   // session flag for the OPTIONAL password lock
};

/* ---------- HELPERS ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const root = $('#root');
const modal = $('#modal');

function showModal(title, body) {
  $('#modal-title').textContent = title;
  $('#modal-body').textContent = body;
  modal.classList.add('show');
}
$('#modal-ok').addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

function copyToClipboard(text, btn) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  if (btn) {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- OPTIONAL PASSWORD LOCK ---------- */
/* The app is FREE and fully open. A password is purely optional, per-device privacy.
   It can always be changed or removed, so a user can never be locked out of their prompts. */
async function hashPassword(pw) {
  try {
    if (window.crypto && crypto.subtle && crypto.subtle.digest) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return 'sha256:' + Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
    }
  } catch (e) {}
  // Fallback hash for non-secure contexts (soft lock only)
  let h = 5381;
  for (let i = 0; i < pw.length; i++) { h = (((h << 5) + h) ^ pw.charCodeAt(i)) >>> 0; }
  return 'fb:' + h.toString(16);
}
function hasPassword() { return !!store.get(LOCK_KEY); }

/* Route through the lock screen only if a password is set and not yet entered this session. */
function gate(fn) {
  if (hasPassword() && !STATE.appUnlocked) { renderLock(); return; }
  fn();
}

function renderLock() {
  STATE.view = 'lock';
  root.innerHTML = `
    <div class="locked-banner" style="max-width:420px;margin:40px auto;text-align:left">
      <h3 style="text-align:center">Enter your password</h3>
      <p style="text-align:center">This app is password-protected on this device.</p>
      <input class="input" id="lock-input" type="password" placeholder="Password" autocomplete="current-password" style="margin-bottom:10px">
      <button class="btn-primary" id="lock-go" style="width:100%;margin-top:0">Unlock</button>
      <div class="status" id="lock-status"></div>
      <button class="back" id="lock-forgot" style="width:100%;text-align:center;color:#C8CDD7;margin-top:14px;padding-bottom:0">Forgot password? Remove lock</button>
    </div>
  `;
  const tryUnlock = async () => {
    const status = $('#lock-status');
    const stored = store.get(LOCK_KEY);
    const hash = await hashPassword($('#lock-input').value);
    if (stored && hash === stored) {
      STATE.appUnlocked = true;
      renderHome();
    } else {
      status.className = 'status err';
      status.textContent = 'Incorrect password. Try again, or remove the lock below.';
    }
  };
  $('#lock-go').addEventListener('click', tryUnlock);
  $('#lock-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  $('#lock-input').focus();
  let armed = false;
  $('#lock-forgot').addEventListener('click', () => {
    if (!armed) {
      armed = true;
      $('#lock-forgot').textContent = 'Tap again to confirm — this removes the password';
      return;
    }
    store.remove(LOCK_KEY);
    STATE.appUnlocked = true;
    renderHome();
  });
}

/* ---------- VIEWS ---------- */
function renderHome() {
  STATE.view = 'home'; STATE.catId = null; STATE.promptId = null;
  const cards = DATA.categories.map((c) => {
    const promptCount = DATA.prompts.filter((p) => p.category_id === c.id).length;
    return `
      <div class="card" data-cat="${c.id}">
        <h3>${escapeHtml(c.name)}</h3>
        <p>${escapeHtml(c.description)}</p>
        <div class="meta">${promptCount} prompts</div>
      </div>
    `;
  }).join('');
  root.innerHTML = '<p class="section-title">Browse Categories</p><div class="cards">' + cards + '</div>';
  root.querySelectorAll('.card').forEach((el) => {
    el.addEventListener('click', () => renderCategory(parseInt(el.dataset.cat, 10)));
  });
}

function renderCategory(catId) {
  STATE.view = 'category'; STATE.catId = catId;
  const cat = DATA.categories.find((c) => c.id === catId);
  const items = DATA.prompts.filter((p) => p.category_id === catId);
  const list = items.map((p) => `
      <div class="prompt-item" data-pid="${p.id}">
        <div class="pi-title">${escapeHtml(p.title)}</div>
        <div class="pi-num">#${p.id}</div>
      </div>
    `).join('');
  root.innerHTML = `
    <button class="back" id="back-home">← All Categories</button>
    <p class="section-title">${escapeHtml(cat.name)}</p>
    <div class="prompt-list">${list}</div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  root.querySelectorAll('.prompt-item').forEach((el) => {
    el.addEventListener('click', () => renderPrompt(parseInt(el.dataset.pid, 10)));
  });
}

function renderPrompt(pid) {
  STATE.view = 'prompt'; STATE.promptId = pid;
  const p = DATA.prompts.find((x) => x.id === pid);
  const cat = DATA.categories.find((c) => c.id === p.category_id);
  root.innerHTML = `
    <button class="back" id="back-cat">← ${escapeHtml(cat.name)}</button>
    <div class="prompt-block">
      <div class="pb-cat">${escapeHtml(cat.name)} · #${p.id}</div>
      <h2>${escapeHtml(p.title)}</h2>
      <div class="pb-section-label">Prompt</div>
      <pre id="prompt-text"></pre>
      <button class="copy-btn" id="copy-prompt">Copy Prompt to Clipboard</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Input</div>
      <pre id="ex-in"></pre>
      <button class="copy-btn" id="copy-input" style="background:#B8743D">Copy Example Input</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Output</div>
      <pre id="ex-out"></pre>
    </div>
  `;
  $('#prompt-text').textContent = p.text;
  $('#ex-in').textContent = p.input;
  $('#ex-out').textContent = p.output;
  $('#back-cat').addEventListener('click', () => renderCategory(cat.id));
  $('#copy-prompt').addEventListener('click', (e) => copyToClipboard(p.text, e.currentTarget));
  $('#copy-input').addEventListener('click', (e) => copyToClipboard(p.input, e.currentTarget));
}

function renderSettings() {
  STATE.view = 'settings';
  const locked = hasPassword();
  const lockBlock = locked ? `
        <p style="margin:6px 0 0;font-size:14px">App lock is <strong>on</strong>. You're asked for a password when you open the app on this device.</p>
        <div class="settings-row" style="margin-top:14px">
          <label for="newpw">Change password</label>
          <input class="input" id="newpw" type="password" placeholder="New password" autocomplete="new-password">
          <input class="input" id="newpw2" type="password" placeholder="Confirm new password" autocomplete="new-password" style="margin-top:8px">
          <button class="btn-primary" id="save-pw">Update password</button>
        </div>
        <button class="btn-primary" id="remove-pw" style="background:#8B2A1A">Remove password</button>
        <div class="status" id="pw-status"></div>
  ` : `
        <p style="margin:6px 0 0;font-size:14px">Optional. Add a password and the app will ask for it when it opens on this device. You can change or remove it anytime — your prompts are never locked away.</p>
        <div class="settings-row" style="margin-top:14px">
          <label for="newpw">Set a password</label>
          <input class="input" id="newpw" type="password" placeholder="Choose a password" autocomplete="new-password">
          <input class="input" id="newpw2" type="password" placeholder="Confirm password" autocomplete="new-password" style="margin-top:8px">
          <button class="btn-primary" id="save-pw">Enable password lock</button>
        </div>
        <div class="status" id="pw-status"></div>
  `;
  root.innerHTML = `
    <button class="back" id="back-home">← Home</button>
    <p class="section-title">Settings</p>
    <div class="prompt-block">
      <div class="pb-section-label">App Password (optional)</div>
      ${lockBlock}
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">About Promptdeed</div>
      <p style="margin:6px 0 0;font-size:14px">${escapeHtml(DATA.brand.subheadline)}</p>
      <p style="margin:10px 0 0;font-size:13px;color:#6B7280">Version 1.1.0 · ${DATA.prompts.length} prompts · ${DATA.categories.length} categories · all unlocked</p>
    </div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  const savePw = async () => {
    const a = $('#newpw').value, b = $('#newpw2').value;
    const st = $('#pw-status');
    if (!a) { st.className = 'status err'; st.textContent = 'Enter a password first.'; return; }
    if (a !== b) { st.className = 'status err'; st.textContent = "The two passwords don't match."; return; }
    const hash = await hashPassword(a);
    if (!store.set(LOCK_KEY, hash)) {
      st.className = 'status err';
      st.textContent = "This browser is blocking storage, so a password can't be saved on this device.";
      return;
    }
    STATE.appUnlocked = true;
    st.className = 'status ok';
    st.textContent = 'Password saved.';
    setTimeout(renderSettings, 800);
  };
  const sb = $('#save-pw'); if (sb) sb.addEventListener('click', savePw);
  const rb = $('#remove-pw');
  if (rb) rb.addEventListener('click', () => {
    store.remove(LOCK_KEY);
    const st = $('#pw-status');
    st.className = 'status ok';
    st.textContent = 'Password removed.';
    setTimeout(renderSettings, 600);
  });
}

/* ---------- WIRE ---------- */
$('#brand-home').addEventListener('click', () => gate(renderHome));
$('#settings-btn').addEventListener('click', () => gate(renderSettings));

/* ---------- INIT ---------- */
if (hasPassword() && !STATE.appUnlocked) { renderLock(); } else { renderHome(); }

/* ---------- SERVICE WORKER ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
