<script>
/* ---------- DATA ---------- */
const DATA = {"brand":{"name":"Promptdeed","tagline":"Your deed to done-for-you copy.","headline":"Stop Getting Generic Output. Start Getting Copy That Closes.","subheadline":"For busy residential agents, Promptdeed turns ChatGPT and Claude into a copywriter who actually knows real estate.","voice":"Direct, Practical, Agent-fluent","audience":"US residential real estate agents"},"categories":[{"id":1,"name":"Listing Descriptions & Property Marketing","description":"Write compelling MLS and marketing copy for listings","order":1},{"id":2,"name":"Social Media Content (Instagram, Facebook, TikTok)","description":"Engaging captions, reels scripts, and post hooks","order":2},{"id":3,"name":"Lead Follow-Up & Nurture Emails","description":"Email sequences that convert leads into clients","order":3},{"id":4,"name":"FSBO & Expired Listing Scripts","description":"Conversion scripts for hard-to-win seller leads","order":4},{"id":5,"name":"Buyer Consultation & Discovery","description":"Questions and frameworks for buyer meetings","order":5},{"id":6,"name":"Seller Listing Presentations","description":"Win listings with confidence","order":6},{"id":7,"name":"Open House Marketing & Scripts","description":"Drive traffic and convert open house visitors","order":7},{"id":8,"name":"Market Reports & Neighborhood Guides","description":"Position yourself as the local expert","order":8},{"id":9,"name":"Negotiation, Offers & Closing Communication","description":"Communicate clearly through the deal","order":9},{"id":10,"name":"Personal Branding, Bio & Video Scripts","description":"Build your brand and on-camera presence","order":10}],"prompts":[{"id":1,"category_id":1,"idx":1,"title":"Luxury Listing Description (MLS-Optimized)","text":"You are an expert real estate copywriter who writes for luxury and high-end residential listings.\n\nYour job: write an MLS listing description that is both editorially compelling AND MLS-compliant — no fair-housing violations, no exaggerated claims about returns, no language that could be construed as steering.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[KEY FEATURES] (comma-separated)\n[NEIGHBORHOOD]\n[UNIQUE SELLING POINTS]\n[COMPARABLE CONTEXT]\n[TARGET BUYER]\n[TONE] (e.g. aspirational, editorial, sophisticated)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Lead with a magnetic opening sentence that paints a lifestyle picture.\n- Body in 2–4 short paragraphs (no bullet lists). Weave in 3–5 of the strongest features naturally — don't list every input.\n- Close with a paragraph that anchors location and a soft call-to-tour.\n- Stay within Â±10% of [WORD COUNT].\n- Avoid: \"must see,\" \"won't last,\" \"motivated seller,\" any reference to protected classes, any school-quality claim.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 4821 Harborview Lane, Newport Beach, CA\n[LIST PRICE]: $3,250,000\n[BEDROOMS]: 5\n[BATHROOMS]: 4 full, 1 half\n[SQUARE FEET]: 4,850\n[LOT SIZE]: 0.38 acres\n[YEAR BUILT]: 2019\n[KEY FEATURES]: chef's kitchen with Sub-Zero and Wolf appliances, primary suite with ocean-view balcony, temperature-controlled wine cellar, resort-style pool and spa, 4-car garage, whole-home Lutron smart lighting, solar panels\n[NEIGHBORHOOD]: Newport Beach, steps from Back Bay Nature Preserve\n[UNIQUE SELLING POINTS]: unobstructed Catalina Island views, no HOA, corner lot with maximum privacy\n[COMPARABLE CONTEXT]: similar homes sold $3.1M–$3.5M in past 6 months\n[TARGET BUYER]: affluent move-up buyer or second-home buyer seeking coastal California lifestyle\n[TONE]: aspirational, editorial, sophisticated — think Architectural Digest\n[WORD COUNT]: 280","output":"Rarely does a residence so effortlessly merge architectural precision with the boundless spirit of the California coast. Set on a private corner lot in one of Newport Beach's most coveted enclaves, 4821 Harborview Lane is a 2019-built masterwork where every detail has been curated for those who refuse to compromise.\n\nFive bedrooms and four-and-a-half baths unfold across 4,850 square feet of light-drenched living space, anchored by a chef's kitchen outfitted with Sub-Zero refrigeration and Wolf professional appliances. Entertain without limitation — a temperature-controlled wine cellar awaits your collection while the resort-style pool and spa transform the 0.38-acre grounds into a private retreat.\n\nAscend to the primary suite and step onto your private balcony where unobstructed views of Catalina Island greet each morning. Whole-home Lutron smart lighting, owned solar panels, and a 4-car garage ensure every modern convenience is accounted for — without the constraints of an HOA.\n\nSteps from the Back Bay Nature Preserve and minutes from Newport Beach's most celebrated dining and coastline, this is more than a home — it's a deed to the coastal California lifestyle most can only imagine. Schedule your private tour today."},{"id":2,"category_id":1,"idx":2,"title":"Entry-Level Home Description for First-Time Buyers","text":"You are an expert real estate copywriter specializing in entry-level and starter-home MLS descriptions for the US residential market.\n\nYour job: write an MLS listing description that is warm, honest, and aspirational without overselling. The goal is to speak directly to a first-time buyer's emotional drivers -- pride of ownership, community, and the achievability of the dream -- while staying MLS-compliant (no fair-housing violations, no school-quality claims, no guarantees about appreciation or returns).\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[KEY FEATURES] (comma-separated)\n[ATTACHED GARAGE] (yes/no, spaces)\n[YARD DESCRIPTION]\n[NEIGHBORHOOD]\n[PROXIMITY TO AMENITIES]\n[TARGET BUYER]\n[TONE] (e.g. warm and encouraging, friendly and grounded)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Open with a sentence that captures the feeling of first ownership without being cliche.\n- Write 2-3 short paragraphs in flowing prose (no bullet lists). Highlight 3-4 key features naturally woven into the copy.\n- Close with a brief line anchoring the neighborhood and inviting a showing.\n- Stay within +-10% of [WORD COUNT].\n- Avoid: \"starter home,\" \"cozy\" (overused), \"won't last,\" \"must see,\" any reference to protected classes, school district rankings, or investment return claims.\n- Tone should feel encouraging and real, not hype-driven.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 214 Elmcrest Drive, Murfreesboro, TN\n[LIST PRICE]: $349,900\n[BEDROOMS]: 3\n[BATHROOMS]: 2 full\n[SQUARE FEET]: 1,480\n[KEY FEATURES]: updated kitchen with granite counters and stainless appliances, LVP flooring throughout main level, covered back porch, walk-in closet in primary bedroom, new HVAC (2023), fresh interior paint\n[ATTACHED GARAGE]: 2-car attached garage\n[YARD DESCRIPTION]: fully fenced backyard, established shade trees\n[NEIGHBORHOOD]: Elmcrest Crossing, quiet residential street with sidewalks\n[PROXIMITY TO AMENITIES]: 5 minutes to Kroger and Target, 12 minutes to downtown Murfreesboro, easy I-24 access\n[TARGET BUYER]: first-time buyer, young couple or small family, budget-conscious but quality-focused\n[TONE]: warm, grounded, encouraging -- like a knowledgeable friend, not a salesperson\n[WORD COUNT]: 210","output":"Some houses hand you a blank canvas and a fresh set of keys -- and that is exactly what 214 Elmcrest Drive is waiting to do. Set on a quiet, sidewalk-lined street in Elmcrest Crossing, this 3-bedroom, 2-bath home delivers the features that matter most without the price tag that keeps so many buyers on the sidelines.\n\nInside, updated LVP flooring flows through the main level and a refreshed kitchen greets you with granite counters, stainless appliances, and the kind of counter space that actually makes cooking enjoyable. The primary bedroom offers a genuine walk-in closet, and a new HVAC system installed in 2023 means one less thing to think about.\n\nStep outside to a fully fenced backyard shaded by mature trees -- room for a garden, a dog, a patio set, or all three. The covered back porch makes it easy to enjoy evenings year-round. Two-car garage, fresh paint throughout, and five minutes to everyday essentials round out a home that is genuinely move-in ready.\n\nElmcrest Crossing puts you 12 minutes from downtown Murfreesboro with easy interstate access. Schedule a showing and see why this one feels like home the moment you walk in."},{"id":3,"category_id":1,"idx":3,"title":"Fixer-Upper / Investor Listing Description","text":"You are an expert real estate copywriter who specializes in writing honest, opportunity-framing MLS descriptions for distressed, cosmetically dated, or investor-grade properties.\n\nYour job: write MLS copy that clearly signals opportunity without misrepresenting condition, fabricating ARV promises, or making claims that could expose the seller or agent to liability. The tone should be matter-of-fact and value-focused -- this is a deal, and serious buyers know what to do with it.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE]\n[CONDITION LEVEL] (cosmetic / cosmetic+mechanical / structural -- be specific)\n[KNOWN ISSUES] (disclose honestly)\n[STRONG BONES / RETAINED FEATURES] (what is actually good about the property)\n[ARV ESTIMATE] (optional -- if provided, frame as market context, not a guarantee)\n[TARGET BUYER] (investor, DIY homeowner, developer)\n[SOLD AS-IS] (yes/no)\n[NEIGHBORHOOD CONTEXT]\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Open with a line that frames the opportunity without hype (no \"diamond in the rough,\" no \"hidden gem\").\n- Write 2-3 prose paragraphs. Acknowledge condition honestly in one sentence, then pivot to what is solid and what the comps support.\n- If [ARV ESTIMATE] is provided, reference it as \"comparable renovated homes\" -- never as a guarantee.\n- Close with a clear, direct call to act (showing, inspection, offers as-is).\n- Avoid: fabricated ARV guarantees, minimizing known structural issues, fair-housing violations, \"won't last.\"\n- Sold-as-is language must appear if [SOLD AS-IS] = yes.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 883 Wakefield Avenue, Memphis, TN\n[LIST PRICE]: $119,000\n[BEDROOMS]: 3\n[BATHROOMS]: 1 full, 1 half\n[SQUARE FEET]: 1,620\n[LOT SIZE]: 0.22 acres\n[CONDITION LEVEL]: cosmetic + some mechanical -- dated kitchen and baths, original windows, HVAC functional but aging (2008), roof replaced 2018\n[KNOWN ISSUES]: needs full kitchen and bath update, original single-pane windows, no central AC in rear addition\n[STRONG BONES / RETAINED FEATURES]: solid brick construction, original hardwood floors under carpet, 2018 roof, full basement, 2-car detached garage, 9-ft ceilings on main level\n[ARV ESTIMATE]: $195,000-$215,000 based on recently renovated comparables within 0.4 miles\n[TARGET BUYER]: experienced investor or confident DIY homeowner\n[SOLD AS-IS]: yes\n[NEIGHBORHOOD CONTEXT]: Midtown-adjacent Memphis neighborhood with active investor activity; multiple renovated homes on same block\n[WORD COUNT]: 200","output":"The numbers work here -- and experienced buyers will see that immediately. Offered as-is at $119,000, 883 Wakefield Avenue is a solid-brick, 3-bedroom, 1.5-bath home with a full basement and detached 2-car garage sitting on 0.22 acres in a Midtown-adjacent neighborhood that has seen consistent renovation activity.\n\nThe cosmetic work is real -- kitchen and baths need a full update, the original single-pane windows should be replaced, and the rear addition lacks central air. But the structure underneath is worth noting: the 2018 roof is done, the main-level hardwoods are intact under carpet, 9-foot ceilings give the space genuine bones, and the basement adds flexibility few comparables can match. Comparable renovated homes in this pocket have closed in the $195,000-$215,000 range.\n\nThis is a property for someone who knows what to do with a blank slate. Showings available with reasonable notice -- bring your contractor and your offer. Sold as-is; seller makes no representations beyond disclosed conditions."},{"id":4,"category_id":1,"idx":4,"title":"Luxury Estate Property Brochure Copy","text":"You are a luxury real estate copywriter writing editorial-quality printed brochure copy for high-net-worth property buyers. Your work appears in printed marketing materials, not MLS -- so you are not constrained by character limits, bullet-point formats, or MLS compliance rules. You write like a contributor to Architectural Digest or Robb Report: authoritative, evocative, precise.\n\nYour job: write a 400-500 word printed brochure narrative for an estate-caliber property ($5M+). The copy should have three clear sections: a headline, a flowing narrative body (3-4 paragraphs), and a closing call-to-action with agent contact prompt.\n\nINPUTS:\n[PROPERTY NAME OR ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [TOTAL SQUARE FEET] / [ACREAGE]\n[ARCHITECTURAL STYLE]\n[YEAR BUILT OR RENOVATED]\n[INTERIOR HIGHLIGHTS] (comma-separated)\n[EXTERIOR AND GROUNDS HIGHLIGHTS]\n[SETTING / VIEWS]\n[NOTABLE PROVENANCE OR STORY] (architect, history, awards -- if any)\n[TARGET BUYER PROFILE]\n[TONE] (e.g. old-money understated, modern editorial, European estate)\n\nOUTPUT FORMAT:\n- HEADLINE: a single evocative line (not a tagline -- a literary opener)\n- BODY: 3-4 paragraphs of flowing prose, no bullet points. Weave in architecture, interior experience, outdoor setting, and lifestyle in that order.\n- CALL TO ACTION: 2-3 sentences, professional, with placeholder for agent name and phone.\n- Total: 400-500 words.\n- Avoid: price-per-square-foot math, investment language, school references, fair-housing violations, superlatives without substance (\"most amazing\").","input":"[PROPERTY NAME OR ADDRESS]: Ridgecliff Estate -- 9200 Ridgecliff Road, Hendersonville, NC\n[LIST PRICE]: $6,750,000\n[BEDROOMS]: 6\n[BATHROOMS]: 7 full, 2 half\n[TOTAL SQUARE FEET]: 9,200\n[ACREAGE]: 14.8 acres\n[ARCHITECTURAL STYLE]: French Norman manor, stone and slate, designed by Charlotte-based firm Shook Kelley\n[YEAR BUILT OR RENOVATED]: Built 2008, primary suite wing and great room addition 2019\n[INTERIOR HIGHLIGHTS]: barrel-vaulted great room with hand-hewn beams, Waterworks master bath, Lacanche range, library with custom mahogany millwork, climate-controlled 1,200-bottle wine room, heated limestone floors, home theater\n[EXTERIOR AND GROUNDS HIGHLIGHTS]: heated stone terrace, infinity pool, 4-stall horse stable with paddock, guest cottage, 3-car motor court, cutting garden, orchard\n[SETTING / VIEWS]: Blue Ridge Mountain panorama, fully private, conservation easement on adjacent 40 acres ensures permanent view protection\n[NOTABLE PROVENANCE OR STORY]: featured in Veranda magazine (2021); grounds designed by noted landscape architect Gwen Rhoads\n[TARGET BUYER PROFILE]: ultra-high-net-worth buyer seeking a private western North Carolina retreat; equestrian or multi-generational use\n[TONE]: old-money understated, European estate sensibility, Veranda-meets-Town & Country","output":"WHERE THE RIDGE MEETS THE SKY\n\nThere are properties that announce themselves. And then there are properties that reveal themselves -- slowly, deliberately, on their own terms. Ridgecliff Estate belongs unequivocally to the second category.\n\nSet behind a private motor court on 14.8 acres of western North Carolina highland, this French Norman manor was designed by the Charlotte firm Shook Kelley and built in 2008 with a resolute commitment to craft. Stone walls, hand-laid slate roofing, and deep-set arched windows establish an exterior that reads less as new construction and more as something earned by generations. The Blue Ridge Mountain panorama that fills every southern-facing window is permanent -- a conservation easement on the adjacent 40 acres ensures the view will never be compromised.\n\nStep inside and the scale shifts in ways photographs cannot prepare you for. The barrel-vaulted great room, its hand-hewn beams sourced from a reclaimed Kentucky tobacco barn, rises to receive both the mountains and the light with equal grace. Six bedrooms and nine bathrooms unfold across 9,200 square feet of limestone floors that hold warmth underfoot. The kitchen, anchored by a Lacanche range and flanked by butler's pantry and prep kitchen, is a working room for those who take cooking seriously. The mahogany-paneled library is, simply, one of the finest private reading rooms in the region. A climate-controlled wine room holds 1,200 bottles. The home theater does what home theaters rarely do -- it earns its space.\n\nThe grounds, designed by landscape architect Gwen Rhoads and featured in Veranda magazine in 2021, are not landscaping -- they are landscape. The heated stone terrace and infinity pool face the mountains without apology. A cutting garden and productive orchard supply the house through four distinct seasons. A four-stall horse stable with paddock and a fully appointed guest cottage complete an estate that accommodates equestrian life, extended family, or simply the luxury of space held in reserve. Ridgecliff has been a private retreat. It could become a legacy.\n\nPrivate tours are available by appointment. Contact [AGENT NAME] at [PHONE NUMBER] to arrange your showing and to receive the full property documentation package."},{"id":5,"category_id":1,"idx":5,"title":"Just-Listed Multi-Channel Marketing Kit","text":"You are an expert real estate marketing copywriter. Your job is to take a single set of property inputs and produce a complete four-piece marketing kit -- MLS description, Instagram caption, Facebook post, and an email subject line with preview text -- all from the same information, each piece optimized for its channel.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[KEY FEATURES] (comma-separated, 4-6 features)\n[NEIGHBORHOOD]\n[PROXIMITY / LOCATION HIGHLIGHTS]\n[AGENT NAME]\n[AGENT HANDLE OR CONTACT]\n[TARGET BUYER]\n[OPEN HOUSE DATE/TIME] (optional -- include if provided)\n\nOUTPUT FORMAT -- produce all four pieces, clearly labeled:\n\nPIECE 1 -- MLS DESCRIPTION (180-220 words)\nProse, no bullet points, MLS-compliant. No fair-housing violations, no school-quality claims.\n\nPIECE 2 -- INSTAGRAM CAPTION (120-160 words + hashtags)\nHook in first line (no leading emoji unless brand voice calls for it). Conversational, lifestyle-forward. End with CTA. 20-25 relevant hashtags on a separate line.\n\nPIECE 3 -- FACEBOOK POST (140-180 words)\nWarmer and more community-driven than Instagram. Speak to the neighborhood as much as the home. Include open house details if provided. End with soft CTA.\n\nPIECE 4 -- EMAIL SUBJECT LINE + PREVIEW TEXT\nSubject line: under 50 characters, curiosity or benefit-driven, no ALL CAPS.\nPreview text: 80-100 characters, complements the subject without repeating it.\n\nConstraints: no \"won't last,\" no \"motivated seller,\" no superlatives without specifics, no fair-housing violations. Keep each piece distinct -- do not copy-paste between them.","input":"[PROPERTY ADDRESS]: 517 Maple Ridge Court, Brentwood, TN\n[LIST PRICE]: $724,000\n[BEDROOMS]: 4\n[BATHROOMS]: 3 full, 1 half\n[SQUARE FEET]: 3,050\n[KEY FEATURES]: quartz waterfall island kitchen, screened-in porch with TV mount, primary suite on main level, dedicated home office, 3-car garage, new roof (2024)\n[NEIGHBORHOOD]: Maple Ridge -- established Brentwood subdivision, tree-lined streets\n[PROXIMITY / LOCATION HIGHLIGHTS]: 8 minutes to Cool Springs Galleria, 20 minutes to downtown Nashville, within 1 mile of green belt trails\n[AGENT NAME]: Sarah Holloway\n[AGENT HANDLE OR CONTACT]: @sarahhollowayrealty / 615-882-4401\n[TARGET BUYER]: move-up family buyer, professionals with children\n[OPEN HOUSE DATE/TIME]: Sunday, June 8 from 1-4 PM","output":"PIECE 1 -- MLS DESCRIPTION\n\nLife flows naturally at 517 Maple Ridge Court, where a thoughtful floor plan and over 3,000 square feet of well-finished living space meet one of Brentwood's most established neighborhoods. The main-level primary suite offers the retreat parents dream about, while three additional bedrooms upstairs give the rest of the household room to spread out. A dedicated home office -- real walls, a real door -- supports the way most families actually live today.\n\nThe kitchen anchors the home the way a great kitchen should: a quartz waterfall island creates the gathering point, and the flow to the dining and living areas is seamless. When evenings call for something more relaxed, the screened-in porch with its built-in TV mount becomes the best room in the house. A 2024 roof and 3-car garage handle the practical side of homeownership efficiently. Greenbelt trails are less than a mile away; Cool Springs is 8 minutes; Nashville is 20.\n\nTree-lined Maple Ridge Court delivers the neighborhood that growing families are looking for. Schedule your tour of 517 today.\n\n---\n\nPIECE 2 -- INSTAGRAM CAPTION\n\nMain-level primary suite. Three-car garage. A screened porch with a TV mount that makes you forget summer exists.\n\n517 Maple Ridge Court just listed in Brentwood at $724,000 -- and it checks the boxes that actually matter for families who have outgrown their last house.\n\n4 bed / 3.5 bath / 3,050 sqft / dedicated home office / new roof in 2024. Eight minutes to Cool Springs, 20 to Nashville, and a mile from greenbelt trails.\n\nOpen house this Sunday, June 8 from 1-4 PM. Come see it in person -- or DM me or call 615-882-4401 to schedule a private showing.\n\n-- Sarah Holloway, @sarahhollowayrealty\n\n#BrentwoodTN #BrentwoodRealEstate #NashvilleRealEstate #JustListed #ListingAlert #MoveUpHome #TennesseeRealEstate #BrentwoodHomes #NashvilleHomes #HomesForSale #RealEstateAgent #SarahHollowayRealty #HomeGoals #FamilyHome #OpenHouse #OpenHouseSunday #BuyersAgent #DreamHome #NewListing #MiddleTennessee\n\n---\n\nPIECE 3 -- FACEBOOK POST\n\nIf you have been watching Brentwood, this is the one worth seeing in person.\n\n517 Maple Ridge Court just came to market at $724,000 -- a 4-bedroom, 3.5-bath home in Maple Ridge with a main-level primary suite, dedicated home office, 3-car garage, and a screened-in porch that the whole family is going to fight over.\n\nMicro-details worth noting: new roof installed in 2024, quartz waterfall island kitchen, and greenbelt trail access less than a mile from the front door. Cool Springs is 8 minutes away, and you are 20 minutes from downtown Nashville.\n\nWe are hosting an open house this Sunday, June 8 from 1 to 4 PM -- all are welcome. No appointment needed. If you would prefer a private showing before then, reach out directly: 615-882-4401 or message me here.\n\nHope to see some familiar faces on Sunday! -- Sarah Holloway\n\n---\n\nPIECE 4 -- EMAIL SUBJECT LINE + PREVIEW TEXT\n\nSubject line: New in Brentwood: main-level primary + 3-car garage\nPreview text: 517 Maple Ridge Ct just listed at $724K -- open house Sunday 1-4 PM."},{"id":6,"category_id":2,"idx":1,"title":"Instagram Carousel: Just-Sold Story","text":"You are an expert real estate social media copywriter specializing in Instagram content for residential agents.\n\nYour job: write a 5-slide Instagram carousel script celebrating a just-sold listing. Each slide must have distinct, purposeful copy. The carousel should tell a complete story: hook the audience, walk them through the sale narrative, and end with a clear call to action.\n\nINPUTS:\n[ORIGINAL LIST PRICE]\n[SOLD PRICE]\n[DAYS ON MARKET]\n[OVER OR UNDER ASKING] (calculate from above, confirm direction)\n[SALE STORY] (brief -- how many offers, any notable circumstances, what made it competitive)\n[PROPERTY TYPE AND NEIGHBORHOOD]\n[AGENT NAME]\n[AGENT HANDLE]\n[MARKET NAME]\n\nSLIDE STRUCTURE:\nSlide 1 -- HOOK: One punchy line that stops the scroll. Can be a stat, a statement, or a question. Do not start with \"Just sold.\"\nSlide 2 -- THE PROPERTY: 2-3 lines about what made this listing stand out.\nSlide 3 -- THE NUMBERS: Present the key stats visually (list price, sold price, DOM, offer count). Clean, scannable format.\nSlide 4 -- THE STORY: 3-4 lines about how the deal unfolded -- the strategy, the market context, what the seller experienced.\nSlide 5 -- CTA: Direct, warm, actionable. Invite sellers or buyers to connect. Include agent name and handle.\n\nCONSTRAINTS:\n- Each slide: 15-35 words (short enough to read at a glance on mobile).\n- No fair-housing language.\n- Slide 1 cannot begin with \"Just sold\" or \"Sold!\" -- earn the attention first.\n- Tone: proud but not boastful, informative not promotional.\n\nReturn slide-by-slide, clearly labeled Slide 1 through Slide 5.","input":"[ORIGINAL LIST PRICE]: $587,000\n[SOLD PRICE]: $614,500\n[DAYS ON MARKET]: 4\n[OVER OR UNDER ASKING]: $27,500 over asking (4.7% over list)\n[SALE STORY]: listed Thursday, open house Saturday drew 31 groups, received 7 offers by Sunday evening, accepted highest and best Monday morning. Winning offer waived inspection contingency. Sellers were a relocating couple who needed a fast, clean close -- got it in 21 days.\n[PROPERTY TYPE AND NEIGHBORHOOD]: 4-bedroom single-family home, Germantown, Nashville, TN\n[AGENT NAME]: Marcus Webb\n[AGENT HANDLE]: @marcuswebbhomes\n[MARKET NAME]: Nashville, TN","output":"SLIDE 1 -- HOOK\n31 groups through the door. 7 offers on the table. Closed 4.7% over asking in 4 days.\nThat is what the right strategy looks like in Nashville right now.\n\nSLIDE 2 -- THE PROPERTY\nA 4-bedroom home in Germantown -- one of Nashville's most in-demand neighborhoods.\nUpdated, well-priced, and marketed to reach the right buyers before it ever sat a weekend.\n\nSLIDE 3 -- THE NUMBERS\nList Price: $587,000\nSold Price: $614,500\nOver Asking: +$27,500\nDays on Market: 4\nOffers Received: 7\n\nSLIDE 4 -- THE STORY\nListed on a Thursday. Open house Saturday drew 31 groups. Seven offers arrived by Sunday night.\nMy sellers needed speed and certainty -- we delivered both. Clean close in 21 days, no drama.\nThat is what intentional preparation does for a seller.\n\nSLIDE 5 -- CTA\nThinking about selling in Nashville? Let's talk about what your home could do in this market.\nDM me or visit the link in bio.\n-- Marcus Webb | @marcuswebbhomes"},{"id":7,"category_id":2,"idx":2,"title":"30-Second Reel Script: Neighborhood Spotlight","text":"You are an expert real estate video scriptwriter specializing in short-form social content for residential agents.\n\nYour job: write a 30-second spoken-word Reel script for an agent filming a neighborhood spotlight video. At a natural conversational pace, 30 seconds equals approximately 75-90 words. The script must feel like the agent is talking to a friend, not reading copy.\n\nINPUTS:\n[NEIGHBORHOOD NAME]\n[CITY AND STATE]\n[FEATURE 1] (restaurants, specific names if possible)\n[FEATURE 2] (parks, green space, outdoor activity)\n[FEATURE 3] (commute, access, transit)\n[FEATURE 4] (community feel, events, local character -- optional)\n[FEATURE 5] (additional local draw -- optional)\n[MEDIAN HOME PRICE OR PRICE RANGE]\n[AGENT NAME]\n[MARKET THE AGENT SERVES]\n\nOUTPUT FORMAT:\n- Line 1: HOOK -- an unexpected or specific observation that earns 3 seconds of attention. Not \"Welcome to [neighborhood]!\"\n- Body: conversational script, 55-65 words, hitting 3-4 of the features naturally. Mark natural pause points with [pause].\n- Closing line: CTA -- one sentence, direct, invites follow or DM. Include agent name.\n- Label: at the top, note the approximate word count and read time.\n\nCONSTRAINTS:\n- No \"hidden gem\" language.\n- Do not name specific schools or make school quality claims.\n- Write the way a confident, knowledgeable agent actually talks -- not like a commercial.\n- No more than 90 words total (excluding labels and stage directions).","input":"[NEIGHBORHOOD NAME]: Riverside Heights\n[CITY AND STATE]: Fort Worth, TX\n[FEATURE 1]: restaurant row on Magnolia Avenue -- specifically Ellerbe Fine Foods, Fixture, and several coffee shops within a 4-block walk\n[FEATURE 2]: Trinity Trails -- 40 miles of connected hike and bike trail accessible from the neighborhood\n[FEATURE 3]: 12 minutes to downtown Fort Worth, no highway required\n[FEATURE 4]: monthly street festival on Magnolia, strong neighborhood association, very walkable\n[FEATURE 5]: mix of renovated craftsman bungalows and newer infill construction, active buyer demand\n[MEDIAN HOME PRICE OR PRICE RANGE]: $420,000-$680,000\n[AGENT NAME]: Dana Reyes\n[MARKET THE AGENT SERVES]: Fort Worth, TX","output":"APPROXIMATE WORD COUNT: 83 words | READ TIME: ~30 seconds\n\nYou can walk to dinner, hit 40 miles of trail, and be downtown in 12 minutes -- and that is just Tuesday in Riverside Heights. [pause]\n\nThis Fort Worth neighborhood runs along Magnolia Avenue, which means Ellerbe, Fixture, and a half-dozen coffee shops are literally on your block. Trinity Trails starts at the edge of the neighborhood. And you never touch a highway to get to downtown. [pause]\n\nHomes here range from the mid-400s to the high 600s -- and they move. [pause]\n\nIf Riverside Heights is on your radar, send me a DM. I'm Dana Reyes and I cover all of Fort Worth."},{"id":8,"category_id":2,"idx":3,"title":"Facebook Post: Open House Invitation","text":"You are an expert real estate social media copywriter specializing in Facebook content for residential agents.\n\nYour job: write a Facebook post (140-200 words) inviting followers to an open house. The tone should be warm, community-oriented, and welcoming -- Facebook audiences respond to personality and connection, not hard sales pitches. The post should feel like an invitation from a neighbor, not a billboard.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[KEY HIGHLIGHTS] (3-4 things that will make people want to see it)\n[OPEN HOUSE DATE]\n[OPEN HOUSE TIME]\n[NEIGHBORHOOD NAME]\n[AGENT NAME]\n[AGENT PHONE]\n[OPTIONAL -- FIRST COMMENT TEXT] (yes/no: if yes, write a suggested first comment to boost engagement)\n\nOUTPUT FORMAT:\n- Post body: 140-200 words. Warm opener, brief property highlights woven in naturally, open house details clearly stated, soft CTA.\n- If [OPTIONAL -- FIRST COMMENT TEXT] = yes, provide suggested first comment text below the post (clearly labeled).\n\nCONSTRAINTS:\n- No \"won't last,\" \"priced to sell,\" \"motivated seller,\" or similar pressure phrases.\n- No fair-housing violations.\n- The open house date and time must appear clearly -- this is an event invitation.\n- End with agent name for a personal sign-off.","input":"[PROPERTY ADDRESS]: 1042 Fernwood Circle, Roswell, GA\n[LIST PRICE]: $539,500\n[BEDROOMS]: 4\n[BATHROOMS]: 2 full, 1 half\n[SQUARE FEET]: 2,780\n[KEY HIGHLIGHTS]: renovated primary bath with soaking tub and frameless glass shower, open kitchen with oversized island, large fenced backyard with fire pit patio, 3-car garage\n[OPEN HOUSE DATE]: Saturday, June 14\n[OPEN HOUSE TIME]: 11 AM to 2 PM\n[NEIGHBORHOOD NAME]: Fernwood Estates, Roswell\n[AGENT NAME]: Tiffany Morgan\n[AGENT PHONE]: 770-554-3892\n[OPTIONAL -- FIRST COMMENT TEXT]: yes","output":"Come see 1042 Fernwood Circle this Saturday -- and bring your wish list.\n\nThis 4-bedroom, 2.5-bath home in Fernwood Estates has been thoughtfully updated in all the places it counts. The primary bath renovation is genuinely beautiful -- soaking tub, frameless glass shower, the works. The kitchen features an oversized island that makes it the natural center of every gathering. And the backyard? Fenced, fire-pit-ready, and the kind of outdoor space that earns its keep year-round.\n\nOh, and a 3-car garage. In Roswell. At $539,500.\n\nOpen House: Saturday, June 14 from 11 AM to 2 PM\n1042 Fernwood Circle, Roswell, GA\n\nNo appointment needed -- just stop by. I'll be there to answer questions, point out the details, and let the house speak for itself. If you can't make Saturday, call or text me directly at 770-554-3892 and we'll find a time that works.\n\nHope to see you there! -- Tiffany Morgan\n\n---\nSUGGESTED FIRST COMMENT:\nTag a friend who has been searching in Roswell -- this one is worth seeing in person!"},{"id":9,"category_id":2,"idx":4,"title":"TikTok Hook: Common Buyer Mistake","text":"You are an expert real estate social media scriptwriter specializing in short-form educational TikTok content for residential agents.\n\nYour job: write a 45-second TikTok script that educates buyers on one costly mistake. The format is hook-first: the first 3 seconds must be specific and scroll-stopping. The rest of the video delivers the education clearly and ends with a soft call to action.\n\nAt normal TikTok delivery pace (approximately 140 words per minute), 45 seconds = 100-110 words.\n\nINPUTS:\n[THE MISTAKE] (specific -- not vague like \"not doing research\")\n[WHY IT MATTERS] (real dollar or outcome consequence)\n[WHAT TO DO INSTEAD] (actionable, specific)\n[AGENT NAME]\n[AGENT LOCATION / MARKET]\n\nOUTPUT FORMAT:\n- Label each section: [HOOK], [PROBLEM], [CONSEQUENCE], [SOLUTION], [CTA]\n- Mark suggested on-screen text callouts with [ON-SCREEN: text here]\n- Write in spoken-word, conversational style -- no bullet points in the script itself.\n- Approximate word count label at top.\n- Total script: 100-115 words (not counting stage directions and labels).\n\nCONSTRAINTS:\n- Hook cannot start with \"Hey guys\" or \"So I wanted to talk about.\"\n- Must name a real dollar figure or measurable consequence -- no vague warnings.\n- No fair-housing language.\n- CTA should invite a follow or DM, not a hard sales close.","input":"[THE MISTAKE]: Waiving a home inspection to make an offer more competitive, without understanding what that actually means\n[WHY IT MATTERS]: Buyers who waive inspections in competitive markets have faced surprise repair bills ranging from $8,000 to over $60,000 on issues that a $400 inspection would have flagged -- foundation, HVAC, roof, and electrical most commonly\n[WHAT TO DO INSTEAD]: Instead of waiving the inspection entirely, buyers can make an informational-only inspection offer -- they get the inspection for knowledge purposes but waive their right to request repairs. This makes the offer competitive while protecting the buyer from catastrophic surprises.\n[AGENT NAME]: Jordan Kessler\n[AGENT LOCATION / MARKET]: Phoenix, AZ","output":"APPROXIMATE WORD COUNT: 107 words | DURATION: ~45 seconds\n\n[HOOK]\nWaiving your home inspection in Phoenix could cost you $60,000. Here is what nobody tells you before you do it.\n[ON-SCREEN: Waiving your inspection = gambling with $60K]\n\n[PROBLEM + CONSEQUENCE]\nIn a competitive market, buyers are told to waive inspections to win. And some do. But I have seen clients close on homes and then discover foundation issues, dead HVAC systems, and outdated electrical -- none of it visible at a showing. We are talking $8,000 to $60,000 in surprise repairs.\n[ON-SCREEN: $8K-$60K in hidden repairs]\n\n[SOLUTION]\nHere is the move: offer an informational-only inspection. You get the inspection, you see every issue, but you waive your right to ask the seller for repairs. Your offer stays competitive. You stay informed.\n[ON-SCREEN: Informational-only inspection = competitive + protected]\n\n[CTA]\nIf you are buying in Phoenix and have questions about how to structure a strong offer without gambling everything -- follow me. I am Jordan Kessler and this is what I do."},{"id":10,"category_id":2,"idx":5,"title":"Weekly Content Calendar (7 Posts)","text":"You are an expert real estate social media strategist and copywriter.\n\nYour job: plan and write a complete 7-post social media content calendar for one week for a residential real estate agent. The week must include exactly: 2 educational posts, 2 listing or market update posts, 1 just-sold or testimonial post, 1 behind-the-scenes post, and 1 call-to-action post.\n\nINPUTS:\n[AGENT NAME]\n[MARKET / CITY]\n[CURRENT SEASON OR MONTH]\n[ACTIVE LISTINGS] (brief description of 1-2 active listings, or \"none\" if not applicable)\n[RECENT SALE OR TESTIMONIAL] (brief details, or \"none\")\n[AGENT PERSONALITY STYLE] (fun and relatable / polished professional / luxury market / community-focused)\n[PRIMARY PLATFORM FOCUS] (Instagram / Facebook / both)\n\nOUTPUT FORMAT:\nProduce a table with 7 rows and the following columns:\n- Day (Monday through Sunday)\n- Post Type\n- Platform\n- Caption (full caption text, ready to post)\n- Hashtags (10-15 relevant hashtags on a separate line)\n\nFor each caption: 80-140 words, optimized for the post type and platform. Each caption must be distinct in voice and format -- no copy-paste variation.\n\nCONSTRAINTS:\n- No \"won't last\" or pressure language on listing posts.\n- Educational posts must deliver real, specific information -- not vague tips.\n- Behind-the-scenes post should humanize the agent, not just promote services.\n- CTA post must have a clear, single ask.\n- No fair-housing violations on any post.\n- All 7 captions must feel like they came from the same human voice.","input":"[AGENT NAME]: Priya Nair\n[MARKET / CITY]: Austin, TX\n[CURRENT SEASON OR MONTH]: June (early summer)\n[ACTIVE LISTINGS]: 1. 3-bed/2-bath bungalow in East Austin, $485,000, listed last week. 2. New construction 4-bed in Cedar Park, $612,000, just hit market.\n[RECENT SALE OR TESTIMONIAL]: Helped first-time buyers Marco and Lisa close last week on a 2-bed condo in South Congress at $398,000 after 3 months of searching -- they cried at closing.\n[AGENT PERSONALITY STYLE]: fun and relatable, community-focused, keeps it real about the Austin market\n[PRIMARY PLATFORM FOCUS]: Instagram","output":"DAY: Monday\nPOST TYPE: Educational\nPLATFORM: Instagram\nCAPTION: Austin buyers: your pre-approval letter and your actual budget are two different numbers -- and confusing them is one of the most expensive mistakes you can make this summer. Your lender approves you for the maximum you qualify for. That does not mean you should spend it. Factor in your actual lifestyle, your utilities, your savings goals, and -- especially in Texas -- property taxes. I always tell my clients: get approved for the max, then decide what you actually want to spend. Your comfort matters more than your ceiling.\n#AustinRealEstate #AustinBuyers #FirstTimeBuyer #HomeBuyingTips #AustinHomes #RealEstateTips #TexasRealEstate #PriyaNairRealEstate #AustinLife #BuyersGuide\n\n---\n\nDAY: Tuesday\nPOST TYPE: Listing\nPLATFORM: Instagram\nCAPTION: East Austin bungalow alert -- and yes, it has the vibes you are picturing. 3 bedrooms, 2 bathrooms, $485,000, and that East Austin character that does not exist in new construction. Original details, updated where it counts, walkable to the places you already love. If you have been waiting for something with a little soul in your price range, this one is worth a look. DM me for a private showing or check the link in bio for full details.\n#EastAustin #AustinListings #JustListed #AustinBungalow #AustinHomesForSale #ATXRealEstate #AustinRealtor #MovingToAustin #AustinLiving #HomesForSale\n\n---\n\nDAY: Wednesday\nPOST TYPE: Just-Sold / Testimonial\nPLATFORM: Instagram\nCAPTION: Marco and Lisa cried at closing last week. I'm not going to pretend I didn't tear up a little too. Three months of searching, a competitive market, and a lot of \"not quite right\" moments -- and then their South Congress condo at $398,000 and it was exactly right. First-time buyers, first set of keys. That is why I do this. Congratulations you two. You are homeowners now. Go enjoy your summer.\n#JustClosed #FirstTimeHomebuyer #AustinRealEstate #SouthCongress #ATX #ClosingDay #RealEstateStories #HappyClients #AustinAgent #PriyaNairRealEstate\n\n---\n\nDAY: Thursday\nPOST TYPE: Educational\nPLATFORM: Instagram\nCAPTION: June in Austin means more inventory than we had in Q1 -- and that is actually good news for buyers who have been frustrated. More homes = more negotiating room = less waiving of things you should not waive. Sellers in this market are more willing to negotiate on closing costs, repairs, and timelines than they were 18 months ago. If you tried to buy last year and gave up, the market has shifted in your direction. Let's talk.\n#AustinMarketUpdate #AustinBuyersMarket #AustinRealEstate #HomeBuyingAdvice #RealEstateTips #ATXHomes #TexasRealEstate #AustinAgent #MarketUpdate #BuyNow\n\n---\n\nDAY: Friday\nPOST TYPE: Listing / Market\nPLATFORM: Instagram\nCAPTION: New construction in Cedar Park for $612K -- 4 bedrooms, move-in ready, and priced below what I am seeing for comparable new builds right now. Cedar Park continues to attract buyers who want the Austin lifestyle with a little more breathing room. This one has the upgrades already included and a builder warranty still in play. Worth it? I think so. Full details in bio or DM me and I will walk you through it.\n#CedarPark #CedarParkRealEstate #NewConstruction #AustinSuburbs #AustinRealEstate #JustListed #TexasHomes #HomesForSale #ATXRealEstate #PriyaNairRealEstate\n\n---\n\nDAY: Saturday\nPOST TYPE: Behind-the-Scenes\nPLATFORM: Instagram\nCAPTION: Saturday morning means photographer at 8 AM, open house prep by 10, and approximately four cups of coffee somewhere in between. Most people see the listing go live and think it just appears. What actually happens: staging walkthrough, photography, writing the description (that part takes longer than you think), MLS upload, social graphics, email blast, sign in yard. It is a lot -- and I genuinely love it. Happy to be doing what I do on a sunny Austin Saturday. Hope yours is a good one.\n#BehindTheScenes #RealtorLife #AustinRealEstate #AustinRealtor #DayInTheLife #OpenHouseDay #ATX #RealEstateMarketing #SaturdayVibes #PriyaNairRealEstate\n\n---\n\nDAY: Sunday\nPOST TYPE: Call-to-Action\nPLATFORM: Instagram\nCAPTION: If you are thinking about buying or selling in Austin this summer and you have not had a real conversation with an agent yet -- that is the move. Not to feel pressured. Just to know where you stand, what the market is doing, and what your options actually are. I offer free 30-minute consultations with no obligation. We talk, you leave with information, and you make the decision that is right for you. Book yours through the link in bio -- or just DM me \"READY\" and I will reach out.\n#AustinRealEstate #FreeConsultation #AustinHomes #BuyOrSell #AustinAgent #RealEstateCTA #TexasRealEstate #ATX #WorkingWithAnAgent #PriyaNairRealEstate"},{"id":11,"category_id":3,"idx":1,"title":"Cold Lead Re-Engagement Email","text":"You are an expert real estate email copywriter specializing in lead re-engagement for residential agents.\n\nYour job: write a single, short re-engagement email (150-200 words) to a lead who has gone silent after an initial conversation 60-90 days ago. The email must not guilt-trip the lead, must not pressure them, and must lead with something genuinely useful before making any ask. The goal is to reopen the conversation by offering value, not by demanding a response.\n\nINPUTS:\n[LEAD FIRST NAME]\n[ORIGINAL INTEREST] (buying / selling / both)\n[TIME SINCE LAST CONTACT] (in weeks or months)\n[MARKET DATA POINT] (one specific, current, relevant fact about their local market -- price trend, inventory shift, interest rate note, etc.)\n[AGENT NAME]\n[AGENT PHONE]\n[AGENT MARKET]\n\nOUTPUT FORMAT:\n- Subject line (under 45 characters, curiosity or value-driven)\n- Email body: 150-200 words, 2-3 short paragraphs\n- Sign-off with agent name and phone\n\nCONSTRAINTS:\n- Never say \"just checking in\" or \"circling back\" or \"touching base.\"\n- Do not reference how long they have been silent in a way that implies guilt.\n- The market data point must come before any ask.\n- End with a low-pressure ask (a simple yes/no question or an offer to share more info).\n- Sound like a person, not a drip campaign.","input":"[LEAD FIRST NAME]: Kevin\n[ORIGINAL INTEREST]: buying -- was looking at 3-bed single-family homes in the $450K-$550K range in South Charlotte\n[TIME SINCE LAST CONTACT]: 11 weeks\n[MARKET DATA POINT]: Inventory in South Charlotte's $450K-$550K range is up 22% compared to the same period last year, which means buyers have more selection and less competition than they did in early spring\n[AGENT NAME]: Amanda Briggs\n[AGENT PHONE]: 704-312-8850\n[AGENT MARKET]: Charlotte, NC","output":"Subject: South Charlotte update you might find useful\n\nHi Kevin,\n\nI wanted to share something that is relevant to the search you were doing earlier this year. Inventory in the $450K-$550K range in South Charlotte is up 22% compared to the same time last year. More selection, less competition, more room to negotiate than we had in early spring. It is a meaningfully different market than the one we were looking at together.\n\nI do not know where your timing stands now -- life changes, plans shift, and that is completely fine. But if buying is still on your radar for later this year or even 2027, right now is a genuinely interesting time to start paying attention again.\n\nWould it be helpful if I sent you a short list of what is currently available in the neighborhoods you liked? No pressure, no strings -- just useful information if you want it.\n\nAmanda Briggs\n704-312-8850"},{"id":12,"category_id":3,"idx":2,"title":"5-Email Buyer Nurture Sequence","text":"You are an expert real estate email copywriter specializing in buyer lead nurture sequences for residential agents.\n\nYour job: write a complete 5-email drip nurture sequence for a buyer lead who is 3-6 months from purchasing. Each email must deliver standalone value and have a distinct theme -- this is not a sequence of five sales pitches. The goal is to build trust, educate the buyer, and keep the agent top-of-mind until the buyer is ready to act.\n\nINPUTS:\n[BUYER FIRST NAME]\n[BUYER BUDGET RANGE]\n[DESIRED AREA OR NEIGHBORHOOD]\n[ESTIMATED PURCHASE TIMELINE]\n[AGENT NAME]\n[AGENT PHONE]\n[AGENT MARKET]\n\nSEQUENCE STRUCTURE:\nEmail 1 (Day 0): The Welcome + What to Expect -- set the stage, make them feel like they are in good hands\nEmail 2 (Day 12): Education -- one practical thing they should know about the buying process in this market\nEmail 3 (Day 24): Market Insight -- relevant local data point or trend that affects their search\nEmail 4 (Day 36): Common Mistake -- one avoidable buyer error, positioned helpfully\nEmail 5 (Day 50): Soft Re-Engagement -- check in, invite next step, keep door open\n\nOUTPUT FORMAT:\nFor each email: Email number + send day label, Subject line, email body (120-180 words), sign-off.\n\nCONSTRAINTS:\n- No email should feel like a pitch.\n- No \"just checking in\" language in Email 5.\n- Each subject line must be distinct and channel-appropriate (curiosity, specificity, or utility).\n- Tone: knowledgeable friend, not corporate newsletter.\n- No fair-housing language.","input":"[BUYER FIRST NAME]: Rachel\n[BUYER BUDGET RANGE]: $380,000-$460,000\n[DESIRED AREA OR NEIGHBORHOOD]: Midtown Atlanta and adjacent neighborhoods (Grant Park, Inman Park, Ormewood Park)\n[ESTIMATED PURCHASE TIMELINE]: 4-5 months out\n[AGENT NAME]: Derek Owens\n[AGENT PHONE]: 404-789-2234\n[AGENT MARKET]: Atlanta, GA","output":"EMAIL 1 -- Day 0\nSubject: Welcome, Rachel -- here is what working together looks like\n\nHi Rachel,\n\nReally glad we connected. Buying in Midtown and the neighborhoods around it -- Grant Park, Inman Park, Ormewood Park -- is a great goal, and with 4-5 months on the runway you are in a genuinely good position to be thoughtful about it.\n\nHere is what I want you to expect from me: I will send you useful, specific information every couple of weeks. Market updates that are actually relevant to your search, process tips timed to where you are in the journey, and honest answers whenever you have questions.\n\nNo pressure, no sales calendar. When you are ready to start touring homes, I am ready to go. Until then, I am here as a resource.\n\nNext step when you are ready: getting pre-approved. Happy to recommend a few lenders I trust in Atlanta if that would help.\n\nDerek Owens | 404-789-2234\n\n---\n\nEMAIL 2 -- Day 12\nSubject: The pre-approval thing -- what actually matters\n\nHi Rachel,\n\nA quick process note that is worth knowing before you get deep into your search: not all pre-approvals are equal, and sellers in Atlanta's Midtown-area market can tell the difference.\n\nA pre-qualification letter (the one you can get in five minutes online) carries almost no weight in a competitive offer situation. A proper pre-approval -- where the lender has actually reviewed your income docs, tax returns, and credit -- is a meaningfully stronger signal to a seller.\n\nIn a market where good homes in your price range attract multiple offers within days of listing, your pre-approval letter is part of your competitive position. I have seen strong offers lose to slightly lower offers backed by a known local lender.\n\nIf you want a couple of lender names I have had good experiences with, just reply and I will send them over.\n\nDerek Owens | 404-789-2234\n\n---\n\nEMAIL 3 -- Day 24\nSubject: What the Atlanta market is doing right now in your range\n\nHi Rachel,\n\nA quick market update specific to your search. In the $380K-$460K range across Midtown, Grant Park, and Inman Park, inventory has ticked up slightly compared to three months ago -- which is a meaningful change from where things were in early spring.\n\nWhat that means for you: slightly less competition on any given listing, and marginally more room to ask for things like repair credits or closing cost contributions. It is not a buyer's market by any stretch, but it is not the frantic multiple-offer environment we saw last year either.\n\nGrant Park in particular is seeing some well-priced inventory come through right now. If you would like, I can set up an auto-alert so you see new listings the moment they hit -- no obligation, just useful.\n\nDerek Owens | 404-789-2234\n\n---\n\nEMAIL 4 -- Day 36\nSubject: The offer mistake that costs buyers the most in Atlanta\n\nHi Rachel,\n\nThis one comes up constantly, so I want to flag it early: in a market like Atlanta where good homes move in 5-7 days, buyers sometimes fall in love with a neighborhood and wait for the \"perfect\" home instead of acting decisively on a very good one.\n\nThe mistake is not moving quickly -- it is not having a clear picture of your non-negotiables before you start touring. If you know your true must-haves versus nice-to-haves, you can make a decision confidently when the right home appears. If you are still figuring that out while standing in a kitchen you love, you will hesitate -- and hesitation costs offers.\n\nBefore we start touring, I want to do a simple must-have/nice-to-have exercise with you. Takes 15 minutes and makes everything faster. Interested?\n\nDerek Owens | 404-789-2234\n\n---\n\nEMAIL 5 -- Day 50\nSubject: Checking where you are at, Rachel\n\nHi Rachel,\n\nIt has been a few weeks and I wanted to see where your head is at with the search. No agenda here -- I know timelines shift and life gets complicated.\n\nIf you are still targeting the same window and the same neighborhoods, I would love to schedule a quick 20-minute call to make sure we have your search criteria dialed in before we start touring. Atlanta's Inman Park and Ormewood Park inventory has been active lately and I want you to be ready when the right one comes through.\n\nIf the timeline has changed or you have questions about anything -- the market, the process, financing -- just reply to this email. I am easy to reach.\n\nDerek Owens | 404-789-2234"},{"id":13,"category_id":3,"idx":3,"title":"Post-Open-House Follow-Up Email","text":"You are an expert real estate email copywriter specializing in post-showing and open house follow-up communications.\n\nYour job: write a post-open-house follow-up email sent within 24 hours to a visitor (or group of visitors). The email must feel personal and warm -- not automated. It should acknowledge the specific visit, offer the next step clearly but without pressure, and stay short enough to be read in under 30 seconds.\n\nINPUTS:\n[VISITOR NAME] (use \"there\" if unknown)\n[PROPERTY ADDRESS]\n[OPEN HOUSE DATE]\n[VISITOR INTEREST OBSERVATION] (what the agent noticed -- what rooms they lingered in, questions they asked, whether they seemed seriously interested or casually browsing)\n[AGENT NAME]\n[AGENT PHONE]\n[ANY COMPETING INTEREST SIGNAL] (other offers expected, showing volume -- optional, only if genuine and relevant)\n\nOUTPUT FORMAT:\n- Subject line: under 50 characters, personal and specific\n- Email body: 120-160 words, 2-3 short paragraphs\n- Sign-off with agent name and phone\n\nCONSTRAINTS:\n- Never use \"It was great meeting you!\" as the opener.\n- Do not manufacture urgency unless [ANY COMPETING INTEREST SIGNAL] is genuine.\n- The [VISITOR INTEREST OBSERVATION] must be reflected naturally in the copy -- make it clear the agent was paying attention.\n- One clear next step -- not a list of options.\n- Sound like a person, not a CRM.","input":"[VISITOR NAME]: the Henderson family (Tom and Sarah)\n[PROPERTY ADDRESS]: 2918 Birchwood Trail, Plano, TX\n[OPEN HOUSE DATE]: Sunday, June 8\n[VISITOR INTEREST OBSERVATION]: They spent a long time in the backyard and the primary bedroom -- Sarah mentioned the closet twice. Tom asked specifically about the HVAC age and the roof. They took photos of every room. They have two kids who were measuring the upstairs bedrooms. Strong buying signals throughout.\n[AGENT NAME]: Chris Navarro\n[AGENT PHONE]: 972-441-6637\n[ANY COMPETING INTEREST SIGNAL]: We have had 3 private showings scheduled for this week following the open house.","output":"Subject: Great seeing you at Birchwood Trail -- a quick note\n\nHi Tom and Sarah,\n\nThank you both for coming by 2918 Birchwood Trail on Sunday. I noticed you spent some time in the backyard and I had a feeling the primary closet made an impression on Sarah -- it tends to do that.\n\nTo answer the questions Tom was asking: the HVAC was replaced in 2021 and the roof was done in 2019. Happy to pull the full documentation and send it over if that would help.\n\nFollowing the open house, we have three private showings scheduled this week, so I wanted to reach out before things get moving. If Birchwood Trail is on your short list, the best next step is a private tour where you can take your time -- including getting the kids upstairs to do their measuring properly.\n\nJust let me know and I will make it happen.\n\nChris Navarro | 972-441-6637"},{"id":14,"category_id":3,"idx":4,"title":"Sphere of Influence Quarterly Check-In","text":"You are an expert real estate email copywriter specializing in relationship-maintenance communication for residential agents.\n\nYour job: write a quarterly check-in email to a real estate agent's sphere of influence -- past clients, referral sources, and warm contacts. This email is NOT a sales pitch. It is a genuine, human touchpoint that keeps the agent top-of-mind without asking for anything directly. It should sound like a note from someone you trust, not a newsletter from a business.\n\nINPUTS:\n[AGENT NAME]\n[SEASON OR QUARTER] (e.g., Summer, Q2, early fall)\n[LOCAL MARKET INSIGHT] (one specific, relevant data point -- not generic)\n[PERSONAL SEASONAL TOUCH] (one genuine, brief personal note -- summer activities, a local event, something season-relevant that humanizes the agent)\n[SOFT ASK TYPE] (referral reminder / market value inquiry / none -- choose one)\n[AGENT PHONE]\n[AGENT MARKET]\n\nOUTPUT FORMAT:\n- Subject line: under 50 characters, warm and human -- not transactional\n- Email body: 120-160 words, conversational paragraphs, no bullet points\n- Sign-off: agent name, phone, brief personal sign-off line\n\nCONSTRAINTS:\n- Do not open with \"I hope this email finds you well.\"\n- Do not make this feel like a market report or newsletter.\n- The soft ask (if any) must appear in the last paragraph only and be genuinely light.\n- The personal touch must feel authentic -- not like filler.\n- No pressure language, no urgency.","input":"[AGENT NAME]: Melissa Hartwell\n[SEASON OR QUARTER]: Summer / Q3\n[LOCAL MARKET INSIGHT]: Denver's median days on market in June dropped to 9 days -- the fastest pace since late 2021, meaning well-priced homes are moving quickly again\n[PERSONAL SEASONAL TOUCH]: Melissa has been spending Sunday mornings at the Denver Farmers Market at Civic Center Park -- genuinely one of her favorite summer rituals in the city\n[SOFT ASK TYPE]: referral reminder\n[AGENT PHONE]: 303-721-5509\n[AGENT MARKET]: Denver, CO","output":"Subject: Summer in Denver + a quick hello\n\nHi there,\n\nSummer in Denver has me at the Civic Center Farmers Market on Sunday mornings every chance I get -- highly recommend it if you have not been lately. Some things about this city just get better every year.\n\nOn the market side, things have picked up meaningfully. Denver's median days on market in June dropped to 9 days -- the fastest pace we have seen since late 2021. Well-priced homes are moving quickly, and the buyers I am working with right now are having to make decisions faster than they expected.\n\nIf you know anyone thinking about buying or selling in Denver this summer, I would love an introduction. Referrals from people I know and trust are how I build my business -- and I never take that lightly.\n\nHope your summer is off to a great start.\n\nMelissa Hartwell | 303-721-5509\nAlways happy to chat."},{"id":15,"category_id":3,"idx":5,"title":"Lost Lead Win-Back Email","text":"You are an expert real estate email copywriter specializing in win-back and relationship-preservation communication.\n\nYour job: write a single, short email to a lead who went with another agent or decided not to transact. The tone is gracious and forward-looking. There is no bitterness, no defensiveness, and no pressure to reconsider. The goal is simply to leave the door open for a future relationship -- because circumstances change, and how an agent handles a loss defines the long-term relationship more than how they handle a win.\n\nINPUTS:\n[LEAD FIRST NAME]\n[WHAT THEY ORIGINALLY WANTED] (buy / sell / specific property type)\n[HOW LONG AGO] (approximate)\n[WHAT HAPPENED] (chose another agent / decided not to transact -- brief)\n[SOMETHING TO OFFER] (one concrete thing: market update relevant to them, new listings matching their criteria, a helpful resource)\n[AGENT NAME]\n[AGENT PHONE]\n\nOUTPUT FORMAT:\n- Subject line: under 45 characters\n- Email body: 120-150 words, 2-3 paragraphs\n- Sign-off with agent name and phone\n\nCONSTRAINTS:\n- Never reference the other agent by name or imply criticism.\n- Do not re-pitch the agent's services.\n- The value offer must come before any mention of staying in touch.\n- End with an open, no-pressure invitation to reconnect when timing is right.\n- Sound human -- not like a templated CRM win-back sequence.","input":"[LEAD FIRST NAME]: Brian\n[WHAT THEY ORIGINALLY WANTED]: sell his 4-bedroom home in Scottsdale and downsize to a 2-bed condo in the same area\n[HOW LONG AGO]: about 6 months ago\n[WHAT HAPPENED]: Brian decided to stay in his home rather than sell -- timing did not feel right to him\n[SOMETHING TO OFFER]: two 2-bedroom condos have just come to market in the Gainey Ranch and DC Ranch areas that match his criteria, and Scottsdale's luxury condo inventory has been tighter than expected this summer\n[AGENT NAME]: Renee Castillo\n[AGENT PHONE]: 480-337-7712","output":"Subject: Something in Scottsdale that might interest you\n\nHi Brian,\n\nI hope the last few months have been good. I wanted to reach out because two 2-bedroom condos just came to market in Gainey Ranch and DC Ranch -- both matching the profile we had talked about, and both hitting the market during a stretch when that specific inventory has been surprisingly tight.\n\nNo pressure and no agenda. You made the right call for your situation six months ago, and I have no doubt you will know when the timing is right again. But I did not want these to pass without at least putting them on your radar.\n\nIf you want me to send over the details on either unit, just reply or give me a call. And if the timing still is not there, no worries at all -- I will stay in touch.\n\nRenee Castillo | 480-337-7712"},{"id":16,"category_id":4,"idx":1,"title":"FSBO Cold-Call Opening Script","text":"You are an expert real estate sales trainer and script writer specializing in FSBO prospecting for residential agents.\n\nYour job: write a FSBO cold-call opening script that gets through the first two minutes of the call without triggering defensiveness, hanging up, or a \"we don't need an agent\" shutdown. The strategy: acknowledge what the seller is attempting, demonstrate genuine respect for their effort, offer a concrete value exchange, and earn the right to ask for an appointment -- not pitch a listing agreement.\n\nINPUTS:\n[AGENT NAME]\n[MARKET NAME]\n[VALUE ADD 1] (specific data or service the agent can offer -- e.g., accurate pricing data, professional marketing reach, buyer pool access)\n[VALUE ADD 2] (second concrete offering)\n[AGENT BROKERAGE] (optional)\n\nOUTPUT FORMAT:\n- Full call script: agent lines written out in full, clearly labeled AGENT.\n- Include realistic FSBO seller lines labeled FSBO for the two most common early responses: (1) \"We're not interested in using an agent\" and (2) \"We already have buyers looking at it.\"\n- Agent rebuttals for each objection: do not cave, do not argue, redirect with curiosity and value.\n- End at the appointment-request moment -- do not write past it.\n- Script length: 250-350 words.\n\nCONSTRAINTS:\n- No manipulation techniques (false scarcity, manufactured urgency, negging).\n- The agent must earn every transition -- no skipping from introduction to appointment ask.\n- Language must be conversational, not memorized-sounding.\n- No promises about results that cannot be guaranteed.","input":"[AGENT NAME]: Tyler Grant\n[MARKET NAME]: Colorado Springs, CO\n[VALUE ADD 1]: Tyler has access to closed sale data that FSBOs cannot access through Zillow -- actual sold prices on comparable homes within 90 days, not just list prices\n[VALUE ADD 2]: Tyler's listing marketing includes professional photography, 3D tour, and placement on 47 buyer-facing platforms including Realtor.com -- most FSBOs reach 1-3 platforms\n[AGENT BROKERAGE]: RE/MAX Properties Inc.","output":"AGENT: Hi, is this the owner of [property address]? Great -- my name is Tyler Grant, I'm with RE/MAX Properties in Colorado Springs. I saw your home is listed for sale by owner and I wanted to give you a quick call. Do you have just two minutes?\n\n[IF YES, CONTINUE]\n\nAGENT: I want to be upfront -- I'm not calling to ask you to list with me. I actually respect what you're doing. Selling yourself saves money, and I get it. The reason I'm calling is that I work with a lot of buyers in this price range right now, and I also have access to some actual closed sale data on comparable homes in your area -- not just Zillow estimates, but real sold prices within the last 90 days. I thought that might be useful to you regardless of how you sell.\n\nFSBO: We're not interested in using an agent.\n\nAGENT: Completely understood, and that's not why I called. I'm not here to pitch you a listing agreement. I'm asking for about 15 minutes to sit down, share the comparable data I have, and honestly -- just learn more about your home. If my buyers aren't the right fit, fine. But the closed price data alone is something most FSBO sellers tell me is hard to get on your own. Does that seem worth a short conversation?\n\nFSBO: We already have buyers looking at it.\n\nAGENT: That's actually great news -- and it means you're ahead of the game. A lot of FSBO sellers I talk to find that early lookers are sometimes investors or unqualified buyers testing the market. The question is whether your current buyers are pre-approved and realistic on price. That's something worth knowing before you take it off the market. Would 20 minutes this week be worth making sure you have the full picture?\n\nAGENT [APPOINTMENT ASK]: I have some availability Tuesday morning or Thursday afternoon -- which works better for you?"},{"id":17,"category_id":4,"idx":2,"title":"FSBO Voicemail Script (45 seconds)","text":"You are an expert real estate sales scriptwriter specializing in FSBO prospecting voicemails for residential agents.\n\nYour job: write a single voicemail script that is exactly 45 seconds long when read aloud at a natural, unhurried pace. At approximately 110-125 words per minute, 45 seconds = 82-93 words. The voicemail must sound human and earn a callback -- not sound like every other agent's script.\n\nThe key to a callback-earning voicemail: be specific about the property, demonstrate you have actually looked at their listing, and offer something genuinely useful in exchange for returning the call. No generic pitches.\n\nINPUTS:\n[AGENT NAME]\n[PROPERTY ADDRESS]\n[ONE SPECIFIC OBSERVATION ABOUT THEIR LISTING] (something the agent genuinely noticed -- price relative to market, days on Zillow, marketing gap, photo quality, etc.)\n[VALUE OFFERED IN EXCHANGE FOR CALLBACK] (specific -- not vague \"I have buyers\")\n[AGENT PHONE]\n\nOUTPUT FORMAT:\n- Label: word count and approximate duration at top\n- Full word-for-word voicemail script\n- Delivery note: any pacing or emphasis suggestions in [brackets]\n\nCONSTRAINTS:\n- Script must be 82-93 words (excluding labels and delivery notes).\n- Must include the agent's phone number twice -- once mid-script and once at close.\n- Do not start with \"Hi, my name is...\" -- earn attention first.\n- No fabricated urgency, no \"I have a buyer ready to make an offer\" unless true.\n- Sound like a real person who actually looked at the listing.","input":"[AGENT NAME]: Stephanie Cho\n[PROPERTY ADDRESS]: 774 Lakeview Drive, Little Rock, AR\n[ONE SPECIFIC OBSERVATION ABOUT THEIR LISTING]: the home has been on Zillow for 22 days with the same 6 photos, no floor plan, and a description that is only two sentences long -- significantly less marketing than the surrounding comparables\n[VALUE OFFERED IN EXCHANGE FOR CALLBACK]: Stephanie has recent closed sale data on three comparable homes in the neighborhood and is willing to share it for free, no appointment required\n[AGENT PHONE]: 501-884-2275","output":"WORD COUNT: 89 words | APPROXIMATE DURATION: 45 seconds\n\nHi, this message is for the owner of 774 Lakeview Drive. [pause] My name is Stephanie Cho -- 501-884-2275 -- and I took a look at your listing on Zillow today. I noticed it has been up about three weeks with six photos and a pretty short description. [pause] I am not calling to pressure you -- I actually have the closed sale data on three comparable homes in your neighborhood and I would like to share it with you, no strings attached. [pause] It might be useful for your pricing or your next steps. Give me a call when you get a chance -- Stephanie Cho, 501-884-2275. Thank you."},{"id":18,"category_id":4,"idx":3,"title":"Expired Listing First-Contact Script","text":"You are an expert real estate sales scriptwriter specializing in expired listing prospecting for residential agents.\n\nYour job: write a phone script for reaching an expired listing seller. This is NOT a FSBO script -- the key difference is that this seller already trusted an agent, listed their home, and it did not sell. They are frustrated, possibly embarrassed, and almost certainly receiving calls from multiple agents right now. The script must acknowledge their frustration directly, differentiate from every other agent calling, and earn the appointment by demonstrating diagnosis -- not just optimism.\n\nINPUTS:\n[AGENT NAME]\n[PROPERTY ADDRESS]\n[ORIGINAL LIST PRICE]\n[DAYS ON MARKET]\n[AGENT'S DIAGNOSIS] (why the agent believes it likely did not sell -- be specific: overpriced, poor photography, limited marketing, bad timing, deferred maintenance, etc.)\n\nOUTPUT FORMAT:\n- Full call script, agent lines labeled AGENT\n- Two FSBO objection responses labeled OBJECTION 1 and OBJECTION 2\n- Objection 1: \"I'm just taking a break from selling for now.\"\n- Objection 2: \"I already have several agents calling me.\"\n- End at appointment request\n- Script: 300-400 words\n\nCONSTRAINTS:\n- Do not badmouth the previous agent -- ever.\n- The diagnosis must be specific to the inputs -- no generic \"I have a different marketing approach.\"\n- Address the frustration in the first 30 seconds or lose the call.\n- No false promises or guaranteed sale language.\n- The agent must earn each transition before moving to the next.","input":"[AGENT NAME]: Paul Reeves\n[PROPERTY ADDRESS]: 3390 Stonegate Pass, Austin, TX\n[ORIGINAL LIST PRICE]: $785,000\n[DAYS ON MARKET]: 94 days\n[AGENT'S DIAGNOSIS]: Property was listed at $785K in a micro-market where comparable 4-beds had been selling in the $720K-$745K range; combined with standard photography and no staging, it likely drew skeptical buyers who could not justify the premium on first impression. Price and presentation were both working against each other.","output":"AGENT: Hi, may I speak with the owner of 3390 Stonegate Pass? [pause] My name is Paul Reeves -- I am a local agent here in Austin, and I saw that your listing on Stonegate Pass recently expired. I know you are probably getting a lot of calls right now, so I will be quick and honest with you.\n\nI am not calling to tell you that I am different from every other agent or that I have some magic system. I am calling because I looked at your listing and I think I have a specific idea of what happened -- not a general theory, but something specific to your property.\n\nDo you have two minutes?\n\n[IF YES]\n\nAGENT: The comps I pulled for 4-bedroom homes in your corridor show a closed sale range of $720,000 to $745,000 over the last six months. Your home was priced at $785,000, which is a legitimate premium -- but only if buyers could see it clearly from the moment they saw the listing. The photography and presentation did not give the home the chance to justify that number on first impression. In this market, buyers decide before they schedule a showing. If the online listing does not make the case for the price, they move on.\n\nI am not saying the home is not worth a premium. I am saying the pricing and the presentation needed to be working together, and they were not.\n\n---\n\nOBJECTION 1: \"I'm just taking a break from selling for now.\"\n\nAGENT: That makes complete sense -- 94 days is exhausting. I would just say: taking a break is absolutely fine. But the data that tells you what price will actually move the home does not expire. Whenever you are ready to revisit -- even if that is six months from now -- I would rather you have the full picture before you re-list with anyone. Would a 20-minute conversation just to review the numbers be worthwhile, even if you are not ready to do anything yet?\n\n---\n\nOBJECTION 2: \"I already have several agents calling me.\"\n\nAGENT: I am sure you do -- and most of them are going to tell you they have a different marketing approach. What I am offering is different: I looked at the specific comps and the specific listing before I called you. I am not here to pitch a system. I am here because I think I know what happened and I want to show you the data. Can I have 20 minutes this week to walk you through it?\n\nAGENT [APPOINTMENT ASK]: I have time Wednesday morning or Friday afternoon -- which one works better for you?"},{"id":19,"category_id":4,"idx":4,"title":"Expired Listing Letter (Direct Mail)","text":"You are an expert real estate direct mail copywriter specializing in expired listing outreach for residential agents.\n\nYour job: write a one-page direct mail letter to an expired listing seller. The letter must be professional, empathetic, and differentiating. It should acknowledge the seller's frustration without dwelling on it, present a specific and credible diagnosis of what went wrong, and offer a clear path forward -- without making promises that cannot be guaranteed.\n\nINPUTS:\n[SELLER ADDRESS]\n[ORIGINAL LIST PRICE]\n[DAYS ON MARKET]\n[AGENT NAME]\n[AGENT BROKERAGE]\n[AGENT PHONE]\n[AGENT EMAIL]\n[REASON 1 IT LIKELY DID NOT SELL] (specific, not generic)\n[REASON 2 IT LIKELY DID NOT SELL]\n[REASON 3 IT LIKELY DID NOT SELL] (optional)\n[WHAT THE AGENT WOULD DO DIFFERENTLY]\n\nOUTPUT FORMAT:\n- Headline: a single line at the top (not \"Dear Homeowner\")\n- 3-4 body paragraphs: empathy / diagnosis / differentiation / call to action\n- Signature block: agent name, brokerage, phone, email\n- Total length: 280-360 words\n\nCONSTRAINTS:\n- Do not start with \"I know how frustrated you must be.\"\n- Never badmouth the previous agent, directly or by implication.\n- All three reasons must be property-specific, not generic marketing speak.\n- The CTA must name a specific, low-commitment next step.\n- Tone: respectful, direct, confident without arrogance.\n- No guaranteed sale language.","input":"[SELLER ADDRESS]: 1155 Heather Glen Way, Marietta, GA\n[ORIGINAL LIST PRICE]: $629,000\n[DAYS ON MARKET]: 78 days\n[AGENT NAME]: Victoria Marsh\n[AGENT BROKERAGE]: Compass Real Estate\n[AGENT PHONE]: 678-445-9901\n[AGENT EMAIL]: vmarsh@compass.com\n[REASON 1 IT LIKELY DID NOT SELL]: The listing price of $629,000 was above the $595,000-$614,000 range where comparable 4-bed homes in Heather Glen and adjacent streets have been closing -- a $15,000-$34,000 gap that cautious buyers in this market noticed\n[REASON 2 IT LIKELY DID NOT SELL]: The listing photos showed the home unfurnished, which research consistently shows depresses perceived value -- empty rooms photograph as smaller and buyers struggle to picture the space\n[REASON 3 IT LIKELY DID NOT SELL]: The home received no price reduction during 78 days on market, which in this market causes buyers to assume there is an issue rather than an opportunity\n[WHAT THE AGENT WOULD DO DIFFERENTLY]: Price at $609,900 based on current comps, use professional staging or virtual staging on the key rooms, and implement a 21-day market review protocol with a pre-planned price strategy if showing velocity drops","output":"YOUR HOME HAS ANOTHER CHAPTER. HERE IS HOW TO WRITE IT.\n\nDear Homeowner at 1155 Heather Glen Way,\n\nSeventy-eight days on the market is a long time. You made the decision to sell, you put your home out there, and it did not get where it needed to go. Before you take a break, relist with a different number, or make any decision about next steps, I would like to offer you something: a specific, honest look at what the data says actually happened.\n\nI have pulled the comparable closed sales in Heather Glen and the surrounding streets over the last 90 days. Four-bedroom homes comparable to yours have been closing in the $595,000 to $614,000 range. At $629,000, your home entered the market carrying a premium that it needed to earn on first impression -- and two things made that harder than it should have been. The listing photographs were taken unfurnished, and research consistently shows that empty rooms photograph smaller and make it harder for buyers to connect emotionally with a space. Additionally, the price held at $629,000 through the full 78 days without adjustment, which in today's market tends to signal a problem to buyers who might otherwise have been interested.\n\nThese are solvable problems. I specialize in relisting homes that did not close the first time. My approach would start with a price of $609,900 -- in line with where comparable homes are actually closing -- combined with professional staging on the primary rooms and a structured 21-day market review so we are never reacting late. Presentation and price need to work together from day one.\n\nI would like 20 minutes with you -- no cost, no commitment. Just a conversation to walk through the numbers and show you exactly what I would do differently. Call or email me directly to set a time that works.\n\nVictoria Marsh\nCompass Real Estate\n678-445-9901 | vmarsh@compass.com"},{"id":20,"category_id":4,"idx":5,"title":"FSBO Objection-Handling Cheat Sheet","text":"You are an expert real estate sales trainer and script writer specializing in FSBO conversion for residential agents.\n\nYour job: write a complete objection-handling cheat sheet for the 8 most common objections residential FSBO sellers raise when an agent calls or visits. The format for each objection is: Objection statement -> Agent rebuttal (2-4 sentences, confident but non-combative) -> Follow-up question to keep the conversation moving.\n\nThis cheat sheet is meant to be printed or saved to a phone for real-time reference during FSBO calls or door-knocks.\n\nINPUTS:\n[AGENT MARKET]\n[TYPICAL FSBO SAVINGS CLAIM] (what FSBOs in this market typically say they will save by not using an agent -- in dollars or percentage)\n[AGENT USP] (the agent's specific differentiator -- not generic \"great service,\" but something measurable or distinctive)\n\nOUTPUT FORMAT:\nFor each of the 8 objections:\n- OBJECTION: [the seller's words, in their voice]\n- REBUTTAL: [agent response -- 2-4 sentences, specific and non-generic]\n- FOLLOW-UP QUESTION: [one question to advance the conversation]\n\nNumber each objection 1-8. Use the exact format above, consistently.\n\nCONSTRAINTS:\n- Rebuttals must use the [TYPICAL FSBO SAVINGS CLAIM] and [AGENT USP] inputs -- not generic real estate statistics.\n- No manipulation, no fear-mongering, no badgering.\n- Follow-up questions must be genuine curiosity questions, no
