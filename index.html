<script>
/* ---------- DATA ---------- */
const DATA = {"brand":{"name":"Promptdeed","tagline":"Your deed to done-for-you copy.","headline":"Stop Getting Generic Output. Start Getting Copy That Closes.","subheadline":"For busy residential agents, Promptdeed turns ChatGPT and Claude into a copywriter who actually knows real estate.","voice":"Direct, Practical, Agent-fluent","audience":"US residential real estate agents"},"categories":[{"id":1,"name":"Listing Descriptions & Property Marketing","description":"Write compelling MLS and marketing copy for listings","order":1},{"id":2,"name":"Social Media Content (Instagram, Facebook, TikTok)","description":"Engaging captions, reels scripts, and post hooks","order":2},{"id":3,"name":"Lead Follow-Up & Nurture Emails","description":"Email sequences that convert leads into clients","order":3},{"id":4,"name":"FSBO & Expired Listing Scripts","description":"Conversion scripts for hard-to-win seller leads","order":4},{"id":5,"name":"Buyer Consultation & Discovery","description":"Questions and frameworks for buyer meetings","order":5},{"id":6,"name":"Seller Listing Presentations","description":"Win listings with confidence","order":6},{"id":7,"name":"Open House Marketing & Scripts","description":"Drive traffic and convert open house visitors","order":7},{"id":8,"name":"Market Reports & Neighborhood Guides","description":"Position yourself as the local expert","order":8},{"id":9,"name":"Negotiation, Offers & Closing Communication","description":"Communicate clearly through the deal","order":9},{"id":10,"name":"Personal Branding, Bio & Video Scripts","description":"Build your brand and on-camera presence","order":10}],"prompts":[{"id":1,"category_id":1,"idx":1,"title":"Luxury Listing Description (MLS-Optimized)","text":"You are an expert real estate copywriter who writes for luxury and high-end residential listings.\n\nYour job: write an MLS listing description that is both editorially compelling AND MLS-compliant â no fair-housing violations, no exaggerated claims about returns, no language that could be construed as steering.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[KEY FEATURES] (comma-separated)\n[NEIGHBORHOOD]\n[UNIQUE SELLING POINTS]\n[COMPARABLE CONTEXT]\n[TARGET BUYER]\n[TONE] (e.g. aspirational, editorial, sophisticated)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Lead with a magnetic opening sentence that paints a lifestyle picture.\n- Body in 2â4 short paragraphs (no bullet lists). Weave in 3â5 of the strongest features naturally â don't list every input.\n- Close with a paragraph that anchors location and a soft call-to-tour.\n- Stay within Â±10% of [WORD COUNT].\n- Avoid: \"must see,\" \"won't last,\" \"motivated seller,\" any reference to protected classes, any school-quality claim.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 4821 Harborview Lane, Newport Beach, CA\n[LIST PRICE]: $3,250,000\n[BEDROOMS]: 5\n[BATHROOMS]: 4 full, 1 half\n[SQUARE FEET]: 4,850\n[LOT SIZE]: 0.38 acres\n[YEAR BUILT]: 2019\n[KEY FEATURES]: chef's kitchen with Sub-Zero and Wolf appliances, primary suite with ocean-view balcony, temperature-controlled wine cellar, resort-style pool and spa, 4-car garage, whole-home Lutron smart lighting, solar panels\n[NEIGHBORHOOD]: Newport Beach, steps from Back Bay Nature Preserve\n[UNIQUE SELLING POINTS]: unobstructed Catalina Island views, no HOA, corner lot with maximum privacy\n[COMPARABLE CONTEXT]: similar homes sold $3.1Mâ$3.5M in past 6 months\n[TARGET BUYER]: affluent move-up buyer or second-home buyer seeking coastal California lifestyle\n[TONE]: aspirational, editorial, sophisticated â think Architectural Digest\n[WORD COUNT]: 280","output":"Rarely does a residence so effortlessly merge architectural precision with the boundless spirit of the California coast. Set on a private corner lot in one of Newport Beach's most coveted enclaves, 4821 Harborview Lane is a 2019-built masterwork where every detail has been curated for those who refuse to compromise.\n\nFive bedrooms and four-and-a-half baths unfold across 4,850 square feet of light-drenched living space, anchored by a chef's kitchen outfitted with Sub-Zero refrigeration and Wolf professional appliances. Entertain without limitation â a temperature-controlled wine cellar awaits your collection while the resort-style pool and spa transform the 0.38-acre grounds into a private retreat.\n\nAscend to the primary suite and step onto your private balcony where unobstructed views of Catalina Island greet each morning. Whole-home Lutron smart lighting, owned solar panels, and a 4-car garage ensure every modern convenience is accounted for â without the constraints of an HOA.\n\nSteps from the Back Bay Nature Preserve and minutes from Newport Beach's most celebrated dining and coastline, this is more than a home â it's a deed to the coastal California lifestyle most can only imagine. Schedule your private tour today."},{"id":2,"category_id":1,"idx":2,"title":"Entry-Level Home Description for First-Time Buyers","text":"You are a real estate copywriter who specializes in starter homes and entry-level residential properties.\n\nYour job: write an MLS listing description that speaks directly to first-time buyers — emphasizing value, livability, and opportunity WITHOUT patronizing language or false urgency.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[KEY FEATURES] (comma-separated)\n[NEIGHBORHOOD]\n[NEARBY AMENITIES] (schools, transit, parks, shopping)\n[WHAT MAKES IT A GOOD STARTER HOME]\n[RECENT UPDATES OR IMPROVEMENTS]\n[TONE] (e.g. warm, encouraging, straightforward)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Open with a sentence that positions the home as an achievable milestone — not a compromise.\n- Body in 2–3 short paragraphs. Highlight livability: layout flow, natural light, storage, outdoor space.\n- Weave in 2–3 recent updates naturally.\n- Close with neighborhood anchoring and a welcoming call to schedule a showing.\n- Stay within ±10% of [WORD COUNT].\n- Avoid: \"great investment,\" \"won't last,\" \"perfect starter,\" any reference to protected classes, school-quality claims, ROI promises.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 312 Maple Creek Drive, Mesa, AZ\n[LIST PRICE]: $385,000\n[BEDROOMS]: 3\n[BATHROOMS]: 2\n[SQUARE FEET]: 1,420\n[LOT SIZE]: 0.14 acres\n[YEAR BUILT]: 2004\n[KEY FEATURES]: open-concept kitchen and living area, covered back patio, two-car garage, ceiling fans in every room, low-maintenance desert landscaping\n[NEIGHBORHOOD]: Southeast Mesa, near Superstition Springs\n[NEARBY AMENITIES]: Superstition Springs Center (0.5 mi), Mesa Riverview Park (1.2 mi), light rail extension (0.8 mi), multiple grocery options within 1 mile\n[WHAT MAKES IT A GOOD STARTER HOME]: single-story layout easy to maintain, low HOA ($45/mo covers common areas), energy-efficient dual-pane windows, move-in ready\n[RECENT UPDATES OR IMPROVEMENTS]: new interior paint (2025), replaced water heater (2024), updated kitchen faucet and hardware (2025)\n[TONE]: warm, encouraging, straightforward\n[WORD COUNT]: 200","output":"Welcome to 312 Maple Creek Drive — a move-in-ready single-story home where comfort meets convenience in one of Southeast Mesa's most connected neighborhoods. Three bedrooms and two full baths flow across 1,420 square feet of thoughtfully designed living space, anchored by an open-concept kitchen and living area that feels far larger than the floor plan suggests.\n\nFreshly painted interiors and updated kitchen hardware give the home a clean, current feel, while dual-pane windows and ceiling fans in every room keep energy costs in check year-round. Step outside to a covered back patio overlooking low-maintenance desert landscaping — the kind of private outdoor space that makes weekday evenings feel like a getaway.\n\nWith Superstition Springs Center just half a mile away, the light rail extension under a mile out, and a two-car garage waiting for you, daily life here is refreshingly simple. Schedule your showing and see it for yourself."},{"id":3,"category_id":1,"idx":3,"title":"Fixer-Upper / Investor Listing Description","text":"You are a real estate copywriter who writes for value-add and investor-focused residential listings.\n\nYour job: write an MLS listing description that honestly presents a property's current condition while spotlighting its upside potential — WITHOUT making specific ROI projections, income guarantees, or exaggerated rehab claims.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[CURRENT CONDITION] (honest assessment)\n[WHAT WORKS WELL] (structural positives, location, bones)\n[KEY OPPORTUNITIES] (what a buyer could improve)\n[NEIGHBORHOOD TREND] (up-and-coming, stable, revitalizing, etc.)\n[ZONING / PERMITTED USES]\n[COMPARABLE CONTEXT] (nearby renovated comps if available)\n[TARGET BUYER] (investor, house-hacker, contractor-buyer, etc.)\n[TONE] (e.g. candid, opportunity-focused, no-nonsense)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Lead with an honest, confident sentence about the opportunity — not the problems.\n- Body in 2–3 paragraphs. Acknowledge condition candidly, then pivot to structural strengths, location, and upside.\n- Reference zoning and neighborhood trend naturally.\n- Close with a sentence about who this home is built for and a call to tour.\n- Stay within ±10% of [WORD COUNT].\n- Avoid: specific dollar ROI claims, \"handyman special,\" \"TLC,\" \"diamond in the rough,\" any reference to protected classes.\n\nReturn only the description. No headings, no explanations.","input":"[PROPERTY ADDRESS]: 1847 Orchard Street, Sacramento, CA\n[LIST PRICE]: $310,000\n[BEDROOMS]: 4\n[BATHROOMS]: 2\n[SQUARE FEET]: 1,680\n[LOT SIZE]: 0.22 acres\n[YEAR BUILT]: 1958\n[CURRENT CONDITION]: original kitchen and bathrooms, hardwood floors under carpet (verified), roof replaced 2019, foundation solid per seller inspection, cosmetically dated\n[WHAT WORKS WELL]: generous lot for the area, mature trees, detached two-car garage with 220V, copper plumbing replaced 2012, hardwood floors throughout\n[KEY OPPORTUNITIES]: kitchen/bath remodel, open up wall between kitchen and dining, ADU potential in backyard given lot size\n[NEIGHBORHOOD TREND]: Oak Park — actively revitalizing, new restaurants and mixed-use projects within 5 blocks\n[ZONING / PERMITTED USES]: R-1 with Sacramento ADU overlay — detached ADU up to 1,200 sq ft permitted by right\n[COMPARABLE CONTEXT]: renovated 3bd/2ba homes on same street selling $485K–$520K\n[TARGET BUYER]: investor, house-hacker, or owner-occupant comfortable with renovation\n[TONE]: candid, opportunity-focused, no-nonsense\n[WORD COUNT]: 220","output":"Four bedrooms, a 0.22-acre lot, and a foundation that's stood solid since 1958 — 1847 Orchard Street delivers the kind of canvas that experienced buyers recognize on sight. Located in Sacramento's Oak Park neighborhood, where new restaurants and mixed-use projects continue to reshape the streetscape, this home sits in the path of momentum.\n\nThe bones tell the story: hardwood floors run beneath the existing carpet, copper plumbing was replaced in 2012, and the roof went on new in 2019. Kitchens and bathrooms are original and ready for your vision — the wall between kitchen and dining is a natural candidate for opening up the floor plan. Out back, a detached two-car garage with 220V service anchors a generous lot that qualifies for a detached ADU up to 1,200 square feet under Sacramento's current overlay.\n\nWhether you're planning a renovation, exploring house-hacking with an ADU, or looking for long-term positioning in a neighborhood that's clearly moving, this property warrants a walk-through. Schedule your tour today."},{"id":4,"category_id":1,"idx":4,"title":"Luxury Estate Property Brochure Copy","text":"You are an editorial real estate copywriter who creates property brochure copy for luxury estates — the kind of writing found in Sotheby's International Realty or Christie's Real Estate publications.\n\nYour job: write brochure-quality property copy that reads like a feature in Architectural Digest or Robb Report — evocative, sensory, and lifestyle-driven while remaining factually grounded.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET] / [LOT SIZE] / [YEAR BUILT]\n[ARCHITECTURAL STYLE]\n[KEY FEATURES] (comma-separated, include materials and finishes)\n[OUTDOOR / GROUNDS]\n[VIEWS]\n[NEIGHBORHOOD / SETTING]\n[LIFESTYLE STORY] (what daily life feels like here)\n[TARGET BUYER PROFILE]\n[TONE] (e.g. editorial, sensory, restrained elegance)\n[WORD COUNT]\n\nOUTPUT FORMAT:\n- Headline: a 5–8 word aspirational headline (not the address).\n- Subhead: one sentence that anchors location and architectural identity.\n- Body: 3–4 paragraphs of narrative copy. Paint rooms as experiences, not inventories. Use sensory language — light, texture, sound, movement.\n- Close with a lifestyle-forward final paragraph and a discreet call to arrange a private showing.\n- Stay within ±10% of [WORD COUNT] (excluding headline/subhead).\n- Avoid: \"must see,\" \"stunning,\" \"breathtaking,\" \"one-of-a-kind,\" any reference to protected classes, school-quality claims.\n\nReturn headline, subhead, and body. No other formatting.","input":"[PROPERTY ADDRESS]: 9 Promontory Ridge, Park City, UT\n[LIST PRICE]: $8,750,000\n[BEDROOMS]: 6\n[BATHROOMS]: 7\n[SQUARE FEET]: 8,200\n[LOT SIZE]: 2.1 acres\n[YEAR BUILT]: 2021\n[ARCHITECTURAL STYLE]: contemporary mountain modern — clean lines, floor-to-ceiling glass, reclaimed timber and steel accents\n[KEY FEATURES]: great room with 22-foot ceilings and a steel-and-stone fireplace, chef's kitchen with Gaggenau appliances, primary suite with soaking tub and steam shower, home theater, temperature-controlled wine vault (400+ bottles), heated driveway and walkways, elevator, Savant whole-home automation\n[OUTDOOR / GROUNDS]: infinity-edge heated pool, outdoor kitchen with built-in grill and pizza oven, fire pit terrace, ski prep room with boot warmers\n[VIEWS]: 270-degree panoramic views of the Wasatch Range and Deer Valley slopes\n[NEIGHBORHOOD / SETTING]: Promontory, a private 6,400-acre community with Jack Nicklaus golf, equestrian center, and Pete Dye canyon course\n[LIFESTYLE STORY]: mornings begin with coffee on the terrace watching the sunrise hit the Wasatch; winters mean ski-in convenience to Deer Valley; summers are golf, horseback riding, and evening swims as the mountains turn golden\n[TARGET BUYER PROFILE]: ultra-high-net-worth buyer seeking a four-season mountain retreat with resort-level amenities\n[TONE]: editorial, sensory, restrained elegance\n[WORD COUNT]: 350","output":"Where the Mountain Meets the Sky\n\nA contemporary mountain estate on 2.1 acres in Park City's Promontory community, framed by 270-degree views of the Wasatch Range.\n\nMorning light enters through floor-to-ceiling glass and travels slowly across 8,200 square feet of living space, illuminating the interplay of reclaimed timber, blackened steel, and natural stone that defines this 2021 residence. The great room — anchored by a 22-foot ceiling and a monolithic steel-and-stone fireplace — is less a room than an atmosphere, one that shifts with every hour of daylight and every season outside the glass.\n\nThe chef's kitchen, outfitted with Gaggenau appliances and a generous island, opens directly to outdoor living: a built-in grill, a wood-fired pizza oven, and a terrace that steps down to a heated infinity-edge pool. From here, the Wasatch Range unfolds in layers — Deer Valley's slopes to the north, the canyon ridgelines to the south — a panorama that belongs to no single frame.\n\nSix bedrooms and seven baths provide space for both solitude and gathering. The primary suite offers a soaking tub positioned beside the glass, a steam shower, and a private terrace. Below, a home theater and a temperature-controlled wine vault for over 400 bottles anchor the lower level. Savant automation governs climate, lighting, and security throughout, while heated walkways and a dedicated ski prep room with boot warmers ensure that winter is met on your terms.\n\nSet within Promontory's private 6,400-acre community — home to Jack Nicklaus and Pete Dye golf courses, an equestrian center, and miles of trail — this is a residence designed for those who measure luxury not in fixtures but in the quality of each day. Private showings are available by appointment."},{"id":5,"category_id":1,"idx":5,"title":"Just-Listed Multi-Channel Marketing Kit","text":"You are a real estate marketing strategist and copywriter.\n\nYour job: create a complete \"Just Listed\" multi-channel marketing kit from a single set of property inputs. The kit should include copy for multiple platforms, all with a consistent voice and message hierarchy — so the agent can deploy across channels the same day the listing goes live.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[KEY FEATURES] (top 3–5)\n[NEIGHBORHOOD]\n[TARGET BUYER]\n[AGENT NAME]\n[AGENT PHONE]\n[OPEN HOUSE DATE/TIME] (if applicable — write \"N/A\" to skip)\n[TONE]\n\nOUTPUT FORMAT — deliver ALL of the following, clearly labeled:\n\n1. MLS TEASER (2–3 sentences, under 50 words — for syndication previews)\n2. INSTAGRAM CAPTION (conversational, 80–120 words, include 5 relevant hashtags)\n3. FACEBOOK POST (slightly longer, 100–150 words, include a call-to-action)\n4. EMAIL SUBJECT LINE + PREVIEW TEXT (subject ≤60 chars, preview ≤90 chars)\n5. EMAIL BODY (150–200 words — for the agent's database blast)\n6. TEXT/SMS (under 160 characters including a placeholder link)\n\nKeep all pieces consistent in tone and messaging hierarchy. Do not repeat the same sentence across channels. No fair-housing violations. No exaggerated claims.","input":"[PROPERTY ADDRESS]: 2205 Birch Hollow Lane, Charlotte, NC\n[LIST PRICE]: $575,000\n[BEDROOMS]: 4\n[BATHROOMS]: 3.5\n[SQUARE FEET]: 2,800\n[KEY FEATURES]: open-plan living with 10-ft ceilings, screened porch overlooking wooded lot, newly renovated kitchen with quartz counters, finished basement with wet bar, two-car garage\n[NEIGHBORHOOD]: Ballantyne, South Charlotte\n[TARGET BUYER]: move-up family buyer\n[AGENT NAME]: Sarah Mitchell\n[AGENT PHONE]: (704) 555-0192\n[OPEN HOUSE DATE/TIME]: Saturday, June 7, 1–3 PM\n[TONE]: warm, confident, community-focused","output":"1. MLS TEASER\nFreshly renovated 4-bed in Ballantyne with 10-ft ceilings, a screened porch on a wooded lot, and a finished basement with wet bar. Open house Saturday, June 7.\n\n2. INSTAGRAM CAPTION\nJust listed in Ballantyne and I'm genuinely excited about this one. 4 beds, 3.5 baths, 2,800 sq ft — with the kind of screened porch you'll want to eat every meal on. The kitchen was just renovated (hello, quartz counters), the basement has a wet bar for hosting, and the lot backs to trees so your view is just… green. Open house this Saturday, June 7 from 1–3 PM. DM me or call (704) 555-0192 for a private tour before then.\n\n#BallantyneLiving #CharlotteRealEstate #JustListed #NCHomes #OpenHouseSaturday\n\n3. FACEBOOK POST\nJust Listed — 2205 Birch Hollow Lane, Ballantyne | $575,000\n\nThis is the Ballantyne home that checks the boxes you didn't think you could get at this price point: 4 bedrooms, 3.5 baths, 2,800 square feet, 10-foot ceilings, and a screened porch overlooking a private wooded lot. The kitchen was recently renovated with quartz counters and modern finishes, and the finished basement with a wet bar gives you a whole extra floor for living and entertaining.\n\nOpen House: Saturday, June 7, 1–3 PM. Can't make it? Call me at (704) 555-0192 to schedule a private showing. Serious inquiries are already coming in — let's get you through the door.\n\n4. EMAIL SUBJECT LINE + PREVIEW TEXT\nSubject: Just Listed in Ballantyne — Open House Saturday\nPreview: 4 bed, screened porch, renovated kitchen, finished basement. $575K.\n\n5. EMAIL BODY\nHi [First Name],\n\nI just listed a home in Ballantyne that I wanted to make sure hit your inbox before the weekend.\n\n2205 Birch Hollow Lane is a 4-bedroom, 3.5-bath home with 2,800 square feet of living space — including a finished basement with a wet bar. The kitchen was recently renovated with quartz counters and updated fixtures, and the main level features 10-foot ceilings and an open floor plan that flows naturally into a screened porch overlooking a wooded, private backyard.\n\nListed at $575,000, this is a home that delivers on both space and setting. I'm hosting an open house this Saturday, June 7 from 1–3 PM, and I'd also be happy to arrange a private tour at a time that works for you.\n\nReach out anytime — (704) 555-0192.\n\nWarm regards,\nSarah Mitchell\n\n6. TEXT/SMS\nJust listed in Ballantyne! 4bd/3.5ba, renovated kitchen, screened porch, $575K. Open house Sat 6/7 1-3PM. Details: [LINK]"},{"id":6,"category_id":2,"idx":1,"title":"Instagram Carousel: Just-Sold Story","text":"You are a social media copywriter for real estate agents who specializes in Instagram carousel content.\n\nYour job: write an Instagram carousel post (slides + caption) for a \"Just Sold\" story that celebrates the win, builds the agent's credibility, and invites engagement — WITHOUT revealing confidential transaction details or making the client uncomfortable.\n\nINPUTS:\n[PROPERTY TYPE] (condo, single-family, townhouse, etc.)\n[NEIGHBORHOOD / CITY]\n[BUYER OR SELLER SIDE] (or both)\n[SALE PRICE RANGE] (e.g. \"mid-$400s\" — exact price optional)\n[TIMELINE] (e.g. \"under contract in 5 days,\" \"closed in 28 days\")\n[CHALLENGE OVERCOME] (e.g. multiple offers, appraisal gap, relocation timeline)\n[CLIENT QUOTE OR SENTIMENT] (optional — even a paraphrase works)\n[KEY TAKEAWAY FOR FOLLOWERS] (lesson or insight from this deal)\n[AGENT NAME]\n[NUMBER OF CAROUSEL SLIDES] (4–7)\n[TONE] (e.g. celebratory, humble, educational)\n\nOUTPUT FORMAT:\n- For each slide: SLIDE [N]: [bold headline text] + [supporting text, 1–2 sentences]. Keep slide text short enough to fit a designed graphic.\n- After all slides: CAPTION (80–120 words, conversational, with a question or CTA at the end and 5 hashtags).\n- Final slide should always be a CTA (\"Thinking about selling?\" etc.)\n\nNo client last names. No exact sale prices unless the agent opts in. No fair-housing issues.","input":"[PROPERTY TYPE]: single-family home\n[NEIGHBORHOOD / CITY]: Brentwood, TN\n[BUYER OR SELLER SIDE]: seller side\n[SALE PRICE RANGE]: low $700s\n[TIMELINE]: under contract in 3 days, closed in 30\n[CHALLENGE OVERCOME]: priced strategically to generate multiple offers in a slowing market\n[CLIENT QUOTE OR SENTIMENT]: \"We were nervous about timing but you made it feel effortless.\"\n[KEY TAKEAWAY FOR FOLLOWERS]: pricing strategy matters more than market conditions\n[AGENT NAME]: James Rivera\n[NUMBER OF CAROUSEL SLIDES]: 5\n[TONE]: celebratory but educational","output":"SLIDE 1: JUST SOLD IN BRENTWOOD\nAnother family's next chapter starts here.\n\nSLIDE 2: THE CHALLENGE\nMarket was slowing. Buyers were cautious. The pressure to overprice was real.\n\nSLIDE 3: THE STRATEGY\nWe priced to attract — not to chase. Three days on market. Multiple offers. Closed at asking.\n\nSLIDE 4: THE TAKEAWAY\nPricing strategy matters more than market conditions. The right price creates urgency even when headlines say otherwise.\n\nSLIDE 5: YOUR TURN?\nThinking about selling in Brentwood or Nashville? Let's talk strategy before you list. DM me or tap the link in bio.\n\nCAPTION:\nJust closed on a beautiful home in Brentwood — and this one felt especially rewarding. The market had shifted, buyers were taking their time, and the temptation to overprice was strong. Instead, we built a pricing strategy designed to create urgency, and it worked: under contract in 3 days with multiple offers.\n\nMy favorite part? My clients told me, \"We were nervous about timing but you made it feel effortless.\" That's the goal every single time.\n\nIf you're thinking about selling, the market hasn't closed the window — you just need the right strategy. Drop a question below or DM me.\n\n#JustSold #BrentwoodTN #NashvilleRealEstate #SellerStrategy #RealEstateAgent"},{"id":7,"category_id":2,"idx":2,"title":"30-Second Reel Script: Neighborhood Spotlight","text":"You are a social media content strategist for real estate agents who creates short-form video scripts.\n\nYour job: write a 30-second Reel/Shorts script for a neighborhood spotlight that makes viewers want to learn more about the area — and positions the agent as the local expert.\n\nINPUTS:\n[NEIGHBORHOOD NAME]\n[CITY / STATE]\n[3–5 NEIGHBORHOOD HIGHLIGHTS] (specific places, features, or vibes — not generic)\n[TARGET AUDIENCE] (e.g. young families, remote workers, retirees)\n[HOOK STYLE] (e.g. \"hot take,\" \"did you know,\" \"POV,\" \"unpopular opinion,\" \"if you…then\")\n[AGENT NAME]\n[CTA] (e.g. \"Follow for more,\" \"DM me,\" \"Comment your neighborhood\")\n\nOUTPUT FORMAT:\n- HOOK (first 3 seconds — the line that stops the scroll)\n- BODY (3–5 short spoken lines, each 4–8 seconds of screen time — write for speaking pace)\n- CTA (final 3–4 seconds)\n- VISUAL NOTES (brief suggestions for what to show on screen for each section — B-roll style)\n- Total script should be speakable in 28–32 seconds at natural pace.","input":"[NEIGHBORHOOD NAME]: East Nashville\n[CITY / STATE]: Nashville, TN\n[3–5 NEIGHBORHOOD HIGHLIGHTS]: Five Points district walkability, Shelby Bottoms Greenway for trails, The Pharmacy (James Beard–nominated burgers), live music at The Basement East, median home price still under $500K\n[TARGET AUDIENCE]: young professionals and creative types relocating to Nashville\n[HOOK STYLE]: \"if you…then\"\n[AGENT NAME]: Maya Collins\n[CTA]: Follow for more Nashville neighborhood breakdowns","output":"HOOK (0–3 sec):\n\"If you're moving to Nashville and you want culture without the Broadway chaos — you need to know about East Nashville.\"\n\nBODY (3–25 sec):\n\"Five Points is your walkable downtown — coffee shops, vinyl stores, restaurants all within a few blocks.\"\n\n\"Shelby Bottoms Greenway gives you five miles of trails right along the Cumberland River.\"\n\n\"The food scene is legit — The Pharmacy is James Beard–nominated and it's just a regular Tuesday spot here.\"\n\n\"And live music? The Basement East is where you see artists before they blow up.\"\n\n\"Median home price is still under 500K — which in Nashville right now is saying something.\"\n\nCTA (25–30 sec):\n\"Follow me for more Nashville neighborhood breakdowns — I'm Maya Collins, and I do this every week.\"\n\nVISUAL NOTES:\n- Hook: agent walking down a colorful East Nashville street\n- Five Points: quick cuts of storefronts, coffee shop interior, people walking\n- Shelby Bottoms: drone or wide shot of greenway along river\n- The Pharmacy: close-up of food, bustling patio\n- Basement East: exterior neon sign, quick interior concert clip\n- CTA: agent to camera, casual setting"},{"id":8,"category_id":2,"idx":3,"title":"Facebook Post: Open House Invitation","text":"You are a social media copywriter for real estate agents who writes Facebook posts.\n\nYour job: write a Facebook post that promotes an upcoming open house — conversational enough to feel organic in a feed, specific enough to get the right buyers through the door, and structured to maximize shares among the agent's sphere.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[TOP 3 FEATURES]\n[NEIGHBORHOOD]\n[OPEN HOUSE DATE / TIME]\n[WHAT MAKES THIS ONE SPECIAL] (1–2 sentences from the agent's perspective)\n[AGENT NAME]\n[AGENT PHONE]\n[TONE] (e.g. friendly, community-focused, energetic)\n\nOUTPUT FORMAT:\n- Opening line that's scroll-stopping (not \"Just listed!\" or \"Open house this weekend!\")\n- 3–5 sentences of property description (conversational, not MLS-formal)\n- Clear open house details (date, time, address)\n- CTA that encourages both attendance AND sharing (\"Know someone looking?\")\n- No hashtags on Facebook (they underperform). No fair-housing violations.\n- Total length: 120–180 words.","input":"[PROPERTY ADDRESS]: 814 Sycamore Bend, Franklin, TN\n[LIST PRICE]: $649,000\n[BEDROOMS]: 4\n[BATHROOMS]: 3\n[SQUARE FEET]: 2,650\n[TOP 3 FEATURES]: wrap-around front porch, chef's kitchen with gas range, fenced backyard with mature oaks\n[NEIGHBORHOOD]: Westhaven, Franklin\n[OPEN HOUSE DATE / TIME]: Sunday, June 8, 2–4 PM\n[WHAT MAKES THIS ONE SPECIAL]: \"This is the house where you sit on the porch and forget you're five minutes from downtown Franklin.\"\n[AGENT NAME]: Sarah Mitchell\n[AGENT PHONE]: (615) 555-0234\n[TONE]: friendly, community-focused","output":"This is the house where you sit on the porch and forget you're five minutes from downtown Franklin.\n\n814 Sycamore Bend just hit the market in Westhaven, and I wanted to share it here before anywhere else. Four bedrooms, three baths, 2,650 square feet — with a wrap-around front porch that's going to be hard to leave once you sit down. Inside, the chef's kitchen has a gas range and plenty of counter space for the way people actually cook and gather. Out back, a fenced yard with mature oaks gives you shade and privacy that usually takes a decade to grow.\n\nCome see it this Sunday, June 8 from 2–4 PM at 814 Sycamore Bend, Franklin.\n\nKnow someone who's been looking in Westhaven or Franklin? Tag them or share this post — I'd love to help them find their spot. Questions? Call or text me anytime: (615) 555-0234.\n\n— Sarah Mitchell"},{"id":9,"category_id":2,"idx":4,"title":"TikTok Hook: Common Buyer Mistake","text":"You are a social media strategist who creates TikTok and Reels content for real estate agents.\n\nYour job: write a short-form video script built around a \"common buyer mistake\" hook — educational, slightly provocative, and designed to position the agent as someone who protects their clients from costly errors.\n\nINPUTS:\n[MISTAKE TOPIC] (the specific buyer mistake to address)\n[WHY IT HAPPENS] (1–2 sentences on why buyers make this error)\n[WHAT GOES WRONG] (the consequence)\n[WHAT TO DO INSTEAD] (the agent's advice)\n[AGENT NAME]\n[CTA]\n[VIDEO LENGTH] (15, 30, or 60 seconds)\n\nOUTPUT FORMAT:\n- HOOK (first 2–3 seconds — designed to stop the scroll)\n- PROBLEM (explain the mistake — 2–3 spoken sentences)\n- FIX (what smart buyers do instead — 2–3 spoken sentences)\n- CTA (3–4 seconds)\n- ON-SCREEN TEXT SUGGESTIONS (text overlays for each section)\n- Total speaking time should match [VIDEO LENGTH] ±3 seconds.","input":"[MISTAKE TOPIC]: waiving the home inspection to \"win\" a bidding war\n[WHY IT HAPPENS]: buyers panic in competitive markets and their offer keeps getting rejected, so they drop contingencies to stand out\n[WHAT GOES WRONG]: they inherit hidden problems — foundation issues, bad HVAC, plumbing — and have zero recourse after closing\n[WHAT TO DO INSTEAD]: keep the inspection but shorten the contingency period to 5 days and offer to accept the home \"as-is\" for minor repairs (negotiate only for safety/structural)\n[AGENT NAME]: David Park\n[CTA]: Save this for your next offer. Follow for more buyer tips.\n[VIDEO LENGTH]: 30 seconds","output":"HOOK (0–3 sec):\n\"Stop waiving your home inspection. I don't care how competitive the market is.\"\n\nPROBLEM (3–15 sec):\n\"I get it — your offer keeps losing, and someone told you dropping the inspection makes you more attractive to sellers.\"\n\n\"But here's what happens: you close, and three months later you find out the foundation is cracked, the HVAC is dying, and you have zero recourse.\"\n\nFIX (15–25 sec):\n\"Here's what to do instead: keep the inspection, but shorten the contingency to five days.\"\n\n\"Tell the seller you'll accept the home as-is for minor stuff and only negotiate on safety or structural issues.\"\n\n\"You stay protected AND your offer stays competitive.\"\n\nCTA (25–30 sec):\n\"Save this for your next offer. I'm David Park — follow for more buyer tips that actually protect your money.\"\n\nON-SCREEN TEXT SUGGESTIONS:\n- Hook: \"STOP WAIVING YOUR INSPECTION\" (bold, red or white on dark)\n- Problem: \"What happens when you skip it:\" → show list appearing\n- Fix: \"Do this instead:\" → \"5-day contingency + as-is for minor repairs\"\n- CTA: \"@davidpark.realtor | Follow for buyer tips\""},{"id":10,"category_id":2,"idx":5,"title":"Weekly Content Calendar (7 Posts)","text":"You are a social media content strategist for real estate agents.\n\nYour job: generate a full 7-day social media content calendar — one post per day — that balances value, personality, and lead generation. Each post should be platform-ready for Instagram (but adaptable to Facebook).\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA] (city or neighborhood focus)\n[CURRENT LISTINGS] (0–3 addresses or \"none right now\")\n[CONTENT PILLARS] (3–4 themes the agent wants to be known for, e.g. \"first-time buyers,\" \"local expert,\" \"market data,\" \"lifestyle\")\n[WEEK THEME] (optional — e.g. \"summer market kickoff,\" \"back to school,\" or \"none\")\n[AGENT PERSONALITY] (e.g. data-driven, warm and funny, polished, no-BS)\n\nOUTPUT FORMAT:\nFor each day (Monday–Sunday):\n- DAY + POST TYPE (e.g. \"Monday — Educational Carousel\")\n- CAPTION (60–100 words, platform-ready)\n- VISUAL SUGGESTION (what the image/video should be)\n- HASHTAGS (5 per post)\n- GOAL (awareness, engagement, lead gen, or authority)\n\nMix post types: carousel, static image, Reel, story prompt, testimonial, poll, personal/behind-the-scenes. Never put two of the same type back-to-back.","input":"[AGENT NAME]: Rachel Torres\n[MARKET / AREA]: Austin, TX (focus on East Austin and Mueller)\n[CURRENT LISTINGS]: 1402 Pecan Grove, Mueller ($485,000) — no others right now\n[CONTENT PILLARS]: first-time buyers, local neighborhood knowledge, market transparency, personal/relatable\n[WEEK THEME]: summer market kickoff\n[AGENT PERSONALITY]: warm and funny, approachable data nerd","output":"MONDAY — Educational Carousel\nCaption: Summer market is here, and if you've been sitting on the sidelines, here's what you actually need to know. I broke down 5 key numbers from Austin's May housing data — no spin, no fear-mongering. Swipe through and tell me which stat surprised you most.\nVisual: 5-slide carousel with one stat per slide (clean design, branded colors)\nHashtags: #AustinRealEstate #HomeBuyingTips #AustinHousingMarket #FirstTimeBuyer #MarketUpdate\nGoal: Authority\n\nTUESDAY — Reel: Neighborhood Spotlight\nCaption: East Austin in 60 seconds. If you've been curious about this side of town — the food, the vibe, the home prices — this one's for you. Full breakdown on my page. What neighborhood should I do next? Drop it below.\nVisual: 30–60 sec Reel walking through East Austin — tacos, murals, streets, a for-sale sign\nHashtags: #EastAustin #AustinNeighborhoods #AustinTX #MoveToAustin #NeighborhoodGuide\nGoal: Awareness + Engagement\n\nWEDNESDAY — Static Post: Active Listing\nCaption: Just a casual 3-bed in Mueller with a chef's kitchen and a backyard that actually fits a table AND a grill. 1402 Pecan Grove is live at $485K. DM me for a tour or tap the link in bio for the full listing. This one's going to go — summer buyers are awake.\nVisual: Best exterior or kitchen photo of 1402 Pecan Grove\nHashtags: #MuellerAustin #AustinHomesForSale #JustListed #AustinRealtor #MuellerHomes\nGoal: Lead Gen\n\nTHURSDAY — Story Poll / Q&A\nCaption: (Post to Stories, not feed) \"Quick poll: What's stopping you from buying this summer? A) Prices B) Rates C) Not sure where to start D) I just like watching from the sidelines 😄\" — Follow up with a story response addressing the top answer.\nVisual: Text-on-background story with poll sticker\nHashtags: N/A (Stories)\nGoal: Engagement\n\nFRIDAY — Personal / Behind-the-Scenes\nCaption: Friday confession: I got into real estate because I was obsessed with floor plans as a kid. Like, I would draw them for fun. In notebooks. At restaurants. My parents were thrilled. Anyway — now I get paid to walk through houses and I still draw floor plans for fun. Some things don't change. Happy Friday, Austin.\nVisual: Photo of Rachel at a showing, casual/laughing, or a throwback photo\nHashtags: #RealEstateLife #AustinAgent #BehindTheScenes #AgentLife #FridayVibes\nGoal: Engagement + Relatability\n\nSATURDAY — Testimonial / Social Proof\nCaption: \"We thought buying our first home in Austin was going to be a nightmare. Rachel made it feel like a plan, not a panic.\" — J & M, closed last month in Mueller. First-time buyers, if you're feeling overwhelmed — that's normal. It's literally my job to make it not overwhelming. DM me when you're ready. No pressure, no timeline.\nVisual: Designed quote graphic or closing-day photo (with permission)\nHashtags: #ClientLove #AustinFirstTimeBuyer #HomeBuyerTips #MuellerAustin #RealEstateTestimonial\nGoal: Authority + Lead Gen\n\nSUNDAY — Lifestyle / Local Love\nCaption: Sunday morning, East Austin edition. Coffee from Figure 8, tacos from Veracruz, and a walk through Mueller Lake Park before it hits 95 degrees. If you're thinking about moving to this side of town, this is what your weekends could look like. What's your Sunday Austin routine? Tell me below.\nVisual: Casual photo or Reel of the Sunday routine — coffee, tacos, park\nHashtags: #AustinLifestyle #EastAustinLiving #SundayInAustin #MuellerLiving #AustinVibes\nGoal: Awareness + Engagement"},{"id":11,"category_id":3,"idx":1,"title":"Cold Lead Re-Engagement Email","text":"You are an email copywriter for real estate agents who specializes in lead re-engagement.\n\nYour job: write a single re-engagement email to a cold lead — someone who inquired about buying or selling 3–12 months ago but went silent. The email should feel personal (not automated), provide genuine value, and open a door without pressure.\n\nINPUTS:\n[LEAD FIRST NAME]\n[HOW THEY ORIGINALLY CONNECTED] (e.g. open house, website inquiry, Zillow lead, referral)\n[THEIR ORIGINAL INTEREST] (e.g. buying in [area], selling their home, general curiosity)\n[TIME SINCE LAST CONTACT] (e.g. 6 months, 4 months)\n[SOMETHING VALUABLE TO SHARE] (a market stat, new listing, rate change, neighborhood update — something relevant to their original interest)\n[AGENT NAME]\n[AGENT PHONE]\n[TONE] (e.g. casual, warm, professional)\n\nOUTPUT FORMAT:\n- SUBJECT LINE (under 50 characters, curiosity-driven, no clickbait)\n- EMAIL BODY (120–180 words, 3–4 short paragraphs)\n  - Paragraph 1: acknowledge the time gap naturally — no guilt\n  - Paragraph 2: deliver the value item\n  - Paragraph 3: soft re-open — \"if your plans have changed or you're still thinking about it\"\n  - Sign-off with name and phone\n- No \"just checking in\" or \"touching base.\" No pressure language.","input":"[LEAD FIRST NAME]: Marcus\n[HOW THEY ORIGINALLY CONNECTED]: Zillow inquiry on a listing in Cary, NC\n[THEIR ORIGINAL INTEREST]: buying a 3-bed home in Cary for under $450K\n[TIME SINCE LAST CONTACT]: 5 months\n[SOMETHING VALUABLE TO SHARE]: Cary's median home price just dipped 3% from the November peak — first sustained dip in 18 months — and inventory is up 22% year-over-year\n[AGENT NAME]: James Rivera\n[AGENT PHONE]: (919) 555-0187\n[TONE]: casual, warm","output":"Subject: Cary market shifted — thought of you\n\nHi Marcus,\n\nIt's been a few months since we connected on that Cary listing, and I wanted to send you something I thought you'd find useful — no strings attached.\n\nCary's median home price just dipped 3% from its November peak, and that's the first sustained pullback we've seen in a year and a half. Inventory is up 22% year-over-year, which means buyers are seeing 2–3 more options in the $400K range than they were last fall. For anyone looking in your price range, the math has shifted in a real way.\n\nIf your plans have changed, no worries at all — life happens. But if buying is still on your radar, even loosely, I'd be happy to send you a few current options or just talk through what the market looks like right now. No pressure, no pitch — just information.\n\nHope you're doing well, Marcus.\n\nJames Rivera\n(919) 555-0187"},{"id":12,"category_id":3,"idx":2,"title":"5-Email Buyer Nurture Sequence","text":"You are an email marketing strategist for real estate agents.\n\nYour job: write a 5-email buyer nurture sequence designed to move a new lead from \"just browsing\" to \"ready to schedule a consultation.\" Each email should stand alone (not require reading the previous ones) while building trust and urgency progressively.\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA]\n[TARGET BUYER PROFILE] (e.g. first-time buyer, move-up buyer, relocating professional)\n[AVERAGE PRICE RANGE IN MARKET]\n[CURRENT MARKET CONDITION] (e.g. competitive, balanced, cooling)\n[AGENT DIFFERENTIATOR] (what makes this agent uniquely valuable — 1 sentence)\n[TONE] (e.g. educational, warm, direct)\n[SEND CADENCE] (e.g. every 3 days, weekly)\n\nOUTPUT FORMAT:\nFor each email (Email 1–5):\n- SEND TIMING (e.g. \"Day 1,\" \"Day 4\")\n- SUBJECT LINE (under 50 chars)\n- BODY (100–150 words)\n- CTA (one clear next step)\n- PURPOSE (1 sentence: what this email accomplishes in the sequence)\n\nThe sequence arc should be: introduce → educate → build credibility → create urgency → invite action.","input":"[AGENT NAME]: Sarah Mitchell\n[MARKET / AREA]: Charlotte, NC (South Charlotte and Ballantyne)\n[TARGET BUYER PROFILE]: first-time home buyer, late 20s to mid 30s\n[AVERAGE PRICE RANGE IN MARKET]: $350K–$500K\n[CURRENT MARKET CONDITION]: competitive but not frenzied — homes sell in 10–18 days, 1–3 offers typical\n[AGENT DIFFERENTIATOR]: I've helped 40+ first-time buyers close in Charlotte in the last two years and I walk every client through a no-pressure education process before we ever tour a home.\n[TONE]: warm, educational, encouraging\n[SEND CADENCE]: every 3 days","output":"EMAIL 1 — Day 1\nSubject: Welcome — here's how this works\nBody:\nHi [First Name],\n\nThanks for reaching out — I'm glad you're thinking about buying in Charlotte. I know the process can feel overwhelming when you're just getting started, so I want to set a simple expectation: I'm here to help you make a smart decision, not a fast one.\n\nOver the next couple of weeks, I'll send you a few short emails with things I wish every first-time buyer knew before they started touring homes. No pressure, no hard sells — just the stuff that actually matters.\n\nIf at any point you want to jump on a quick call or start looking at homes, just reply to any of these emails. I'm here when you're ready.\n\nTalk soon,\nSarah Mitchell\n\nCTA: Reply to this email with any questions.\nPurpose: Set expectations, establish trust, reduce pressure.\n\nEMAIL 2 — Day 4\nSubject: The number that matters most\nBody:\nHi [First Name],\n\nMost first-time buyers start with Zillow. That's fine — but the number that actually determines what you can buy isn't the list price. It's your pre-approval amount.\n\nGetting pre-approved takes about 30 minutes and costs nothing. It tells you exactly what you qualify for, what your monthly payment looks like at today's rates, and how much you'll need at closing. It also makes your offer credible when you find the right home — in Charlotte's market, sellers often won't even look at offers without one.\n\nI work with three lenders who specialize in first-time buyer programs (including down payment assistance). I'm happy to share their info — just reply and I'll send the intro.\n\nSarah\n\nCTA: Reply \"send me lender info\" for a warm introduction.\nPurpose: Educate on pre-approval and remove a key friction point.\n\nEMAIL 3 — Day 7\nSubject: What $400K gets you in Charlotte\nBody:\nHi [First Name],\n\nOne of the most common questions I get from first-time buyers: \"What can I actually get for my budget?\" Here's a realistic snapshot of South Charlotte right now.\n\nIn the $350K–$400K range, you're typically looking at 3-bed townhomes or updated condos in Ballantyne with community amenities. In the $400K–$500K range, single-family homes open up — 3–4 bedrooms, garages, and fenced yards in neighborhoods like Berewick, Ardrey Kell, and Ballantyne East.\n\nHomes in this range are selling in 10–18 days right now, usually with 1–3 offers. That's competitive but manageable — especially with the right preparation.\n\nWant me to set up a custom search based on your budget and must-haves? Takes two minutes to set up.\n\nSarah\n\nCTA: Reply with your budget and top 3 must-haves.\nPurpose: Make the market tangible and start a two-way conversation.\n\nEMAIL 4 — Day 10\nSubject: What my buyers say\nBody:\nHi [First Name],\n\nI want to share something a recent client told me after closing on her first home in Ballantyne:\n\n\"I almost didn't reach out because I thought I wasn't ready. Sarah walked me through everything before we even looked at a house, and by the time we toured, I felt like I actually knew what I was doing.\"\n\nThat's exactly how I work. Before we tour a single home, I walk you through the full process — financing, search strategy, what to expect at every step. I've helped over 40 first-time buyers close in Charlotte, and every one of them started exactly where you are right now.\n\nNo one is \"ready\" until they start. The process makes you ready.\n\nSarah\n\nCTA: Want to schedule a 20-minute intro call this week?\nPurpose: Build credibility through social proof and normalize taking the next step.\n\nEMAIL 5 — Day 13\nSubject: Quick question for you\nBody:\nHi [First Name],\n\nI'll keep this short. I've sent you a few emails over the past two weeks, and I hope they've been helpful — but I don't want to keep sending if the timing isn't right.\n\nSo here's an honest question: where are you in your home search?\n\nA) Still exploring — keep the emails coming\nB) Getting serious — let's set up a call\nC) Pausing for now — check back later\n\nJust reply with A, B, or C (or anything else — I'm a real person, not a bot).\n\nWhatever your answer, I'm here whenever the timing is right. Charlotte isn't going anywhere, and neither am I.\n\nSarah Mitchell\n(704) 555-0192\n\nCTA: Reply with A, B, or C.\nPurpose: Force a response and segment the lead for follow-up."},{"id":13,"category_id":3,"idx":3,"title":"Post-Open-House Follow-Up Email","text":"You are an email copywriter for real estate agents.\n\nYour job: write a post-open-house follow-up email to someone who attended an open house — personalized enough to feel like the agent remembers them, valuable enough to warrant opening, and structured to advance the conversation.\n\nINPUTS:\n[VISITOR FIRST NAME]\n[PROPERTY ADDRESS]\n[OPEN HOUSE DATE]\n[WHAT THEY SEEMED INTERESTED IN] (e.g. the kitchen, the backyard, the price point, the neighborhood)\n[THEIR SITUATION] (if known — e.g. first-time buyer, relocating, \"just looking,\" has a home to sell first)\n[ONE FOLLOW-UP VALUE ADD] (e.g. a comparable listing, a market stat, a neighborhood tip)\n[AGENT NAME]\n[AGENT PHONE]\n\nOUTPUT FORMAT:\n- SUBJECT LINE (under 50 chars, personal, not generic)\n- BODY (100–150 words)\n  - Open with a specific reference to the open house or their visit\n  - Deliver the value add\n  - Close with a soft, specific next step\n- No \"thanks for stopping by!\" as the opener. No pressure language.","input":"[VISITOR FIRST NAME]: Angela\n[PROPERTY ADDRESS]: 814 Sycamore Bend, Franklin\n[OPEN HOUSE DATE]: Sunday\n[WHAT THEY SEEMED INTERESTED IN]: the screened porch and the backyard — mentioned wanting outdoor space for their kids\n[THEIR SITUATION]: currently renting in Brentwood, thinking about buying in the next 3–6 months\n[ONE FOLLOW-UP VALUE ADD]: there's a similar 4-bed with an even larger backyard coming to market in Westhaven next week — off-market preview available\n[AGENT NAME]: Sarah Mitchell\n[AGENT PHONE]: (615) 555-0234","output":"Subject: That backyard you loved — plus one more\n\nHi Angela,\n\nI really enjoyed meeting you at Sycamore Bend on Sunday — and I could tell the screened porch and backyard were speaking to you. With kids in the picture, that kind of outdoor space changes daily life in a real way.\n\nI wanted to give you a heads-up: there's a 4-bedroom coming to market in Westhaven next week that actually has an even larger backyard — and I can get you a preview before it goes live. If outdoor space is a priority, this one is worth a look.\n\nI know you mentioned buying in the next 3–6 months, and there's no rush at all. But if you'd like to walk through the new listing before it hits the MLS, just reply or text me and I'll set it up.\n\nSarah Mitchell\n(615) 555-0234"},{"id":14,"category_id":3,"idx":4,"title":"Sphere of Influence Quarterly Check-In","text":"You are an email copywriter for real estate agents.\n\nYour job: write a quarterly \"check-in\" email for the agent's sphere of influence — past clients, friends, family, and professional contacts. This is NOT a sales email. It's a relationship-maintenance touchpoint that keeps the agent top-of-mind by providing genuine value and a human connection.\n\nINPUTS:\n[AGENT NAME]\n[QUARTER / SEASON] (e.g. Q2 2026, Summer 2026)\n[MARKET / AREA]\n[ONE LOCAL MARKET INSIGHT] (a stat, trend, or observation — not a full report)\n[ONE LOCAL RECOMMENDATION] (a restaurant, event, business, or seasonal tip)\n[ONE PERSONAL NOTE] (something the agent is doing, learning, or excited about — humanizes the email)\n[TONE] (e.g. casual, neighborly, warm)\n\nOUTPUT FORMAT:\n- SUBJECT LINE (under 50 chars — feels personal, not newsletter-y)\n- BODY (150–200 words, 3–4 paragraphs)\n  - Open with a personal/seasonal greeting\n  - Share the local recommendation\n  - Deliver the market insight (casual, 2–3 sentences)\n  - Close with an open door: \"if you or anyone you know…\"\n- No hard CTA. No \"call me today.\" Just warmth and availability.","input":"[AGENT NAME]: James Rivera\n[QUARTER / SEASON]: Summer 2026\n[MARKET / AREA]: Raleigh-Durham, NC\n[ONE LOCAL MARKET INSIGHT]: Triangle inventory is up 18% from last summer, giving buyers the most breathing room we've seen since 2019 — but well-priced homes in the $400K–$600K range are still moving in under two weeks\n[ONE LOCAL RECOMMENDATION]: The new Boxcar Bar + Arcade location in Durham — great for families during the day, great for adults at night, and the outdoor space is huge\n[ONE PERSONAL NOTE]: coaching his son's T-ball team this summer and learning that managing 12 five-year-olds is harder than managing a multiple-offer situation\n[TONE]: casual, neighborly","output":"Subject: Summer update from James\n\nHey there,\n\nHope summer is treating you well — it's been a good one so far on this end. I'm coaching my son's T-ball team, which I assumed would be relaxing. Turns out, managing twelve five-year-olds is significantly harder than managing a multiple-offer situation. The kids are having a blast though, and I've learned that patience is, in fact, a skill you can practice.\n\nIf you're looking for a fun spot this summer, check out the new Boxcar Bar + Arcade in Durham. It's family-friendly during the day (games, outdoor space, good food) and a solid adult hangout at night. We've been twice already.\n\nQuick market note: Triangle inventory is up 18% from last summer, which is the most breathing room buyers have had since 2019. That said, well-priced homes in the $400K–$600K range are still going under contract in under two weeks — so it's a balanced market, not a slow one.\n\nIf you or anyone you know has real estate questions — buying, selling, or just curious about what your home might be worth — I'm always happy to chat. No agenda, just information.\n\nEnjoy the rest of your summer,\nJames Rivera\n(919) 555-0187"},{"id":15,"category_id":3,"idx":5,"title":"Lost Lead Win-Back Email","text":"You are an email copywriter for real estate agents.\n\nYour job: write a \"win-back\" email for a lead who the agent worked with but who ultimately chose another agent, didn't buy/sell, or disappeared during the process. The email should be gracious, non-resentful, and genuinely helpful — the goal is to reopen the relationship for future opportunities.\n\nINPUTS:\n[LEAD FIRST NAME]\n[WHAT HAPPENED] (e.g. chose another agent, decided not to sell, went silent during search, timing didn't work out)\n[TIME SINCE LAST CONTACT]\n[SOMETHING VALUABLE OR NEW] (a market shift, a new service, a relevant listing)\n[AGENT NAME]\n[AGENT PHONE]\n[TONE] (e.g. gracious, zero-pressure, professional)\n\nOUTPUT FORMAT:\n- SUBJECT LINE (under 50 chars)\n- BODY (100–150 words)\n  - Acknowledge time has passed — no guilt, no \"what happened?\"\n  - Deliver value naturally\n  - End with a genuinely no-pressure door-opener\n- Absolutely no resentment, passive aggression, or \"I wish you had chosen me\" energy.","input":"[LEAD FIRST NAME]: Tom\n[WHAT HAPPENED]: was actively searching for 6 weeks, then went silent — likely chose another agent or decided to pause\n[TIME SINCE LAST CONTACT]: 8 months\n[SOMETHING VALUABLE OR NEW]: Charlotte just launched a new first-time buyer down payment assistance program ($15K forgivable grant for qualifying buyers in select zip codes)\n[AGENT NAME]: Sarah Mitchell\n[AGENT PHONE]: (704) 555-0192\n[TONE]: gracious, zero-pressure","output":"Subject: Charlotte's new $15K buyer grant\n\nHi Tom,\n\nI hope things have been going well — it's been a while since we talked, and I just came across something I thought you'd want to know about regardless of where you are in your search.\n\nCharlotte just launched a new down payment assistance program: a $15K forgivable grant for qualifying first-time buyers in select zip codes. It's one of the strongest programs the city has offered, and it's already getting attention. I put together a quick summary of who qualifies and which zip codes are included — happy to send it your way if you're interested.\n\nNo assumptions on my end about your plans — if you've already bought, congrats! If buying is still somewhere on the horizon, this program is worth looking into.\n\nEither way, I hope you're doing well.\n\nSarah Mitchell\n(704) 555-0192"},{"id":16,"category_id":4,"idx":1,"title":"FSBO Cold-Call Opening Script","text":"You are a real estate sales coach who writes prospecting scripts.\n\nYour job: write a cold-call opening script for contacting a For Sale By Owner (FSBO) seller. The script should be conversational, respectful of their decision to sell independently, and focused on offering value rather than criticizing their approach.\n\nINPUTS:\n[AGENT NAME]\n[FSBO ADDRESS OR NEIGHBORHOOD]\n[DAYS ON MARKET] (if known)\n[LOCAL MARKET CONTEXT] (e.g. average days on market for agent-listed homes, recent sale prices)\n[VALUE OFFER] (what the agent can offer — e.g. free CMA, open house help, buyer network)\n[TONE] (e.g. consultative, friendly, direct)\n\nOUTPUT FORMAT:\n- OPENING (first 15 seconds — introduction and reason for calling)\n- BRIDGE (acknowledge their decision to sell on their own — respectfully)\n- VALUE (what you can offer, framed as helpful, not salesy)\n- CLOSE (ask for a specific, low-commitment next step)\n- OBJECTION RESPONSES (2–3 common objections with suggested responses)\n- Total script should be speakable in 45–60 seconds (excluding objections).","input":"[AGENT NAME]: David Park\n[FSBO ADDRESS OR NEIGHBORHOOD]: 219 Cedar Lane, Apex, NC\n[DAYS ON MARKET]: 34 days\n[LOCAL MARKET CONTEXT]: agent-listed homes in Apex are averaging 14 days on market; median sale price in the neighborhood is $465K\n[VALUE OFFER]: free comparative market analysis and a no-obligation consultation on pricing strategy\n[TONE]: consultative, friendly","output":"OPENING:\n\"Hi, this is David Park — I'm a real estate agent here in the Apex area. I noticed your home on Cedar Lane is on the market, and I wanted to reach out. Do you have a quick minute?\"\n\nBRIDGE:\n\"I respect that you're selling on your own — a lot of homeowners want to give it a shot, and there's nothing wrong with that. I'm not calling to talk you out of it.\"\n\nVALUE:\n\"What I am calling about is this: I work this neighborhood pretty closely, and I know that agent-listed homes in Apex are averaging about 14 days on market right now. Your home's been out there a little over 30. Sometimes that's a pricing signal, sometimes it's an exposure issue — and it's worth understanding which one it is. I'd be happy to put together a free market analysis so you can see exactly where your home sits compared to what's recently sold nearby. No strings, no obligation — just data you can use whether you work with me or not.\"\n\nCLOSE:\n\"Would you be open to me dropping that analysis off this week? I can email it or bring a printed copy by — whatever's easier for you.\"\n\nOBJECTION RESPONSES:\n\n\"We're not interested in listing with an agent.\"\n→ \"Totally understand — and that's not what I'm suggesting. The market analysis is free either way. A lot of FSBO sellers use it to confirm their pricing or adjust their strategy. It's just information.\"\n\n\"We already have a buyer interested.\"\n→ \"That's great. If you want a second opinion on whether the offer is in line with market value, I'm happy to take a quick look — no charge. Just want to make sure you're getting what the home is worth.\"\n\n\"We don't want to pay commission.\"\n→ \"I hear that a lot, and it makes sense. Here's something worth knowing: most buyers in this market are represented by an agent, and they expect the seller to cover that buyer-agent commission regardless. So the question isn't really 'agent vs. no agent' — it's whether the marketing, pricing, and negotiation help gets you a higher net number even after the fee. That's what the analysis can show you.\""},{"id":17,"category_id":4,"idx":2,"title":"FSBO Voicemail Script (45 seconds)","text":"You are a real estate sales coach who writes prospecting scripts.\n\nYour job: write a voicemail script for a FSBO seller — under 45 seconds, warm, and designed to get a callback rather than make a pitch.\n\nINPUTS:\n[AGENT NAME]\n[AGENT PHONE]\n[FSBO NEIGHBORHOOD OR ADDRESS]\n[ONE COMPELLING REASON TO CALL BACK] (e.g. a market stat, a buyer looking in the area, a recent comparable sale)\n[TONE] (e.g. casual, warm, professional)\n\nOUTPUT FORMAT:\n- Complete voicemail script (speakable in 35–45 seconds at a natural pace)\n- Mark beats where the agent should pause briefly\n- End with phone number stated clearly and repeated once.","input":"[AGENT NAME]: David Park\n[AGENT PHONE]: (919) 555-0221\n[FSBO NEIGHBORHOOD OR ADDRESS]: Apex, NC — near Beaver Creek area\n[ONE COMPELLING REASON TO CALL BACK]: a comparable home two streets over just sold for $22K over the FSBO's asking price — with representation\n[TONE]: casual, warm","output":"\"Hey there, this is David Park — I'm a real estate agent working the Apex area.\n\n[pause]\n\nI'm calling because I saw your home listed for sale, and I thought you'd want to know — a comparable home two streets over from you just closed, and it sold for about twenty-two thousand over what you're currently asking. That caught my attention because it tells me there may be room in your pricing that you'd want to be aware of.\n\n[pause]\n\nI'd be happy to share the details — no strings attached. If you want to give me a call back, my number is (919) 555-0221. That's (919) 555-0221. David Park. Have a great day.\""},{"id":18,"category_id":4,"idx":3,"title":"Expired Listing First-Contact Script","text":"You are a real estate sales coach who writes prospecting scripts.\n\nYour job: write a first-contact phone script for calling a seller whose listing just expired (came off the MLS without selling). The script should be empathetic — they're likely frustrated — while positioning the agent as someone who can diagnose what went wrong and offer a fresh strategy.\n\nINPUTS:\n[AGENT NAME]\n[EXPIRED LISTING ADDRESS]\n[DAYS IT WAS ON MARKET]\n[ORIGINAL LIST PRICE] (if known)\n[LIKELY REASON IT DIDN'T SELL] (e.g. overpriced, poor photos, limited showings, bad timing)\n[AGENT'S DIFFERENTIATOR] (what the agent does differently)\n[TONE] (e.g. empathetic, strategic, direct)\n\nOUTPUT FORMAT:\n- OPENING (introduce yourself, acknowledge the situation respectfully)\n- DIAGNOSIS QUESTION (ask what they think happened — let them vent)\n- INSIGHT (share one observation or market-based perspective)\n- OFFER (specific, low-commitment next step)\n- OBJECTION RESPONSES (2–3 common expired-listing objections)\n- Total script: 60–75 seconds excluding objections.","input":"[AGENT NAME]: Sarah Mitchell\n[EXPIRED LISTING ADDRESS]: 407 Ridgeview Terrace, Charlotte, NC\n[DAYS IT WAS ON MARKET]: 127 days\n[ORIGINAL LIST PRICE]: $589,000\n[LIKELY REASON IT DIDN'T SELL]: overpriced by 8–10% relative to comps; MLS photos were dark and unflattering; no staging\n[AGENT'S DIFFERENTIATOR]: I invest in professional staging and photography on every listing at no cost to the seller — and my average days on market is 11\n[TONE]: empathetic, strategic","output":"OPENING:\n\"Hi, this is Sarah Mitchell — I'm a real estate agent in the Charlotte area. I wanted to reach out because I noticed your home on Ridgeview Terrace just came off the market, and I know that's a frustrating position to be in after four months. I'm not calling to pile on — I just thought it might be worth a conversation.\"\n\nDIAGNOSIS QUESTION:\n\"Before I say anything else — what do you think happened? I find that sellers usually have a pretty good sense of where things went sideways.\"\n\n[Let them talk. Listen. Don't interrupt.]\n\nINSIGHT:\n\"That makes sense. And here's what I'm seeing from the outside: the $589,000 price point was competing against homes in the $530K–$545K range that were professionally staged and photographed. When buyers are scrolling online — and that's where 97% of buyers start — the first impression is everything. A price adjustment alone doesn't always fix it if the presentation isn't matching the competition.\"\n\nOFFER:\n\"Here's what I'd like to do — no commitment: I'll put together a fresh market analysis and show you exactly what comparable homes have sold for in the last 60 days. I'll also bring a staging and photography plan so you can see what the listing would look like with a full reset. If it makes sense to you, we talk next steps. If not, no hard feelings. Would that be worth 20 minutes of your time?\"\n\nOBJECTION RESPONSES:\n\n\"We're taking the house off the market for a while.\"\n→ \"I completely understand — sometimes a break is the right move. Would it be okay if I sent you the market analysis anyway? That way when you're ready to revisit, you'll have current data instead of starting from scratch.\"\n\n\"We're going to try another agent.\"\n→ \"That's fair. My only suggestion: before you sign anything, ask them specifically what they'll do differently — not just on price, but on marketing, staging, and photography. Those are the things that actually move the needle. If you ever want a second perspective, my door is open.\"\n\n\"We're thinking about selling FSBO.\"\n→ \"I respect that. Here's one thing to consider: after 127 days on market, buyers and agents in the area have already formed an opinion about this listing. A fresh launch with new photos, new staging, and new positioning can reset that perception — and that's hard to do without full MLS access and a marketing plan behind it. The analysis I'm offering is free either way — it'll help you no matter which route you take.\""},{"id":19,"category_id":4,"idx":4,"title":"Expired Listing Letter (Direct Mail)","text":"You are a real estate copywriter who creates direct mail for prospecting.\n\nYour job: write a personal letter to the owner of an expired listing — the kind of letter that feels like it was written by a thoughtful professional, not generated by a CRM. It should be empathetic, insightful, and end with a clear but low-pressure invitation to connect.\n\nINPUTS:\n[HOMEOWNER NAME] (first name or Mr./Ms. Last Name)\n[PROPERTY ADDRESS]\n[DAYS ON MARKET BEFORE EXPIRATION]\n[AGENT NAME]\n[AGENT PHONE]\n[AGENT EMAIL]\n[ONE SPECIFIC OBSERVATION] (what the agent noticed about the listing — pricing, photos, positioning, competition)\n[AGENT TRACK RECORD] (1–2 stats that build credibility)\n[TONE] (e.g. personal, professional, empathetic)\n\nOUTPUT FORMAT:\n- Formatted as a personal letter (date, greeting, body, sign-off)\n- 200–250 words\n- No bullet points or headers inside the letter — it should read like a letter, not a brochure\n- Include agent contact info in the sign-off","input":"[HOMEOWNER NAME]: Mr. and Mrs. Patterson\n[PROPERTY ADDRESS]: 407 Ridgeview Terrace, Charlotte\n[DAYS ON MARKET BEFORE EXPIRATION]: 127\n[AGENT NAME]: Sarah Mitchell\n[AGENT PHONE]: (704) 555-0192\n[AGENT EMAIL]: sarah@mitchellhomesclt.com\n[ONE SPECIFIC OBSERVATION]: the listing photos didn't showcase the home's best features — the natural light and open floor plan were barely visible, and the backyard (which is one of the best in the neighborhood) wasn't highlighted at all\n[AGENT TRACK RECORD]: average days on market of 11; homes sell for an average of 99.2% of list price\n[TONE]: personal, empathetic, professional","output":"May 28, 2026\n\nDear Mr. and Mrs. Patterson,\n\nI know this isn't the outcome you were hoping for when you listed 407 Ridgeview Terrace, and I imagine the past four months have been more stressful than you expected. I wanted to reach out — not with a sales pitch, but with a perspective that might be useful if you decide to try again.\n\nI took a close look at your listing, and here's what stood out to me: the photos didn't tell the story your home deserves. The natural light and open floor plan — two of the strongest selling points in this price range — were barely visible in the MLS images. And your backyard, which is honestly one of the nicest on that street, wasn't featured at all. In a market where 97% of buyers start their search online, first impressions are the whole game.\n\nMy listings average 11 days on market, and my sellers typically close at 99.2% of list price. That's not magic — it's professional staging, photography that highlights what makes a home special, and pricing rooted in real data.\n\nI'd welcome the chance to share a fresh analysis of your home's value and a marketing plan designed to reset the conversation. No obligation — just a clear picture of what's possible.\n\nWarmly,\nSarah Mitchell\n(704) 555-0192\nsarah@mitchellhomesclt.com"},{"id":20,"category_id":4,"idx":5,"title":"FSBO Objection-Handling Cheat Sheet","text":"You are a real estate sales coach and strategist.\n\nYour job: create a FSBO objection-handling cheat sheet — a quick-reference guide an agent can keep at their desk during prospecting calls. Each objection should include the objection, the seller's underlying concern, and a natural conversational response.\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA]\n[NUMBER OF OBJECTIONS] (8–12)\n[AGENT STYLE] (e.g. consultative, data-driven, relationship-first)\n[INCLUDE STATS] (yes/no — if yes, use realistic market stats for the area)\n\nOUTPUT FORMAT:\nFor each objection:\n- OBJECTION: (what the FSBO seller says)\n- UNDERLYING CONCERN: (what they're really worried about — 1 sentence)\n- RESPONSE: (natural, conversational — 3–5 sentences, not a paragraph)\n\nEnd with a brief CALL FRAMEWORK: the 4-step process for handling any new objection on the fly.","input":"[AGENT NAME]: David Park\n[MARKET / AREA]: Raleigh-Durham, NC (Triangle)\n[NUMBER OF OBJECTIONS]: 10\n[AGENT STYLE]: consultative, data-driven\n[INCLUDE STATS]: yes","output":"FSBO OBJECTION-HANDLING CHEAT SHEET — David Park, Raleigh-Durham\n\n1. OBJECTION: \"I don't want to pay a commission.\"\nUNDERLYING CONCERN: They believe the commission is a pure cost with no return.\nRESPONSE: \"I hear that — it's a big number. Here's what the data shows in the Triangle: FSBO homes sell for a median of 13% less than agent-assisted homes nationally (NAR 2025). On a $450K home, that's $58,500 — well above a typical commission. The question isn't whether you'll pay — it's whether the net you walk away with is higher or lower. I can show you exactly how that math works for your home.\"\n\n2. OBJECTION: \"I already have a buyer.\"\nUNDERLYING CONCERN: They think the deal is done and don't need help.\nRESPONSE: \"That's great. One thing to consider: do you know if that buyer is pre-approved, and have you had the offer reviewed by a real estate attorney? I'm happy to take a quick look at the terms — free of charge — just to make sure you're protected. Deals fall apart most often between verbal agreement and closing.\"\n\n3. OBJECTION: \"My neighbor sold their house without an agent.\"\nUNDERLYING CONCERN: Social proof — if it worked for someone they know, it should work for them.\nRESPONSE: \"It does happen. Do you know what they netted after all costs? In a lot of cases, FSBO sellers leave money on the table on price or give too much away in concessions without realizing it. I'd be happy to pull the actual closing data on your neighbor's sale — it's public record — so you can see the full picture.\"\n\n4. OBJECTION: \"I want to test the market first.\"\nUNDERLYING CONCERN: They're not committed to FSBO — they just want to avoid commitment.\nRESPONSE: \"That's fair. The risk is that the longer a home sits, the more buyers assume something is wrong with it — and that perception can follow you even when you re-list with an agent. In the Triangle, the sweet spot for maximum leverage is the first 10–14 days. My suggestion: let me give you a free market analysis now so you're making decisions with data, not guesses.\"\n\n5. OBJECTION: \"Agents just put it on the MLS and wait.\"\nUNDERLYING CONCERN: They don't see the value agents provide beyond listing.\nRESPONSE: \"If that were true, every home on the MLS would sell for the same price — and they don't. What I do is price based on real-time comp analysis, invest in professional staging and photography, market across 12+ channels, and negotiate on your behalf through inspection, appraisal, and closing. The MLS is the starting line, not the finish line.\"\n\n6. OBJECTION: \"I've gotten a lot of interest already.\"\nUNDERLYING CONCERN: They equate inquiries with qualified buyers.\nRESPONSE: \"That's a good sign — it means the home has appeal. Here's the question: how many of those inquiries were from pre-approved buyers with an agent, versus people just browsing? In my experience, a lot of FSBO interest is lookers, not buyers. I can help you filter signal from noise and focus on people who can actually close.\"\n\n7. OBJECTION: \"I know what my home is worth.\"\nUNDERLYING CONCERN: They've anchored on a number (Zestimate, neighbor's sale, emotional value) and feel confident.\nRESPONSE: \"You might be right — and I'd love to confirm it. Zillow's margin of error in the Triangle is 4–7%, which on a $500K home is $20K–$35K in either direction. A comparative market analysis uses actual closed sales, not algorithms. Let me run one — if your number is right, you'll have the data to back it up. If it's off, you'll catch it before it costs you time on market.\"\n\n8. OBJECTION: \"I'm a good negotiator.\"\nUNDERLYING CONCERN: They believe personal negotiation skills are sufficient.\nRESPONSE: \"I don't doubt it. The difference is that when you're emotionally invested in your own home, it's hard to negotiate objectively — especially during inspection and appraisal disputes. That's where deals fall apart most often. Having a third party handle that protects both the deal and the relationship between buyer and seller.\"\n\n9. OBJECTION: \"I don't want strangers in my house with an agent I don't know.\"\nUNDERLYING CONCERN: safety and control.\nRESPONSE: \"That's completely valid. Here's how I handle it: every buyer who tours is pre-screened and pre-approved before they walk through the door. I'm present at every showing. And with FSBO, you're actually more exposed — buyers come unvetted, often without an agent, and you're the one letting them in. Representation actually gives you more control, not less.\"\n\n10. OBJECTION: \"If I can't sell it myself, then I'll call you.\"\nUNDERLYING CONCERN: They want to feel like they tried first.\nRESPONSE: \"I respect that. One thing I'd ask you to keep in mind: every week on market costs you in mortgage payments, insurance, taxes, and — most importantly — buyer perception. If you get to day 60 or 90, we're starting from a harder position. Let me leave you my card and a free market analysis. When you're ready, you'll have everything you need.\"\n\nCALL FRAMEWORK — For Any New Objection:\n1. LISTEN — Let them finish. Don't interrupt.\n2. VALIDATE — \"That makes sense\" or \"I hear that.\"\n3. REFRAME — Share one data point or perspective that shifts the frame.\n4. INVITE — Offer a specific, low-commitment next step."},{"id":21,"category_id":5,"idx":1,"title":"Buyer Discovery Questionnaire (25 Questions)","text":"You are a real estate consultant who designs buyer consultation frameworks.\n\nYour job: generate a comprehensive buyer discovery questionnaire — 25 strategic questions organized by theme — that an agent can use during an initial buyer consultation. The questions should uncover not just what the buyer wants, but their decision-making style, timeline pressure, and hidden deal-breakers.\n\nINPUTS:\n[BUYER TYPE] (e.g. first-time, move-up, investor, relocating)\n[MARKET / AREA]\n[PRICE RANGE]\n[QUESTION STYLE] (e.g. conversational, structured, interview-style)\n\nOUTPUT FORMAT:\n- Organize questions into 5 themed sections (5 questions each)\n- Each question should include a brief parenthetical explaining what information it surfaces\n- Mark any questions that should be asked early vs. saved for later in the conversation\n- End with 3 \"power questions\" — the ones that reveal the most about the buyer's true priorities.","input":"[BUYER TYPE]: first-time home buyer\n[MARKET / AREA]: Denver, CO metro\n[PRICE RANGE]: $400K–$550K\n[QUESTION STYLE]: conversational","output":"BUYER DISCOVERY QUESTIONNAIRE — First-Time Buyer, Denver Metro\n\nSECTION 1: MOTIVATION & TIMELINE\n1. What's making you think about buying right now — is there a specific event or deadline driving this? (surfaces urgency and emotional trigger — ask early)\n2. Have you been casually browsing for a while, or did you just start looking? (reveals where they are in the funnel — ask early)\n3. Is there a date by which you need to be in a new home, or is the timeline flexible? (identifies hard deadlines like lease expirations, job starts)\n4. Who else is involved in this decision? (uncovers other decision-makers — spouse, parents, financial advisor)\n5. What would need to be true for you to feel confident making an offer? (reveals their decision-making threshold)\n\nSECTION 2: FINANCIAL READINESS\n6. Have you spoken with a lender or gotten pre-approved yet? (determines financial stage — ask early)\n7. Do you have a sense of what monthly payment you're comfortable with — not just what you qualify for? (separates qualification from comfort)\n8. Are you planning to use any down payment assistance programs or gifts from family? (surfaces financial structure)\n9. How do you feel about your current savings situation for closing costs and reserves? (identifies financial anxiety)\n10. Have you factored in HOA dues, property taxes, and insurance beyond the mortgage? (tests financial preparedness)\n\nSECTION 3: LIFESTYLE & LOCATION\n11. Walk me through your typical weekday — where do you work, where do you spend time, what does your commute look like? (maps their daily geography)\n12. What neighborhoods have you been looking at, and what drew you to them? (reveals research level and assumptions)\n13. Are there areas you've ruled out — and why? (surfaces biases and dealbreakers)\n14. How important is walkability vs. having space and privacy? (fundamental lifestyle tradeoff)\n15. Do you see yourself staying in this home for 3 years, 5 years, or 10+? (determines whether to optimize for now or for growth)\n\nSECTION 4: THE HOME ITSELF\n16. If you could only have three things in your next home, what are they? (forces prioritization)\n17. What's the one thing you absolutely cannot compromise on? (the true dealbreaker)\n18. Are you open to a home that needs cosmetic work, or do you want move-in ready? (calibrates expectations to budget)\n19. How do you feel about townhomes and condos — or is it single-family only? (opens or narrows the search)\n20. Is there anything you've seen online that you loved — can you show me a listing that felt right? (visual preferences reveal more than verbal ones)\n\nSECTION 5: DECISION STYLE & CONCERNS\n21. What's your biggest worry about buying your first home? (surfaces the fear driving hesitation)\n22. Have you ever made an offer on a home before, or is this completely new? (calibrates how much coaching they need)\n23. When you imagine the wrong outcome — what does that look like? (reveals risk tolerance)\n24. How do you typically make big decisions — do you research until you're certain, or do you trust your gut and move? (predicts offer behavior)\n25. Is there anything you've read or heard about the market that's making you nervous? (addresses misinformation early)\n\nPOWER QUESTIONS (the three that reveal the most):\n- #5: \"What would need to be true for you to feel confident making an offer?\" — This single question tells you their emotional readiness, risk threshold, and what's actually holding them back.\n- #16: \"If you could only have three things, what are they?\" — Forces them past the wish list to what actually matters.\n- #23: \"W
