es, transit, walkability)\n- Who Lives Here (community character -- no demographic steering, focus on lifestyle)\n- Market Snapshot (current price range, activity level, trend sentence)\n- Closing paragraph with agent CTA\n\nCONSTRAINTS:\n- No fair-housing violations -- no language about the character of residents by protected class\n- Write \"schools\" as facts only; do not rank or imply quality\n- All data points provided by agent are to be treated as accurate; do not fabricate stats\n- Tone: warm, specific, credible -- avoid tourism-brochure hyperbole\n- Target approximately 1,000 words total","input":"[NEIGHBORHOOD NAME]: Riverside Heights\n[CITY]: Austin, TX\n[DATA POINTS AND LOCAL HIGHLIGHTS]: Median home price $485,000 (April 2025); homes mostly 1950s-1980s ranch and bungalow styles; zoned to Travis Heights Elementary and South Austin High; Lady Bird Lake hike-and-bike trail access at Lakeshore Park (0.4 miles away); South Congress Ave (SoCo) retail and dining corridor 0.8 miles; average commute to downtown Austin 12 minutes; neighborhood association hosts monthly First Thursday block events; Cap Metro Route 7 bus stops on Riverside Drive.\n[AGENT NAME]: Marcus DeLeon\n[TARGET AUDIENCE]: First-time buyers and young professionals relocating from out of state","output":"## Riverside Heights, Austin TX: Your Complete Neighborhood Guide\n\n### Overview\n\nRiverside Heights sits just southeast of downtown Austin, tucked between the hum of South Congress Avenue and the green edge of Lady Bird Lake. It is the kind of neighborhood that longtime Austinites remember before the tech boom and newcomers discover and immediately want to stay in. Tree-lined streets, modest but characterful homes, and a genuine sense of community make it one of the more grounded pockets in a city famous for rapid change.\n\nFor first-time buyers and professionals relocating from out of state, Riverside Heights offers something increasingly rare in Austin: a walkable, central location at a price point that does not require you to sacrifice your retirement account. As of spring 2025, it remains a smart entry point into the Austin market.\n\nIf you are trying to decide whether this is your neighborhood, read on. This guide covers everything from housing styles and school zones to where to grab a taco on a Tuesday night.\n\n### Housing Stock\n\nMost of Riverside Heights was built between the 1950s and 1980s, and it shows in the best way. You will find a mix of single-story ranch homes, post-war bungalows, and the occasional mid-century modern that has been lovingly updated. Lots tend to run between 6,000 and 9,000 square feet -- generous by Austin standards in a central zip code.\n\nMedian home prices in the neighborhood sit around $485,000 as of April 2025. Turnkey renovated homes with new kitchens and updated systems tend to push toward $550,000-$620,000. Fixer opportunities still surface in the low $400s for buyers willing to do the work. Condos and small multiplexes are also present, particularly closer to Riverside Drive.\n\n### Schools\n\nRiverside Heights falls within the Austin Independent School District. The neighborhood is currently zoned to Travis Heights Elementary and South Austin High School, though school assignments can change and prospective buyers should confirm current attendance boundaries directly with AISD before making decisions based on school zone. The Austin ISD website and the district office are the best sources for up-to-date information.\n\n### Dining and Nightlife\n\nWith South Congress Avenue less than a mile away, residents are a short walk or bike ride from one of Austin's most celebrated dining and retail corridors. SoCo is home to everything from long-running taquerias and coffee shops to wine bars and farm-to-table restaurants. The neighborhood itself has a handful of corner spots and food trailers that regulars swear by.\n\nFor nightlife, the East Riverside corridor offers additional options, and the short drive or ride-share to downtown means the full breadth of Austin's bar and live music scene is within easy reach. This is a neighborhood where you can have a quiet evening in or a loud night out -- the infrastructure supports both.\n\n### Parks and Outdoors\n\nLady Bird Lake is the crown jewel for outdoor life here. Lakeshore Park, just 0.4 miles from the neighborhood center, provides direct access to the 10-mile hike-and-bike trail that circles the lake. It is one of Austin's most-used recreational corridors -- joggers, cyclists, kayakers, and paddleboarders share the space year-round.\n\nWithin Riverside Heights itself, several pocket parks and green medians give the neighborhood a more open, breathable feel than its central location might suggest. South Austin's culture of outdoor living is well-represented here.\n\n### Commute and Transportation\n\nRiverside Heights is a commuter's pragmatic choice. The average drive to downtown Austin runs about 12 minutes in normal traffic -- a number that will fluctuate during peak hours but remains manageable compared to Austin's suburban corridors. Capital Metro's Route 7 runs along Riverside Drive, connecting the neighborhood to downtown and the UT campus without a car.\n\nWalkability scores are above average for Austin, particularly for errands along the South Congress corridor. Biking is viable and popular, with the Lady Bird Lake trail offering a car-free route toward downtown and the broader trail network.\n\n### Who Lives Here\n\nRiverside Heights attracts people who want to feel connected -- to their neighbors, to the city, and to the outdoors. The neighborhood association is active and runs monthly First Thursday block events that draw a consistent crowd of long-term residents and newer arrivals. There is a real blend of people who have been here for decades and those who arrived in the last few years, and that mix tends to keep the character grounded.\n\nFor someone relocating to Austin from another state, this neighborhood rewards exploration on foot. The block-by-block variety of homes and the proximity to both green space and city life make it a comfortable landing pad.\n\n### Market Snapshot\n\nAs of spring 2025, Riverside Heights is an active market with limited days on market for well-priced homes. The $485,000 median reflects steady appreciation from prior years, though the pace of appreciation has moderated compared to the 2021-2022 peak. Buyers in this neighborhood are typically competing against other buyers who have done their homework -- pre-approval and a clear sense of your priorities will serve you well.\n\n### Ready to Explore Riverside Heights?\n\nI am Marcus DeLeon, and I specialize in helping buyers and sellers navigate the South Austin market. Whether you want to schedule a tour of current listings in Riverside Heights or just have questions about how the neighborhood compares to others in your budget, I would love to talk. Reach out directly and let's find the right fit for you."},{"id":38,"category_id":8,"idx":3,"title":"Quarterly Market Report PDF Outline","text":"You are a real estate market analyst and professional writer. Your job is to write the full content for a quarterly market report that an agent will drop into a PDF design template. This is a polished, data-forward document that positions the agent as the authoritative local expert.\n\nROLE: Market analyst and ghostwriter for an agent's branded report.\n\nINPUTS:\n[MARKET NAME]: The geographic area this report covers.\n[QUARTER]: Quarter and year (e.g., Q1 2025).\n[DATA POINTS]: 8-10 specific statistics (prices, inventory, DOM, absorption rate, notable sales, year-over-year changes, etc.).\n[AGENT NAME]: Agent's full name.\n[BROKERAGE]: Agent's brokerage name.\n\nOUTPUT FORMAT:\nSection-by-section outline with full written text for each section (6-8 pages of content when laid out). Sections:\n1. Cover Page Copy (report title, market, quarter, agent/brokerage byline)\n2. Executive Summary (200-250 words, big-picture narrative)\n3. Price Trends (200-250 words, includes data table placeholder note)\n4. Inventory Analysis (150-200 words)\n5. Buyer and Seller Conditions (150-200 words)\n6. Notable Transactions (100-150 words, 2-3 example transactions formatted)\n7. Outlook (150-200 words, forward-looking with appropriate hedging)\n8. About the Author / Back Page (100-word agent bio placeholder + contact CTA)\n\nCONSTRAINTS:\n- Do not fabricate data; use only the data points provided\n- Use hedging language for outlook (\"suggests,\" \"may,\" \"if current trends continue\")\n- Professional tone -- this is a branded PDF, not a casual email\n- No fair-housing language violations\n- Flag where a chart or data visualization should be inserted with [INSERT CHART: description]","input":"[MARKET NAME]: Naples, Florida (Collier County residential)\n[QUARTER]: Q1 2025\n[DATA POINTS]: Median sale price $725,000 (up 4.2% YOY); average sale price $1,104,000; closed sales 1,847 units (down 6.1% YOY); median DOM 54 days (up from 38 days Q1 2024); months of supply 5.1 (up from 3.2 a year ago); list-to-sale ratio 96.8%; luxury segment ($2M+) saw 112 closed sales; cash buyers accounted for 61% of transactions; new listings up 22% YOY.\n[AGENT NAME]: Diane Kowalczyk\n[BROKERAGE]: Premier Gulf Properties","output":"--- SECTION 1: COVER PAGE COPY ---\n\nNaples & Collier County Residential Real Estate\nQ1 2025 Market Report\n\nPrepared by Diane Kowalczyk\nPremier Gulf Properties\n[Agent phone] | [Agent email] | [Website]\n\nData sourced from the Naples Area Board of REALTORS (NABOR) MLS. All figures represent Q1 2025 (January 1 - March 31, 2025) unless otherwise noted.\n\n---\n\n--- SECTION 2: EXECUTIVE SUMMARY ---\n\nQ1 2025 Market Summary: A Market Finding Its Equilibrium\n\nAfter two years of historic seller dominance, the Naples and Collier County residential market spent the first quarter of 2025 recalibrating. The data tells a story of a market that is cooling -- but cooling from extraordinary heights, which means conditions remain favorable for well-positioned sellers and somewhat more navigable for buyers.\n\nThe median sale price held firm at $725,000, a 4.2% increase over Q1 2024, confirming that values are not retreating -- they are stabilizing. However, the velocity of the market has shifted meaningfully. Closed sales fell 6.1% year-over-year to 1,847 units, and median days on market expanded from 38 days to 54 days over the same period. Months of available supply climbed to 5.1, compared to 3.2 a year ago -- a meaningful normalization toward a more balanced market.\n\nFor buyers, this recalibration brings more choices and slightly more negotiating room; the list-to-sale ratio of 96.8% reflects a market where reasonable offers are now being accepted rather than outbid. For sellers, the message is clear: strategic pricing and exceptional presentation are no longer optional.\n\nCash transactions continued to define the Naples market, accounting for 61% of all closings -- a figure that reflects the continued influence of high-net-worth and seasonal buyers in Collier County.\n\n[INSERT CHART: Bar chart showing quarterly closed sales and median price Q1 2023 through Q1 2025]\n\n---\n\n--- SECTION 3: PRICE TRENDS ---\n\nMedian and Average Sale Prices\n\nThe median sale price in Collier County reached $725,000 in Q1 2025, representing a 4.2% increase over the $695,900 recorded in Q1 2024. While this growth rate is more modest than the double-digit appreciation seen during 2021-2022, it demonstrates that the Naples market is sustaining value even as transaction volume moderates.\n\nThe average sale price of $1,104,000 reflects the continued weight of the luxury segment in shaping market-wide figures. When average and median prices diverge significantly -- as they do here -- it typically signals strong activity at the higher end pulling the average upward.\n\nPrice per square foot trends are worth watching as a leading indicator. Buyers and sellers in specific sub-markets (waterfront, golf communities, downtown Naples) will find that price behavior can vary considerably from these countywide figures.\n\n[INSERT CHART: Line graph showing median sale price by quarter, Q1 2023 to Q1 2025]\n[INSERT TABLE: Median price by property type -- single-family, condo/villa, luxury $2M+]\n\n---\n\n--- SECTION 4: INVENTORY ANALYSIS ---\n\nMore Choices, More Time\n\nInventory is the story of Q1 2025 in Naples. New listings surged 22% year-over-year, reflecting sellers who had been waiting out the market finally testing it. The result: months of supply expanded to 5.1 months, up from 3.2 months one year ago.\n\nReal estate convention generally describes 5-6 months of supply as a balanced market -- a point where neither buyers nor sellers hold a decisive structural advantage. By that measure, Naples has arrived at or is approaching equilibrium for the first time since 2019.\n\nFor context: in the peak seller's market of 2022, Collier County ran below 1.5 months of supply. Today's 5.1-month figure is not a buyer's market -- it is a normal market, which may feel unfamiliar after several years of historic seller leverage.\n\n[INSERT CHART: Inventory trend line showing months of supply by quarter, Q1 2023 to Q1 2025]\n\n---\n\n--- SECTION 5: BUYER AND SELLER CONDITIONS ---\n\nWhere the Leverage Lives Now\n\nWith a list-to-sale ratio of 96.8%, buyers are now successfully negotiating modest reductions from asking price in a way that was nearly impossible 18-24 months ago. The average home is selling for slightly under list, and with median days on market at 54 days, buyers generally have time to conduct due diligence rather than waiving contingencies under pressure.\n\nFor sellers, the expanded timeline and increased competition from new listings mean that the \"price it high and see what happens\" strategy carries real risk. Homes that enter the market correctly priced and in excellent condition continue to attract serious buyers. Homes that are overpriced or under-prepared are sitting -- and price reductions are becoming more common.\n\nCash buyers remain a powerful force at 61% of transactions, which compresses the advantage that financed buyers might otherwise gain in a normalizing market. Sellers in the Naples market are still accustomed to strong, often cash offers.\n\n---\n\n--- SECTION 6: NOTABLE TRANSACTIONS ---\n\nSelect Q1 2025 Closed Sales\n\nThe luxury segment posted 112 closed sales above $2,000,000 in Q1 2025, consistent with Naples' position as one of Florida's premier high-net-worth residential markets. A selection of notable closings illustrates the range of activity:\n\n- A waterfront estate in Port Royal closed at $9,200,000, reflecting continued demand for trophy properties with direct Gulf access.\n- A newly constructed penthouse residence in downtown Naples closed at $3,750,000, demonstrating the resilience of the luxury condominium market for turnkey product.\n- A single-family home in the Pelican Bay community sold at $2,150,000 after 41 days on market, achieving 97.4% of its asking price.\n\n[NOTE TO AGENT: Replace with actual closed transactions from your MLS data for final report.]\n\n---\n\n--- SECTION 7: OUTLOOK ---\n\nWhat Q2 and Beyond May Hold\n\nIf current trends continue, Q2 2025 is likely to show further inventory normalization and sustained but moderate price appreciation. The spring season traditionally brings both more listings and more motivated buyers to the Naples market, and the interplay of those two forces will shape whether conditions tip slightly more toward buyers or hold at today's near-balance.\n\nThe interest rate environment will remain a factor for financed buyers, though Naples' high share of cash transactions provides some insulation from rate sensitivity relative to other Florida markets. The luxury segment ($2M+) appears well-supported by continued wealth inflows to Southwest Florida.\n\nSellers considering listing in Q2 should be prepared for a more patient market and invest accordingly in pricing strategy and property presentation. Buyers who have been hesitant may find Q2 the most navigable entry point in several years.\n\nAs always, sub-market dynamics -- by neighborhood, property type, and price band -- can vary considerably from these countywide figures. A conversation with a local specialist remains the best way to interpret what these trends mean for your specific situation.\n\n---\n\n--- SECTION 8: ABOUT THE AUTHOR ---\n\n[AGENT PHOTO PLACEHOLDER]\n\nDiane Kowalczyk is a residential real estate specialist with Premier Gulf Properties, serving buyers and sellers throughout Naples and Collier County. [Insert years of experience, transaction volume, designations, and personal connection to the Naples market here.]\n\nDiane prepares this quarterly report as a complimentary resource for clients, past clients, and community members. If you have questions about what these market conditions mean for your home's value or your buying plans, she welcomes a direct conversation.\n\n[Phone] | [Email] | [Website] | [Social handles]\n\nData sourced from the Naples Area Board of REALTORS MLS. Information is deemed reliable but not guaranteed. This report is for informational purposes only and does not constitute financial or investment advice."},{"id":39,"category_id":8,"idx":4,"title":"School District Comparison Guide","text":"You are a real estate content writer with expertise in fair-housing compliance. Your job is to write a neutral, factual school district comparison guide for families researching a real estate market. This guide must be strictly fair-housing compliant: it presents publicly available facts only, makes no quality rankings or value judgments about any district, and reminds readers to conduct their own independent research.\n\nROLE: Neutral information provider, not an advocate for any district.\n\nINPUTS:\n[DISTRICT 1 NAME]: Name of the first school district.\n[DISTRICT 1 STATS]: Publicly available data (enrollment, number of schools, programs offered, geographic area served).\n[DISTRICT 2 NAME]: Name of the second school district.\n[DISTRICT 2 STATS]: Same fields for district 2.\n[DISTRICT 3 NAME]: Name of the third school district.\n[DISTRICT 3 STATS]: Same fields for district 3.\n[AGENT NAME]: Agent's full name.\n[MARKET]: City or metro area.\n\nOUTPUT FORMAT:\n- Introduction (2 short paragraphs explaining the guide's purpose and fair-housing note)\n- Section for each district (H2 heading with district name; present data in consistent format; no rankings, no quality language)\n- How to Research Further section (5-7 bullet points of recommended research steps)\n- Footer disclaimer (fair-housing reminder, data currency note, agent contact)\n\nCONSTRAINTS:\n- CRITICAL: No language that implies one district is better or worse than another\n- No references to demographic composition of student body\n- No test score comparisons unless provided by agent as public data\n- Use the same data categories for each district to ensure visual fairness\n- Tone: informational, balanced, helpful\n- Include a clear disclaimer that school assignments depend on property address and can change","input":"[DISTRICT 1 NAME]: Forsyth County Schools\n[DISTRICT 1 STATS]: Enrollment approx. 52,000 students; 50 schools (35 elementary, 9 middle, 6 high schools); serves Cumming and surrounding Forsyth County GA; programs include STEM academies, dual-enrollment partnerships with University of North Georgia, fine arts magnet programming; district website: forsyth.k12.ga.us.\n[DISTRICT 2 NAME]: Fulton County Schools\n[DISTRICT 2 STATS]: Enrollment approx. 94,000 students; 106 schools; serves Atlanta and surrounding Fulton County communities including Alpharetta, Roswell, Johns Creek; programs include International Baccalaureate (IB), STEM, arts integration, charter schools within district; website: fultonschools.org.\n[DISTRICT 3 NAME]: Cherokee County School District\n[DISTRICT 3 STATS]: Enrollment approx. 43,000 students; 44 schools (29 elementary, 8 middle, 7 high schools); serves Canton and surrounding Cherokee County; programs include career and technical education (CTE), dual-enrollment, gifted education; website: cherokeek12.net.\n[AGENT NAME]: Priya Nair\n[MARKET]: North Metro Atlanta","output":"School District Guide: North Metro Atlanta\nPrepared by Priya Nair | For Informational Purposes Only\n\n---\n\nINTRODUCTION\n\nChoosing where to live often involves questions about local school districts. This guide presents publicly available, factual information about three school districts serving the North Metro Atlanta area -- Forsyth County Schools, Fulton County Schools, and Cherokee County School District -- to help families begin their research.\n\nIMPORTANT: This guide does not rank, rate, or recommend any school district over another. School assignment depends entirely on your property's specific address and can change. Families are strongly encouraged to verify current attendance boundaries and program availability directly with each district before making any real estate or enrollment decisions. This guide is a starting point, not a substitute for your own research.\n\n---\n\n## Forsyth County Schools\nforsyth.k12.ga.us\n\n- Geographic area served: City of Cumming and surrounding Forsyth County communities\n- Total enrollment: Approximately 52,000 students\n- Number of schools: 50 (35 elementary, 9 middle, 6 high schools)\n- Specialized programs available: STEM academies, dual-enrollment partnerships with the University of North Georgia, fine arts magnet programming\n- District contact: Visit forsyth.k12.ga.us or call the district office to confirm attendance zones for a specific address\n\n---\n\n## Fulton County Schools\nfultonschools.org\n\n- Geographic area served: City of Atlanta and surrounding Fulton County communities including Alpharetta, Roswell, and Johns Creek\n- Total enrollment: Approximately 94,000 students\n- Number of schools: 106\n- Specialized programs available: International Baccalaureate (IB) programs, STEM programs, arts integration programs, charter schools operating within the district\n- District contact: Visit fultonschools.org or call the district office to confirm attendance zones for a specific address\n\n---\n\n## Cherokee County School District\ncherokeek12.net\n\n- Geographic area served: City of Canton and surrounding Cherokee County communities\n- Total enrollment: Approximately 43,000 students\n- Number of schools: 44 (29 elementary, 8 middle, 7 high schools)\n- Specialized programs available: Career and Technical Education (CTE) pathways, dual-enrollment partnerships, gifted education programs\n- District contact: Visit cherokeek12.net or call the district office to confirm attendance zones for a specific address\n\n---\n\n## How to Research Further\n\nSchool district information is one factor families consider when evaluating a home purchase. Here are recommended steps for conducting your own thorough research:\n\n- Verify your specific address: School assignments are determined by property address, not neighborhood name. Always confirm directly with the district using the exact address of any home you are considering.\n- Visit each district's official website: Look for curriculum overviews, program offerings, special education services, and enrollment procedures.\n- Attend a school or district information session: Many districts host open houses or prospective family nights where you can ask questions directly.\n- Contact the specific school your child would attend: Individual school staff can answer questions about daily culture, extracurricular offerings, and logistics.\n- Review the state Department of Education website: Georgia's Governor's Office of Student Achievement (gosa.georgia.gov) publishes publicly available, standardized data on schools and districts.\n- Talk to current families in the area: Community groups, neighborhood associations, and parent organizations can offer firsthand perspectives that no guide can replicate.\n- Consult an education consultant or advocate if needed: For families with children who have specialized learning needs, an independent education advocate can help evaluate which programs and placements may be appropriate.\n\n---\n\nDISCLAIMER: This guide was prepared by Priya Nair for informational purposes only. It does not constitute advice regarding school selection, and no representation is made regarding the accuracy or completeness of the information provided. School district boundaries and program offerings change; always verify current information directly with each district. Real estate agents are prohibited by fair-housing law from directing buyers toward or away from areas based on school demographics or any other protected-class consideration. Priya Nair does not rank or recommend school districts and encourages all families to conduct independent research."},{"id":40,"category_id":8,"idx":5,"title":"\"Is Now a Good Time to Buy?\" Article","text":"You are a real estate market expert and content writer. Your job is to write a 500-700 word article answering the question \"Is Now a Good Time to Buy?\" for a specific local market and time period. The article must be balanced and credible -- it acknowledges both sides of the question honestly and positions the agent as a trusted expert rather than a self-serving salesperson.\n\nROLE: Trusted advisor who gives clients the straight story.\n\nINPUTS:\n[MARKET NAME]: City or metro area the article covers.\n[CURRENT SEASON/YEAR]: Season and year (e.g., Fall 2025).\n[INTEREST RATE ENVIRONMENT]: Characterize the rate environment: high, moderate, or low -- and any relevant context.\n[LOCAL INVENTORY LEVEL]: Describe inventory: low, moderate, high, rising, falling.\n[REASONS TO BUY NOW]: 2-3 specific reasons that favor buying in this market now.\n[REASONS TO WAIT]: 1-2 honest reasons a buyer might consider waiting.\n[AGENT CONCLUSION]: The agent's balanced, expert conclusion (1-2 sentences).\n[AGENT NAME]: Agent's full name.\n\nOUTPUT FORMAT:\n- Headline (under 65 characters, question-framing or insight-leading)\n- Introduction (2-3 sentences, acknowledge the question is real and worth answering)\n- Body section \"Reasons the Numbers Favor Buying Now\" (2-3 points, specific to the inputs)\n- Body section \"Reasons Some Buyers Are Choosing to Wait\" (1-2 points, honest)\n- Expert Take (agent's perspective, 2-3 sentences)\n- Closing CTA (1-2 sentences, soft -- invite conversation)\n\nCONSTRAINTS:\n- No market timing guarantees; use hedging language\n- No language that could be construed as investment advice\n- Must represent both sides fairly -- do not minimize the \"wait\" argument\n- Tone: credible, grounded, expert -- not cheerleading\n- 500-700 words total","input":"[MARKET NAME]: Raleigh-Durham, NC (Triangle metro)\n[CURRENT SEASON/YEAR]: Summer 2025\n[INTEREST RATE ENVIRONMENT]: Moderate -- 30-year fixed rates hovering around 6.6%, down from the 7.5%+ peak of late 2023, but still meaningfully above the 3% era.\n[LOCAL INVENTORY LEVEL]: Rising but still below historical norms -- inventory is up about 30% year-over-year but the Triangle remains supply-constrained relative to its long-run average.\n[REASONS TO BUY NOW]: (1) Home prices in the Triangle have appreciated 18% over the past three years and show no sign of declining -- waiting may mean buying at a higher price; (2) Continued population growth from tech and research sector job creation keeps demand elevated; (3) More negotiating room than 2022 -- buyers are successfully requesting repairs and sometimes closing cost contributions.\n[REASONS TO WAIT]: (1) Rates at 6.6% represent a real affordability constraint -- if rates fall to the low 6s or high 5s, purchasing power improves meaningfully; (2) Rising inventory means more options may be available in 6-12 months.\n[AGENT CONCLUSION]: For buyers with stable jobs, a solid down payment, and a plan to stay 5+ years, the Triangle market today offers real value -- not the panic-buy environment of 2021, but a market where patient, prepared buyers can succeed. Waiting for perfect conditions is a strategy that has rarely paid off in high-growth metros.\n[AGENT NAME]: Jordan Simmons","output":"Is Now a Good Time to Buy in Raleigh-Durham? Here Is the Honest Answer.\n\nIt is the question I get more than any other right now, and it deserves a real answer -- not a sales pitch. The Raleigh-Durham market in summer 2025 is neither the frenzy of 2021 nor a buyer's paradise. Here is what the data actually shows.\n\n## Reasons the Numbers Favor Buying Now\n\n**Prices have not waited for rates to drop.** Triangle home prices are up approximately 18% over the past three years, and the region's population and job growth -- driven by continued expansion in tech, biotech, and research -- have not paused. If you are waiting for prices to fall before you buy, the weight of the evidence suggests you may be waiting for something that does not come, and paying more in the meantime.\n\n**You have more leverage than you did three years ago.** This is not 2022. Buyers today are successfully negotiating repairs after inspections, requesting closing cost contributions, and having time to think. Inventory is up roughly 30% from a year ago, which means you are less likely to be forced into a panic decision. That matters enormously for making a sound purchase.\n\n**Demand is structural, not speculative.** The Triangle's growth is not driven by speculation -- it is driven by employers relocating here and people following jobs. Research Triangle Park, the university system, and a growing tech corridor are not going away. Markets with that kind of structural demand tend to absorb rate fluctuations better than markets built on momentum alone.\n\n## Reasons Some Buyers Are Choosing to Wait\n\n**Rates are still meaningfully high.** At 6.6% on a 30-year fixed, your monthly payment on a $450,000 home is several hundred dollars higher than it would have been at 5.5%. That is real money. If rates move to the high 5s or low 6s over the next 12-18 months -- which some economists suggest is possible, though not guaranteed -- your purchasing power would increase noticeably. Refinancing is always an option, but it comes with closing costs and is not guaranteed to be available at favorable terms.\n\n**Inventory may continue to improve.** With listings up 30% year-over-year and still rising, buyers who wait another two or three quarters may find more options at more competitive prices, particularly in price ranges where inventory has been tightest.\n\n## Expert Take\n\nHere is where I land, as someone who watches this market every day: for buyers with stable employment, a down payment they can afford to put to work, and a genuine plan to stay in place for five years or more, the Raleigh-Durham market today offers real opportunity. This is not the frantic environment of 2021, and that is actually a good thing -- it means you can buy thoughtfully.\n\nWaiting for perfect market conditions -- ideal rates, maximum inventory, and stable prices all at once -- is a strategy that has rarely delivered in high-growth metros. The Triangle has consistently rewarded patient, well-prepared buyers more than it has rewarded people waiting on the sidelines.\n\nThat said, if your financial situation is not yet strong enough to absorb the costs of homeownership comfortably, waiting is the right call. No market timing is worth stretching beyond what your budget can sustainably support.\n\n## Let's Talk About Your Specific Situation\n\nEvery buyer's timeline and finances are different, and these broad market observations may or may not apply to your specific circumstances. If you want to talk through what the current market looks like for your price range and target neighborhoods, I am happy to have that conversation -- no pressure, just information.\n\nJordan Simmons | Triangle Residential Specialist | [Phone] | [Email]"},{"id":41,"category_id":9,"idx":1,"title":"Offer Submission Cover Letter","text":"You are a real estate copywriter who writes buyer cover letters to accompany purchase offers. Your job is to write a warm, authentic letter from the buyers to the seller that humanizes the buyers and creates a personal connection with the home -- without violating fair-housing rules or making promises the buyers cannot keep.\n\nROLE: Voice of the buyers, written by their agent.\n\nINPUTS:\n[BUYER NAMES]: First names of the buyers (first names only for warmth; do not include surnames).\n[SPECIFIC FEATURES THEY LOVE]: 2-4 specific features of the home they genuinely love.\n[FAMILY OR LIFESTYLE CONNECTION]: A brief, genuine connection to why this home fits their life.\n[SOMETHING TO PRESERVE OR HONOR]: One specific element of the home or property they want to keep or honor.\n[SELLER NAME IF KNOWN]: Seller's first name (or \"Homeowner\" if unknown).\n\nOUTPUT FORMAT:\n- Letter body only (no subject line needed)\n- Salutation, 3-4 short paragraphs, warm close and buyer signatures\n- 150-200 words\n- Mandatory disclaimer block at the end (outside the letter itself)\n\nCONSTRAINTS:\n- CRITICAL FAIR-HOUSING NOTE: Do not include any references to religion, national origin, race, familial status (children), disability, sex, or any other protected class. Agents using this template must review state and local rules -- some markets (including California) effectively prohibit personal letters with offers. Include the disclaimer.\n- No specific dollar amounts or financial terms in the letter\n- Letter must feel authentic, not formulaic -- avoid cliches like \"we fell in love\"\n- Keep to 150-200 words\n- Tone: warm, specific, genuine","input":"[BUYER NAMES]: Chris and Amanda\n[SPECIFIC FEATURES THEY LOVE]: The original hardwood floors throughout the main level; the covered back porch that looks out over the creek; the reading nook off the primary bedroom; the mature oak tree in the backyard.\n[FAMILY OR LIFESTYLE CONNECTION]: Chris works from home and the light-filled study makes it the ideal workspace; Amanda has been searching for a home with outdoor space where she can garden.\n[SOMETHING TO PRESERVE OR HONOR]: The oak tree in the backyard -- they want to build a small bench beneath it, not remove it.\n[SELLER NAME IF KNOWN]: Carol","output":"Dear Carol,\n\nWe wanted to take a moment to introduce ourselves. We are Chris and Amanda, and after walking through your home last weekend, we have not been able to stop thinking about it.\n\nWhat struck us immediately were the original hardwood floors -- the kind of craftsmanship that simply does not exist in new construction. The covered porch over the creek is exactly what Amanda has been picturing for a future garden, and the reading nook off the primary bedroom felt like it was designed for the stack of books currently living on our nightstands. Chris, who works from home, walked into the light-filled study and immediately knew it was the space he has been looking for.\n\nThe oak tree in the backyard is something we have already talked about preserving. We have plans for a simple bench beneath it -- nothing more.\n\nWe hope this letter gives you a small sense of who we are and what your home would mean to us. Thank you for considering our offer.\n\nWith appreciation,\nChris and Amanda\n\n---\nIMPORTANT DISCLAIMER FOR AGENTS: Buyer cover letters may be prohibited or discouraged in your market. California, for example, effectively prohibits personal letters under Civil Code Section 1360.2. Some brokerages have policies against submitting them. Agents must review state law, local MLS rules, and brokerage policy before using this letter. Do not include any references to protected classes under the Fair Housing Act. This template is provided for informational and educational purposes only; compliance is the agent's responsibility."},{"id":42,"category_id":9,"idx":2,"title":"Multiple-Offer Strategy Email to Buyer","text":"You are a real estate agent communication specialist. Your job is to write a clear, calm email from a buyer's agent to their buyer client explaining that their offer is now in a multiple-offer situation and laying out their strategic options. The tone must be informative and empowering -- not panicked or salesy.\n\nROLE: Calm, strategic buyer's agent who gives clients full information.\n\nINPUTS:\n[PROPERTY ADDRESS]: Address of the property.\n[NUMBER OF COMPETING OFFERS]: Exact number or \"several\" if unknown.\n[OFFER DEADLINE]: Date and time by which best offers are due, if known.\n[BUYER CURRENT PRICE]: Buyer's current offer price.\n[BUYER CURRENT TERMS]: Summary of key terms (down payment, contingencies, close date).\n[AGENT STRATEGIC RECOMMENDATION]: Agent's actual recommendation for what the buyer should do.\n[AGENT NAME]: Agent's full name.\n\nOUTPUT FORMAT:\n- Subject line (clear and calm, under 55 characters)\n- Email body: approximately 250 words\n- Opening: brief, calm statement of the situation\n- Middle: 3 clearly labeled options (Option 1, 2, 3) with a brief pros/cons note for each\n- Closing: agent's recommendation and invitation to call immediately\n\nCONSTRAINTS:\n- No panic language (do not use words like \"war,\" \"battle,\" or \"panic\")\n- Be transparent about all 3 options including the option to walk away\n- Do not pressure the buyer -- present information neutrally then give the recommendation\n- No specific advice about how much to escalate -- frame escalation as a range the buyer decides\n- Tone: professional, clear, supportive","input":"[PROPERTY ADDRESS]: 2847 Wren Hollow Drive, Brentwood, TN 37027\n[NUMBER OF COMPETING OFFERS]: 4 other offers\n[OFFER DEADLINE]: Tuesday at 5:00 PM Central\n[BUYER CURRENT PRICE]: $615,000\n[BUYER CURRENT TERMS]: 20% down, financing contingency, inspection contingency, 35-day close\n[AGENT STRATEGIC RECOMMENDATION]: I believe this home is worth up to $635,000 to you based on what we discussed about your priorities. I recommend submitting your best offer by Monday evening with an escalation clause capped at a number you are comfortable with, and consider writing a personal note to accompany it. Do not waive the inspection -- the roof age alone warrants keeping it.\n[AGENT NAME]: Donna Harrington","output":"Subject: Multiple Offers on Wren Hollow -- Your Options\n\nHi [First Name],\n\nI just heard from the listing agent: there are now 4 offers on 2847 Wren Hollow Drive, including yours. The sellers are asking for everyone's best and final offer by Tuesday at 5:00 PM Central. I want to walk you through your options clearly so you can make the decision that is right for you.\n\n**Option 1: Strengthen your current offer.**\nYou could increase your offer price, tighten your timeline, or both. An escalation clause -- where your offer automatically beats competing offers up to a cap you set -- can be effective in this situation. Pros: keeps you in the running competitively. Cons: you spend more than you originally planned.\n\n**Option 2: Submit your offer as-is.**\nYou stand by your current $615,000 offer and let the sellers decide. Pros: you do not overextend. Cons: at this price point with 4 competing offers, the risk of not being selected is real.\n\n**Option 3: Withdraw your offer.**\nIf this situation has moved beyond what feels right for you, stepping back is completely valid. Pros: you preserve your resources for the right home. Cons: you lose this particular opportunity.\n\nMy recommendation: Based on what you have told me about how much this home fits your needs, I think it is worth submitting a strengthened offer by Monday evening. I have a specific strategy I want to walk you through on a quick call -- including why I do not recommend waiving the inspection.\n\nCan you call or text me in the next hour? We have a little time, but not a lot.\n\nDonna Harrington\n[Phone] | [Email]"},{"id":43,"category_id":9,"idx":3,"title":"Counter-Offer Communication Script","text":"You are an expert real estate negotiation coach and script writer. Your job is to write communication scripts for three distinct counter-offer scenarios that arise in residential real estate transactions. These scripts should be professional, clear, and strategically sound.\n\nROLE: Negotiation coach writing scripts that agents can use verbatim or adapt.\n\nINPUTS:\n[ORIGINAL OFFER TERMS]: Price, contingencies, and key terms of the original offer.\n[COUNTER TERMS]: The counter-offer terms (from seller or buyer depending on the scenario).\n[WHAT MATTERS MOST TO SELLER]: Seller's priorities (price, timeline, certainty, specific terms).\n[WHAT MATTERS MOST TO BUYER]: Buyer's priorities.\n[AGENT NAME]: Agent's name.\n\nOUTPUT FORMAT:\nThree fully written scripts, each with both a phone/verbal version and a brief email version:\n\nSCENARIO A -- Listing agent presenting seller's counter to buyer's agent:\nPhone script (100-150 words) + Email version (50-75 words)\n\nSCENARIO B -- Buyer's agent presenting buyer's counter back to listing agent:\nPhone script (100-150 words) + Email version (50-75 words)\n\nSCENARIO C -- Multiple-counter / final push situation (listing agent to buyer's agent):\nPhone script (100-150 words) + Email version (50-75 words)\n\nCONSTRAINTS:\n- Scripts should be realistic and professionally worded -- agents can use them verbatim\n- No ultimatum language that burns bridges\n- Each script should acknowledge the other side's position before presenting the counter\n- Tone: collaborative and professional, not adversarial\n- Do not include specific legal advice","input":"[ORIGINAL OFFER TERMS]: $478,000 purchase price, 10% down, financing and inspection contingencies, 45-day close, asking seller to cover $8,000 in buyer closing costs.\n[COUNTER TERMS]: Seller counters at $489,500, will contribute $5,000 toward buyer's closing costs, 38-day close, all other terms acceptable.\n[WHAT MATTERS MOST TO SELLER]: Getting as close to asking price ($495,000) as possible; a clean, fast close; certainty the deal closes.\n[WHAT MATTERS MOST TO BUYER]: Keeping total cash outlay manageable; getting closing cost help; staying within monthly payment comfort zone.\n[AGENT NAME]: Kevin Torres (listing agent for Scenarios A and C; buyer's agent name is Lisa Park for Scenario B)","output":"---\nSCENARIO A: Listing Agent (Kevin Torres) Presenting Seller's Counter to Buyer's Agent (Lisa Park)\n---\n\nPHONE SCRIPT:\n\"Hi Lisa, Kevin Torres calling about 412 Elmwood. I've got the seller's counter ready to walk you through. First, I want to say -- your clients put together a solid offer. The seller appreciates the straightforward terms and the contingency structure was fine. Here is where we landed: the seller is coming back at $489,500. They came down from asking, which I think reflects genuine motivation to work with your buyers. On the closing cost contribution, they can do $5,000 -- that's a real concession. Timeline is 38 days rather than 45, which works for their situation. Everything else in the original offer stands. I really do think there's a deal here. What's your read -- do you think your clients can work with these numbers?\"\n\nEMAIL VERSION:\nSubject: Counter-Offer -- 412 Elmwood\n\nHi Lisa -- the seller has responded with a counter at $489,500, closing cost contribution of $5,000, and a 38-day close. All other terms from your original offer are acceptable. I believe there is a deal here and look forward to hearing your clients' thoughts. Happy to talk through it.\n\nKevin Torres\n\n---\nSCENARIO B: Buyer's Agent (Lisa Park) Presenting Buyer's Counter Back to Listing Agent (Kevin Torres)\n---\n\nPHONE SCRIPT:\n\"Kevin, it's Lisa. Thanks for walking me through the seller's counter -- I presented it to my clients last night and I want to keep this moving. Here is where they are: they can meet at $485,000. I know that's not $489,500, but I want to give you the reasoning so you can present it well. The closing cost piece is genuinely what's holding them. At $485,000 with $6,500 in closing cost help, their out-of-pocket lands in a place they can actually execute. They are not playing games -- they want this house. The 38-day close is fine, they can work with that. Can you take this back to your seller today? I think we are closer than the numbers look.\"\n\nEMAIL VERSION:\nSubject: Buyer's Counter -- 412 Elmwood\n\nHi Kevin -- my buyers are countering at $485,000 with $6,500 in closing cost assistance, 38-day close, all other terms unchanged. They are motivated and this is their genuine best position. The closing cost piece is what makes this executable for them. Please present to the seller at your earliest opportunity.\n\nLisa Park\n\n---\nSCENARIO C: Listing Agent (Kevin Torres) Final Push -- Multiple Counter Situation\n---\n\nPHONE SCRIPT:\n\"Lisa, Kevin again. I just got off the phone with my seller -- I want to be straight with you because I respect how you've handled this. We are at a point where the seller is not going below $487,000. I have worked hard on this side to get them here, and I genuinely believe this is their floor. Here is what I can offer: if your clients can meet at $487,000, the seller will hold the $6,500 closing cost contribution and the 38-day close. Everything else is clean. I am not trying to squeeze you -- I just need a yes or a no by end of day so both sides can make a decision and move on one way or another. I really do want to see this come together.\"\n\nEMAIL VERSION:\nSubject: Final Counter -- 412 Elmwood -- Response Requested by End of Day\n\nHi Lisa -- the seller's final position is $487,000 with $6,500 closing cost contribution and 38-day close. They have moved meaningfully and this represents their floor. A yes or no by 5 PM today would be appreciated so both parties can proceed accordingly. I believe there is still a deal here.\n\nKevin Torres"},{"id":44,"category_id":9,"idx":4,"title":"Inspection Negotiation Talking Points","text":"You are a real estate negotiation strategist. Your job is to write talking points for negotiating repairs or credits following a home inspection. You will write two separate sets of talking points: one for the buyer's agent perspective and one for the listing agent perspective. Both sets must be professional, well-reasoned, and useful for actual agent-to-agent conversations.\n\nROLE: Strategic advisor writing negotiation talking points for both sides.\n\nINPUTS:\n[INSPECTION FINDINGS SUMMARY]: Brief description of what the inspection found.\n[DOLLAR AMOUNT REQUESTED]: Total credit or repair amount the buyer is requesting.\n[KEY ITEMS]: List the most important items and whether each is structural/safety-related or cosmetic/maintenance.\n[MARKET CONDITIONS]: Describe the current market (seller's market, balanced, buyer's market).\n[AGENT NAME]: Agent's name (use \"Buyer's Agent\" and \"Listing Agent\" as labels for the two sets).\n\nOUTPUT FORMAT:\nSECTION 1 -- BUYER'S AGENT TALKING POINTS\n- 4-6 prioritized talking points (strongest argument first)\n- Suggested compromise language the buyer's agent can use\n\nSECTION 2 -- LISTING AGENT TALKING POINTS\n- 4-6 prioritized talking points (strongest argument first)\n- Suggested compromise language the listing agent can use\n\nCONSTRAINTS:\n- Each talking point should be 1-3 sentences, ready to use in a phone call\n- Prioritize structural and safety issues over cosmetic ones\n- Include at least one talking point in each section about the cost of the alternative (deal falling apart vs. making repairs)\n- Tone: professional, firm but collaborative\n- Do not recommend specific contractors or dollar amounts beyond what the agent provided","input":"[INSPECTION FINDINGS SUMMARY]: Home inspection on a 1987 single-family home revealed: HVAC system is 19 years old and showing signs of wear (inspector noted 3-5 year remaining life estimate); two windows in the primary bedroom have failed seals (foggy glass); sump pump is functional but original to the home; minor grading issue on the north side of the property directing water toward the foundation; a few outlets in the garage are non-GFCI. Roof was replaced 6 years ago and inspector noted no concerns.\n[DOLLAR AMOUNT REQUESTED]: Buyer requesting $9,500 credit in lieu of repairs.\n[KEY ITEMS]: HVAC (structural/major system -- $8,000-$12,000 replacement cost); windows ($800-$1,200 repair); grading ($500-$1,500 to correct); GFCI outlets ($150-$300 to add); sump pump (functional, cosmetic/age concern).\n[MARKET CONDITIONS]: Balanced market -- homes are selling in 20-30 days, sellers have modest leverage but buyers have options.\n[AGENT NAME]: Example negotiation scenario","output":"---\nSECTION 1: BUYER'S AGENT TALKING POINTS\nPrioritized from strongest to weakest argument\n---\n\n1. THE HVAC IS THE CORE ISSUE AND IT IS MATERIAL.\n\"The inspector estimated 3-5 years of remaining life on a 19-year-old HVAC system. In this climate, HVAC failure is not a cosmetic inconvenience -- it is a major system replacement in the $8,000-$12,000 range. A $9,500 credit does not even fully cover that one item at the high end. We are not asking for cosmetic help; we are asking for acknowledgment of a known, documented capital expense the buyer is taking on.\"\n\n2. THE GRADING ISSUE IS A FOUNDATION RISK THAT NEEDS TO BE DISCLOSED REGARDLESS.\n\"Water directed toward the foundation is a defect that will need to be corrected whether this deal closes or not. If it is not addressed and the buyer discovers post-closing moisture issues, the seller's disclosure exposure increases. Correcting the grading is the right answer for both parties.\"\n\n3. IN A BALANCED MARKET, BUYERS HAVE OPTIONS.\n\"This is not 2022. My clients have time and options, and they will use them if we cannot find a reasonable middle ground. The listing has been on the market for 22 days -- I do not think either side benefits from losing this deal over a negotiable issue.\"\n\n4. THE COMBINATION OF FINDINGS IS CUMULATIVE.\n\"No single item here breaks a deal. But the HVAC, the grading, the sump pump age, and the window seals together represent a home that the buyer is walking into with immediate and near-term capital needs. The $9,500 request reflects the realistic sum of those items.\"\n\n5. GFCI OUTLETS ARE A CODE AND SAFETY ISSUE.\n\"Non-GFCI outlets in the garage are a safety standard, not a preference. These are inexpensive to fix and the kind of item that is worth including for goodwill even if the seller pushes back on everything else.\"\n\nSUGGESTED COMPROMISE LANGUAGE:\n\"We understand the seller feels the price already reflects the home's condition. We are willing to reduce the request to $7,500 -- focused on the HVAC and grading -- if the seller can meet us there. We want to close this deal. Let's find a number that lets both sides feel good about it.\"\n\n---\nSECTION 2: LISTING AGENT TALKING POINTS\nPrioritized from strongest to weakest argument\n---\n\n1. THE ROOF IS NEW AND THE INSPECTOR HAD NO CONCERNS.\n\"The roof was replaced six years ago and the inspector gave it a clean report. In a home of this age, that is a significant positive that the buyer is receiving at no cost. The price was negotiated with full knowledge that this is a 1987 home -- not a new build.\"\n\n2. THE HVAC IS FUNCTIONAL AND THE ESTIMATE IS SPECULATIVE.\n\"A '3-5 year remaining life estimate' is an inspector's subjective opinion, not a guarantee of failure. HVAC systems regularly outlive inspector estimates with proper maintenance. The system is heating and cooling the home today. We are not willing to absorb a full replacement credit for a system that is working.\"\n\n3. THE PURCHASE PRICE REFLECTS THE HOME'S AGE AND CONDITION.\n\"This home was priced as a 1987 property, not a flipped or updated home. Buyers considering older homes accept that some systems are aging. The $9,500 request -- applied against a home priced at market -- represents a meaningful reduction that the seller did not agree to when accepting the offer.\"\n\n4. LOSING THIS DEAL COSTS BOTH SIDES REAL MONEY AND TIME.\n\"If this deal falls apart, the seller goes back on the market, discloses these inspection findings on the next offer's inspection, and faces the same negotiation again -- except now in a disclosed environment. Neither side wins by blowing this up. A reasonable credit keeps everyone moving.\"\n\n5. THE SUMP PUMP IS FUNCTIONAL -- AGE ALONE IS NOT A DEFECT.\n\"A working sump pump is a working sump pump. Including it in the repair request because it is original to the home is not a repair negotiation -- it is a depreciation claim. We are not willing to credit age.\"\n\nSUGGESTED COMPROMISE LANGUAGE:\n\"The seller is willing to offer a $4,500 credit. That covers the grading correction, the window seals, and the GFCI outlets -- the items we consider legitimate repair issues. The HVAC is a functioning system and the price has always reflected the home's vintage. We believe $4,500 is fair and we are ready to close.\""},{"id":45,"category_id":9,"idx":5,"title":"Closing Day Communication Email","text":"You are a real estate agent communication writer. Your job is to write a closing day email to send to buyers on the morning of their closing. The email should be warm and celebratory while also being genuinely practical -- covering what they need to bring, the timeline, and what happens after closing.\n\nROLE: Caring agent who celebrates the milestone and makes sure clients feel prepared.\n\nINPUTS:\n[BUYER NAMES]: Buyers' first names.\n[PROPERTY ADDRESS]: Address of the home being purchased.\n[CLOSING TIME]: The scheduled closing time.\n[CLOSING LOCATION]: Where closing takes place (title company, attorney's office, etc.).\n[AGENT NAME]: Agent's full name.\n\nOUTPUT FORMAT:\n1. Subject line (warm, celebratory, under 55 characters)\n2. Email body (approximately 200 words): opening celebration line, what to bring (bulleted), timeline reminder, what happens after closing (2-3 sentences), warm personal close\n3. Separate short-form text message version (under 160 characters, congratulatory and action-oriented)\n\nCONSTRAINTS:\n- Email tone: warm, personal, and practical -- not corporate or transactional\n- Do not promise a specific outcome (e.g., do not say \"everything is set\" -- use \"everything appears to be in order\")\n- Remind buyers to do a final walkthrough if they have not done so\n- Include the reminder to bring government-issued ID\n- Keep the text message under 160 characters strictly\n- Avoid legal advice about title, deed recording, or possession timing -- point them to the title company or attorney for specifics","input":"[BUYER NAMES]: Ryan and Mei\n[PROPERTY ADDRESS]: 1104 Larkspur Court, Franklin, TN 37064\n[CLOSING TIME]: 10:30 AM\n[CLOSING LOCATION]: Heritage Title Group, 340 Main Street, Franklin, TN, Suite 200\n[AGENT NAME]: Alicia Moreno","output":"Subject: Today's the Day, Ryan and Mei!\n\nGood morning, Ryan and Mei!\n\nToday is the day -- 1104 Larkspur Court is about to be yours. I am so excited for you both, and I could not be more proud of how you navigated this process.\n\nHere is what you need for a smooth closing at 10:30 AM at Heritage Title Group (340 Main Street, Suite 200, Franklin):\n\n- Government-issued photo ID for each of you (driver's license or passport)\n- Your cashier's check or wire confirmation if funds were wired (confirm the amount with Heritage Title if you have not already)\n- Your checkbook, just in case a small adjustment is needed\n- If you have not completed your final walkthrough of the property, do that before you come in\n\nThe signing typically takes 45-60 minutes. After you sign, Heritage Title will submit everything to the county for recording -- once the deed is recorded, the home is officially yours. They will walk you through exactly when you can expect to receive your keys.\n\nI will be there with you every step of the way this morning. See you at 10:30!\n\nWith so much excitement,\nAlicia Moreno\n[Phone]\n\n---\nTEXT MESSAGE VERSION (158 characters):\nToday's the day! Congrats Ryan & Mei! Don't forget your ID + cashier's check. See you at 10:30 at Heritage Title. So happy for you both! -- Alicia"},{"id":46,"category_id":10,"idx":1,"title":"Agent Bio (Long-Form Website Version)","text":"You are a professional bio writer specializing in real estate agent profiles. Your job is to write a polished, 400-500 word long-form agent bio for the About page of an agent's website. The bio should be written in the third person and strike a balance between professional credibility and genuine warmth -- it should sound like a person, not a press release.\n\nROLE: Ghostwriter for an agent's professional brand.\n\nINPUTS:\n[AGENT NAME]: Agent's full name.\n[YEARS IN BUSINESS]: How long the agent has been licensed.\n[TRANSACTION COUNT]: Approximate number of transactions or dollar volume (use what is provided).\n[MARKET SPECIALIZATION]: The markets, neighborhoods, or property types the agent focuses on.\n[BROKERAGE]: Brokerage name.\n[PERSONAL FACTS]: 2-3 personal details that humanize the agent (hobbies, background, family, etc.).\n[AWARDS OR CERTIFICATIONS]: Any notable designations, awards, or recognitions.\n\nOUTPUT FORMAT:\n- Full bio: 400-500 words\n- Third person throughout\n- Structure: opening hook (2-3 sentences), background/experience paragraph, market expertise paragraph, community/personal paragraph, closing CTA paragraph\n- No bullet points -- flowing prose\n\nCONSTRAINTS:\n- No superlatives without evidence (do not say \"the best\" or \"top agent in the city\" unless award data supports it)\n- No cliches like \"passionate about real estate\" or \"your dream home\"\n- Avoid generic phrases: \"goes above and beyond,\" \"works tirelessly\"\n- Tone: professional, warm, specific -- reads like a person, not a marketing template\n- 400-500 words strictly","input":"[AGENT NAME]: Rebecca Holt\n[YEARS IN BUSINESS]: 14 years\n[TRANSACTION COUNT]: More than 300 closed transactions; approximately $145 million in career sales volume.\n[MARKET SPECIALIZATION]: Greater Charlotte, NC metro -- primary focus on South Charlotte neighborhoods (Myers Park, Ballantyne, SouthPark, Waxhaw), with experience in new construction and relocation buyers.\n[BROKERAGE]: Coldwell Banker Realty, Charlotte.\n[PERSONAL FACTS]: Former middle school teacher before entering real estate; runs half-marathons and is training for her first full marathon; lives in Ballantyne with her husband and two teenagers.\n[AWARDS OR CERTIFICATIONS]: Coldwell Banker International Diamond Society Award recipient (2021-2024); Certified Relocation Professional (CRP); North Carolina Real Estate Commission licensed since 2011.","output":"Rebecca Holt spent her first career teaching thirteen-year-olds how to think critically, solve problems under pressure, and communicate clearly. It turns out those are exactly the skills that make someone exceptional at guiding people through one of the most significant financial decisions of their lives.\n\nSince earning her North Carolina real estate license in 2011, Rebecca has closed more than 300 transactions representing approximately $145 million in sales volume across the Greater Charlotte metro. She brings to every deal the same discipline that defined her classroom years: clear communication, careful preparation, and an ability to stay calm when the stakes feel high.\n\nRebecca's work centers on South Charlotte -- Myers Park, SouthPark, Ballantyne, and the Waxhaw communities -- a market she knows not just professionally but personally. She has lived in Ballantyne with her husband and their two teenagers long enough to have watched neighborhoods evolve and housing cycles turn. That tenure translates directly to the kind of market intelligence that comes only from sustained attention: she knows which streets hold value in a downturn, which developments have delivered on their promise, and which questions buyers should be asking before they fall for the staging.\n\nRelocating professionals and out-of-state buyers represent a significant share of Rebecca's practice, and it is a segment she has developed deliberately. As a Certified Relocation Professional (CRP), she understands the compressed timelines, the remote decision-making, and the emotional complexity of moving a family to a city they may have visited only once. Her goal in every relocation is the same: make sure the client feels as informed and confident as someone who has lived here for years.\n\nRebecca has been recognized with the Coldwell Banker International Diamond Society Award every year from 2021 through 2024 -- an honor reflecting both sales performance and client satisfaction. She is affiliated with Coldwell Banker Realty in Charlotte.\n\nOutside of real estate, Rebecca channels her competitive side into distance running. She has completed multiple half-marathons and is currently in training for her first full marathon -- a goal she approaches with the same methodical preparation she brings to a listing strategy. If you catch her on a Sunday morning, she is probably out on the greenways of Ballantyne working through a long run.\n\nIf you are buying or selling in South Charlotte, or relocating to the area from out of state, Rebecca would welcome a conversation. She does not believe in high-pressure consultations -- she believes in giving you accurate information and letting you make the right decision for your family.\n\nContact Rebecca directly at [phone] or [email], or visit [website] to explore current listings and market resources."},{"id":47,"category_id":10,"idx":2,"title":"Short Agent Bio (Social Media)","text":"You are a social media copywriter specializing in real estate personal branding. Your job is to write three platform-specific short agent bio versions that are ready to copy and paste into social profiles. Each version must be tailored to its platform's format, audience expectations, and character/word constraints.\n\nROLE: Social media brand copywriter for a real estate agent.\n\nINPUTS:\n[AGENT NAME]: Agent's full name.\n[MARKET]: City or region served.\n[SPECIALTY]: Primary specialty or niche (e.g., first-time buyers, luxury, relocation, investors).\n[YEARS EXPERIENCE]: Years licensed or in the business.\n[HOOK OR PERSONALITY TRAIT]: One thing that makes this agent distinctive or memorable.\n\nOUTPUT FORMAT:\nThree labeled versions, each clearly marked and ready to use:\n\n(A) INSTAGRAM BIO\n- Maximum 150 characters\n- Use line breaks for mobile readability\n- Include 1-2 relevant emojis if appropriate (agent may remove)\n- End with a CTA link placeholder ([LINK IN BIO])\n\n(B) FACEBOOK ABOUT SECTION\n- 3-4 sentences\n- Conversational and professional\n- No character limit but keep it concise\n- End with contact CTA\n\n(C) LINKEDIN HEADLINE + SUMMARY\n- Headline: under 220 characters, keyword-rich\n- Summary: approximately 100 words, first person, professional\n- Focus on value delivered and ideal client\n\nCONSTRAINTS:\n- No cliches: no \"passionate,\" \"dream home,\" \"journey,\" \"dedicated\"\n- Instagram bio must actually be under 150 characters including line breaks\n- LinkedIn summary must be in first person (Instagram and Facebook can be either)\n- Tone per platform: Instagram = punchy/personal, Facebook = warm/community-focused, LinkedIn = professional/achievement-focused","input":"[AGENT NAME]: Marcus Webb\n[MARKET]: Phoenix metro (Scottsdale, Tempe, Chandler, Gilbert)\n[SPECIALTY]: Move-up buyers and families relocating to the East Valley\n[YEARS EXPERIENCE]: 9 years\n[HOOK OR PERSONALITY TRAIT]: Marcus grew up in the East Valley and has lived in three of the four cities he serves -- he knows these neighborhoods from the inside, not from a map.","output":"(A) INSTAGRAM BIO\n\nMarcus Webb | Phoenix East Valley\nMove-up buyers + East Valley relocations\n9 yrs | Scottsdale Chandler Gilbert Tempe\nI grew up here. I know these streets.\n[LINK IN BIO]\n\n[Character count: 118 -- within 150-character limit]\n\n---\n\n(B) FACEBOOK ABOUT SECTION\n\nI am Marcus Webb, a Phoenix East Valley real estate agent with 9 years of experience helping move-up buyers and families relocating to Scottsdale, Chandler, Gilbert, and Tempe. I grew up in the East Valley and have lived in three of the four cities I serve, which means I can answer questions about neighborhoods, commutes, schools, and daily life that no data set can fully capture. If you are outgrowing your current home or moving your family to the Valley and want to work with someone who actually knows the area -- not just the listings -- I would love to talk. Reach me anytime at [phone] or send a message here.\n\n---\n\n(C) LINKEDIN HEADLINE + SUMMARY\n\nHEADLINE:\nResidential Real Estate Agent | Phoenix East Valley | Move-Up Buyers & Relocation Specialist | Scottsdale, Chandler, Gilbert, Tempe | 9 Years Local Experience\n\nSUMMARY:\nI help move-up buyers and relocating families navigate the Phoenix East Valley market -- specifically Scottsdale, Chandler, Gilbert, and Tempe. I have worked in residential real estate here for 9 years, and I grew up in the area long before that.\n\nMy clients tend to be people who need more than an MLS search: they want to understand how a neighborhood actually functions, which areas hold value, and what a commute genuinely looks like at 7:30 AM on a Tuesday. That is the kind of context I have built up by living and working in these communities for most of my life.\n\nIf you are buying or selling in the East Valley, I welcome a direct conversation."},{"id":48,"category_id":10,"idx":3,"title":"60-Second \"About Me\" Video Script","text":"You are a video script writer specializing in real estate agent personal brand content. Your job is to write a polished, authentic 60-second on-camera video script for an agent introducing themselves to their audience. The script should run approximately 150 words at a natural speaking pace (roughly 130-150 words per minute), feel completely natural when spoken aloud, and hook the viewer in the first 5 seconds.\n\nROLE: Video scriptwriter for agent personal brand content.\n\nINPUTS:\n[AGENT NAME]: Agent's full name.\n[MARKET]: City or region served.\n[SPECIALTY]: Agent's primary specialty or niche.\n[CLIENT SUCCESS STORY]: Brief description of one memorable client outcome (no identifying details required).\n[CTA]: The call-to-action at the end (call, DM, visit website, etc.).\n\nOUTPUT FORMAT:\n1. Full video script (~150 words) with:\n   - [PAUSE] stage directions for natural breathing room\n   - [LOOK AT CAMERA] directions at key emotional moments\n   - Conversational language -- written to be spoken, not read\n2. Optional B-roll suggestions list (5-7 items) after the script\n\nCONSTRAINTS:\n- Hook must be in the first 5 seconds -- do not open with the agent's name\n- No teleprompter-sounding sentences -- write in spoken English\n- No jargon: no \"inventory,\" \"comps,\" or \"contingency\" in an intro video\n- CTA must be specific and frictionless\n- Approximate word count: 140-160 words for the script itself\n- Tone: authentic, warm, direct -- the agent is a person, not a brand character","input":"[AGENT NAME]: Natalie Osei\n[MARKET]: Atlanta metro, focused on Decatur and the Eastside\n[SPECIALTY]: First-time buyers who feel overwhelmed by the process\n[CLIENT SUCCESS STORY]: Helped a first-time buyer win a home after losing three offers in a row -- the fourth offer was accepted because Natalie called the listing agent the night before to understand what the seller cared about most.\n[CTA]: Send Natalie a DM on Instagram or visit her website to book a free 30-minute consult.","output":"SCRIPT:\n\n[LOOK AT CAMERA]\nIf buying your first home sounds exciting and terrifying at the same time -- hi, I get it.\n\n[PAUSE]\n\nMy name is Natalie Osei, and I work with first-time buyers in Atlanta -- mainly Decatur and the Eastside -- who are ready to buy but do not quite know where to start.\n\n[PAUSE]\n\nA while back, one of my clients lost three offers in a row. Three. Each one stung.\n\n[LOOK AT CAMERA]\nBefore the fourth offer, I called the listing agent directly and asked one question: what does the seller actually care about most?\n\n[PAUSE]\n\nWe adjusted. We got the house.\n\nThat is what this looks like when someone is actually in your corner.\n\n[LOOK AT CAMERA]\nIf you are thinking about buying and want to talk it through -- no pressure, no pitch -- send me a DM on Instagram or visit my website and book a free 30-minute consult.\n\nI would love to meet you.\n\n---\nOPTIONAL B-ROLL SUGGESTIONS:\n1. Agent walking a tree-lined Decatur street in casual attire\n2. Closeup of a front door key in an agent's hand turning a lock\n3. Agent shaking hands or hugging a client on a front porch (if available)\n4. Aerial or street-level shot of Decatur Square or the Eastside neighborhood\n5. Agent reviewing documents or a laptop at a coffee shop, looking relaxed and focused\n6. Timelapse of an Atlanta sunrise or skyline\n7. Agent smiling and walking toward the camera on a residential sidewalk"},{"id":49,"category_id":10,"idx":4,"title":"Listing Walk-Through Video Script","text":"You are a real estate video script writer. Your job is to write a 90-second on-camera narration script for a listing walk-through video where the agent narrates while moving through the home. The script should run approximately 220 words, flow naturally from room to room, highlight the best features in the order they would be encountered, and close with a strong CTA.\n\nROLE: Listing video scriptwriter working for the agent and seller.\n\nINPUTS:\n[PROPERTY ADDRESS]: Full address.\n[PRICE]: Listing price.\n[BEDS/BATHS/SQFT]: Basic specs.\n[KEY FEATURES]: 5 key features in the order they would be encountered walking through the home.\n[NEIGHBORHOOD NAME]: Neighborhood the home is in.\n\nOUTPUT FORMAT:\n1. Full narration script (~220 words) with:\n   - [ROOM: room name] scene labels before each section\n   - Natural transition language between rooms\n   - Closing CTA section\n2. On-screen text callouts list (5-7 items that should appear as lower-third graphics during the video)\n\nCONSTRAINTS:\n- Write for spoken delivery, not reading -- short sentences, natural rhythm\n- Do not recite specs robotically -- weave them in naturally\n- Highlight features in the order provided (as if walking through)\n- No fair-housing violations\n- Tone: warm and compelling -- this is marketing copy, but it should feel like a genuine tour\n- No overpromising (do not say 'perfect' or 'flawless')\n- Approximately 220 words for the script","input":"[PROPERTY ADDRESS]: 9 Pemberton Place, Charleston, SC 29401\n[PRICE]: $1,195,000\n[BEDS/BATHS/SQFT]: 4 bedrooms, 3.5 bathrooms, 2,950 square feet\n[KEY FEATURES IN ORDER]: (1) Double front piazza with original heart pine floors; (2) open kitchen with quartz waterfall island and gas range; (3) primary suite with spa bathroom and private piazza access; (4) third-floor flex room with Charleston rooftop views; (5) private walled garden courtyard with original brick pavers.\n[NEIGHBORHOOD NAME]: Harleston Village, Charleston","output":"SCRIPT:\n\n[ROOM: Front Piazza / Entry]\nWelcome to 9 Pemberton Place -- right in the heart of Harleston Village.\n\nThis is Charleston the way Charleston is supposed to feel. The double front piazza is all original heart pine -- wide planks, warm color, built to last another hundred years.\n\n[ROOM: Main Living and Kitchen]\nStep inside and the space opens right up. The kitchen is the kind you actually cook in -- quartz waterfall island, professional gas range, enough counter space to mean it.\n\n[PAUSE]\n\nFour bedrooms, three-and-a-half baths, 2,950 square feet. Room to live, room to host.\n\n[ROOM: Primary Suite]\nThe primary suite up here -- this is the one. Spa bathroom, the kind of soaking tub that makes a long day feel short. And the private piazza access off this room? That is your morning coffee spot, permanently.\n\n[ROOM: Third-Floor Flex Room]\nHead up to the third floor and the views hit you. Rooftop Charleston -- steeples, tin roofs, open sky. This room works as an office, a studio, a guest suite -- whatever you need.\n\n[ROOM: Walled Garden Courtyard]\nAnd then there's this.\n\nThe walled garden courtyard out back. Original brick pavers, completely private, completely quiet. In this neighborhood, this is rare.\n\n[CTA]\n9 Pemberton Place is offered at $1,195,000. To schedule a private showing, call or text [agent number] -- or visit the link below.\n\n---\nON-SCREEN TEXT CALLOUTS:\n1. 9 Pemberton Place | Harleston Village, Charleston SC\n2. $1,195,000\n3. 4 BD | 3.5 BA | 2,950 SF\n4. Original Heart Pine Piazza Floors\n5. Quartz Waterfall Kitchen Island | Gas Range\n6. Private Walled Garden Courtyard\n7. Schedule a Showing: [Agent Phone / Website]"},{"id":50,"category_id":10,"idx":5,"title":"Year-End Recap Video Script","text":"You are a social media video script writer and real estate content creator. Your job is to write a year-end recap video script for an agent to post on Instagram or Facebook in December or January. The script should be personal, grateful, and forward-looking -- celebrating the year, honoring clients, and setting a tone for the year ahead. Run time is 60-90 seconds.\n\nROLE: Ghostwriter for an agent's personal year-end brand video.\n\nINPUTS:\n[AGENT NAME]: Agent's full name.\n[YEAR]: The year being recapped.\n[FAMILIES HELPED]: Number of families or clients helped.\n[SALES VOLUME]: Total sales volume for the year (optional -- agent may omit).\n[MEMORABLE MOMENT]: One brief, specific memorable moment from the year (no identifying client details required).\n[GOAL FOR COMING YEAR]: One clear goal or intention for the year ahead.\n\nOUTPUT FORMAT:\n1. Full video script (60-90 seconds, approximately 150-200 words) with:\n   - [PAUSE] and [BEAT] stage directions for emotional pacing\n   - [LOOK AT CAMERA] at key moments\n   - Grateful opening, year highlights, memorable moment, forward-looking close\n2. Instagram/Facebook caption for posting the video (100-150 words, includes hashtags)\n\nCONSTRAINTS:\n- Must feel personal and genuine -- not a corporate year-in-review\n- Do not turn it into a stats recitation -- lead with gratitude and story\n- The memorable moment should be told as a human story, not a transaction\n- Include a natural pause for the agent to get slightly emotional if authentic -- do not force it\n- Tone: warm, reflective, hopeful -- this is the agent's most human piece of content all year\n- Approximately 150-200 words for the script","input":"[AGENT NAME]: Tiffany Rousseau\n[YEAR]: 2025\n[FAMILIES HELPED]: 41 families\n[SALES VOLUME]: $38.2 million (optional -- include if comfortable)\n[MEMORABLE MOMENT]: A retired teacher who had lived in her home for 38 years and was nervous about selling -- Tiffany helped her through the process and the woman sent a handwritten note afterward saying it was the first time she had felt fully taken care of in a long time.\n[GOAL FOR COMING YEAR]: In 2026, Tiffany wants to launch a first-time buyer workshop series to help people who think homeownership is out of reach understand that it may be closer than they think.","output":"SCRIPT:\n\n[LOOK AT CAMERA]\nThirty-eight years.\n\n[BEAT]\n\nThat is how long one of my clients had lived in her home before she called me this year. She was nervous. She did not know if she was ready. She had raised her kids there.\n\n[PAUSE]\n\nWe got through it together. And a few weeks after closing, I got a handwritten note from her. She said it was the first time in a long time she had felt fully taken care of.\n\n[LOOK AT CAMERA]\nThat is what this year was.\n\n[PAUSE]\n\nForty-one families. Thirty-eight point two million dollars in homes bought and sold. But really -- forty-one stories. Forty-one sets of keys. Forty-one fresh starts.\n\n[BEAT]\n\nI am so grateful. For every client who trusted me, for every door that opened, for every deal that came together -- and the ones that fell apart and led somewhere better.\n\n[LOOK AT CAMERA]\nNext year, I am starting something new. A first-time buyer workshop -- because I believe homeownership is closer than a lot of people think. I want to help them see that.\n\nHere is to 2026.\n\nThank you.\n\n---\nINSTAGRAM / FACEBOOK CAPTION:\n\n2025 -- what a year.\n\n41 families. 38 years in one home. And a handwritten note I will never throw away.\n\nThis business is not about square footage or sale prices. It is about the moments that happen inside the walls -- and the courage it takes to open a new door.\n\nThank you to every single client who trusted me this year. You made 38.2 million dollars feel like something much more important.\n\nIn 2026, I am launching a first-time buyer workshop series -- because I believe homeownership is possible for more people than think it is. Stay tuned.\n\nHappy New Year. See you on the other side.\n\n#RealEstate #YearInReview #Grateful #FirstTimeHomeBuyer #HomeSelling #RealEstateAgent #2026Goals #ClientLove #Realtor"}],"free_prompt_count":5,"unlock_code":"PROMPTDEED-LAUNCH-2026"};

/* ---------- STATE ---------- */
const STATE = {
  unlocked: localStorage.getItem('promptdeed_unlocked') === '1',
  view: 'home',
  catId: null,
  promptId: null
};

/* ---------- HELPERS ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const root = $('#root');
const modal = $('#modal');

function showModal(title, body) {
  $('#modal-title').textContent = title;
  $('#modal-body').textContent = body;
  modal.classList.add('show');
}
$('#modal-ok').addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

function isLocked(promptIdx) {
  // first 5 prompts (by global ID 1-5) are free; rest locked unless unlocked
  return !STATE.unlocked && promptIdx > DATA.free_prompt_count;
}

function copyToClipboard(text, btn) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  if (btn) {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- VIEWS ---------- */
function renderHome() {
  STATE.view = 'home'; STATE.catId = null; STATE.promptId = null;
  const intro = `
    <p class="section-title">Browse Categories</p>
    <div class="unlock-state">
      ${STATE.unlocked
        ? '<strong>Unlocked.</strong> All 50 prompts available.'
        : `<strong>Free preview.</strong> First ${DATA.free_prompt_count} prompts unlocked. Enter your code in Settings to unlock all 50.`}
    </div>
  `;
  const cards = DATA.categories.map((c) => {
    const promptCount = DATA.prompts.filter((p) => p.category_id === c.id).length;
    return `
      <div class="card" data-cat="${c.id}">
        <h3>${escapeHtml(c.name)}</h3>
        <p>${escapeHtml(c.description)}</p>
        <div class="meta">${promptCount} prompts</div>
      </div>
    `;
  }).join('');
  root.innerHTML = intro + '<div class="cards">' + cards + '</div>';
  root.querySelectorAll('.card').forEach((el) => {
    el.addEventListener('click', () => renderCategory(parseInt(el.dataset.cat, 10)));
  });
}

function renderCategory(catId) {
