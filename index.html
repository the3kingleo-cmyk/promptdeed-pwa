t loaded questions.\n- The 8 objections must be the 8 that actually come up most frequently -- not textbook examples. Write them in the seller's actual voice.\n- Tone: respectful, direct, knowledgeable.","input":"[AGENT MARKET]: Tampa, FL\n[TYPICAL FSBO SAVINGS CLAIM]: Tampa FSBOs commonly claim they will save $18,000-$22,000 by not paying a listing agent commission on a $400K home\n[AGENT USP]: Agent runs a professional photography + video + 3D Matterport tour package included with every listing, distributes to 52 buyer platforms, and has averaged 14 days to contract versus the Tampa MLS average of 28 days over the past 12 months","output":"FSBO OBJECTION CHEAT SHEET -- Tampa, FL\n\n---\n\nOBJECTION 1: \"We want to save the commission -- that's $18,000-$22,000 we can keep.\"\nREBUTTAL: That math works if you sell at the same price you would get with full marketing. The challenge is that FSBO homes in Tampa typically sell for 5-7% less than agent-listed homes, according to NAR data -- which on a $400K home can exceed $20,000. The question is not whether you save the commission. The question is whether you net more at the end. My listings have averaged 14 days to contract versus 28 for the Tampa MLS average -- speed and price go together.\nFOLLOW-UP QUESTION: Would you be open to seeing what the numbers actually look like side by side?\n\n---\n\nOBJECTION 2: \"We already have someone interested -- a neighbor/friend/family connection.\"\nREBUTTAL: That is genuinely good news, and I am not here to talk you out of it. But interested and under contract are different things, and deals with known buyers fall apart at a higher rate because the inspection, appraisal, and financing conversations get personal and complicated. Even if you proceed without me, make sure you have a real estate attorney reviewing every document.\nFOLLOW-UP QUESTION: Is your interested buyer pre-approved, or are they still at the \"thinking about it\" stage?\n\n---\n\nOBJECTION 3: \"We're just going to list it on Zillow and see what happens.\"\nREBUTTAL: Zillow is one platform. My listings reach 52 buyer-facing platforms including Realtor.com, Homes.com, and every major syndication feed -- plus professional photography and a 3D Matterport tour that converts online lookers into actual showings. Most FSBO listings reach buyers who are casually browsing. Mine reach buyers who are ready.\nFOLLOW-UP QUESTION: How many platforms is your current listing showing up on right now?\n\n---\n\nOBJECTION 4: \"We've sold a house before -- we know what we're doing.\"\nREBUTTAL: I believe you, and that experience is actually an asset. The market in Tampa today is different than it was even two years ago -- disclosure requirements, buyer representation agreement changes, and appraisal gap dynamics have all shifted. I'm not saying you can't do it. I'm saying the legal and contract landscape has real landmines that trip up experienced sellers.\nFOLLOW-UP QUESTION: When did you last sell -- was it in the Tampa market specifically?\n\n---\n\nOBJECTION 5: \"We're just testing the market -- not in a rush.\"\nREBUTTAL: Testing the market is a reasonable approach, and I respect that. What most sellers do not realize is that the longer a home sits -- even at a test price -- the more it gets labeled as a problem property by active buyers and their agents. Days on market is public data and buyers use it. A clean, fast-to-contract listing always nets more than a slow one at a higher ask.\nFOLLOW-UP QUESTION: What is the outcome that would make you feel like the test was a success?\n\n---\n\nOBJECTION 6: \"We had a bad experience with an agent before.\"\nREBUTTAL: I am sorry to hear that -- and I am not going to tell you that all agents are different, because that is not useful. What I can offer is specifics: here is what I do, here is how I communicate, here is exactly what my last 12 listings looked like from list to close. Judge me on that, not on someone else's performance.\nFOLLOW-UP QUESTION: What was the part of that experience that was most frustrating for you?\n\n---\n\nOBJECTION 7: \"We don't want strangers walking through our home.\"\nREBUTTAL: That is a completely legitimate concern, and it is one of the things a listing agent actually protects you from. Every buyer who tours my listings is pre-qualified, represented by a licensed agent, and scheduled in advance. The showings that happen without an agent involved -- where a FSBO seller is home alone with an unknown visitor -- are the situations where things can go wrong.\nFOLLOW-UP QUESTION: Are you comfortable showing the home yourself, or would having a buffer between you and buyers actually feel better?\n\n---\n\nOBJECTION 8: \"We're going to try it ourselves for a few weeks and then maybe call you.\"\nREBUTTAL: Fair enough -- and I will not pressure you. I would just ask you to be honest with yourself about what the trigger is for making the call. If it is no offers after two weeks, that is a clear signal. The risk of waiting too long is that you have now spent your fresh-to-market period -- the days when buyer interest and showing requests peak -- at a price or presentation that did not convert.\nFOLLOW-UP QUESTION: What would have to happen -- or not happen -- in the next two weeks for you to decide it is time to talk?"},{"id":21,"category_id":5,"idx":1,"title":"Buyer Discovery Questionnaire (25 Questions)","text":"You are an expert real estate buyer's agent coach who helps agents run exceptional consultation meetings.\n\nYour job: generate a 25-question buyer discovery questionnaire tailored to a specific buyer profile. The questionnaire should help an agent uncover timeline, financing status, must-haves, deal-breakers, neighborhood priorities, lifestyle needs, and experience level. Questions should feel conversational, not interrogative.\n\nINPUTS:\n[BUYER_PROFILE] (first-timer / move-up / downsizer / investor)\n[PRICE_RANGE] (e.g. $350,000-$450,000)\n[TARGET_AREA] (city, neighborhood, or metro)\n[AGENT_NAME]\n\nOUTPUT FORMAT:\n- Brief one-paragraph agent intro (how to frame the questionnaire verbally before starting)\n- Numbered list of exactly 25 questions, grouped by section with bold section headers: Timeline & Motivation (Q1-4), Financing (Q5-8), The Home Itself (Q9-14), Location & Lifestyle (Q15-19), Deal-Breakers (Q20-22), Experience & Process (Q23-25)\n- After the 25 questions, include a short \"How to Use This\" note (3-4 sentences) advising the agent on delivery: take notes, listen for emotion, don't rush\n\nCONSTRAINTS:\n- Questions must be open-ended where possible (avoid yes/no)\n- No fair-housing violations -- never ask about family status, religion, or national origin\n- Tailor question language to the buyer profile (e.g. investors get ROI/cash flow questions; downsizers get maintenance and accessibility questions)\n- Write questions an agent can ask conversationally, not read robotically\n- Do not include generic filler questions that don't help qualify or understand the buyer","input":"[BUYER_PROFILE]: first-timer\n[PRICE_RANGE]: $320,000-$400,000\n[TARGET_AREA]: Greater Nashville, TN (primarily Nolensville, Brentwood-adjacent, and Antioch corridors)\n[AGENT_NAME]: Marcus Webb, Webb Realty Group","output":"AGENT INTRO (say this before you begin):\n\"Before we start looking at homes, I want to spend about 15 minutes getting to know what you're really looking for -- not just the number of bedrooms, but what you want your life to feel like in this home. There are no wrong answers, and this helps me save you time by only showing you homes that actually fit. Ready?\"\n\n--- TIMELINE & MOTIVATION ---\n1. What first made you decide that now is the right time to buy?\n2. Is there a specific date you'd like to be moved in by, or is your timeline more flexible?\n3. What's your current living situation, and does anything about it create urgency for you?\n4. On a scale of 1 to 10, how motivated are you to find and close on a home in the next 90 days?\n\n--- FINANCING ---\n5. Have you spoken with a lender yet, and if so, where do you stand with pre-approval?\n6. What monthly payment feels comfortable to you -- not just what the bank approves, but what feels right?\n7. Beyond the down payment, do you have reserves set aside for closing costs and early repairs?\n8. Are there any financial factors -- job change, student loans, co-signer situation -- your lender should know about so we can plan ahead?\n\n--- THE HOME ITSELF ---\n9. When you picture yourself living in your ideal home, what does a typical Saturday morning look like?\n10. How many bedrooms do you need, and is any of that flexibility, or is it firm?\n11. What's one thing about where you live now that you absolutely cannot have in your next home?\n12. Is a garage a must-have, a nice-to-have, or not on your radar?\n13. How do you feel about a home that needs cosmetic updates versus one that's fully move-in ready?\n14. Are there any accessibility or layout considerations I should know about -- single-story, wide doorways, step-free entry?\n\n--- LOCATION & LIFESTYLE ---\n15. How long of a commute is acceptable, and are you working from home any days per week?\n16. How important is being close to specific things -- restaurants, parks, gyms, family?\n17. What do you know about Nolensville, Brentwood-adjacent, and Antioch -- any strong preferences or concerns?\n18. How important is the neighborhood feel to you -- quiet and private, or walkable and social?\n19. If the perfect home came up in an area you hadn't considered, would you be open to it?\n\n--- DEAL-BREAKERS ---\n20. Is there anything -- a feature, a location, a type of street -- that is an immediate no, full stop?\n21. How do you feel about busy roads, railroad proximity, or flight paths?\n22. If a home checks every box but needs a new roof or HVAC within two years, how does that land with you?\n\n--- EXPERIENCE & PROCESS ---\n23. Have you bought a home before, or is this genuinely your first time through this process?\n24. What do you already understand about the offer and contract process, and what feels murky?\n25. What would make this home-buying experience feel like a success to you -- beyond just finding a house?\n\n--- HOW TO USE THIS ---\nMarcus, bring this questionnaire to every first-time buyer consultation and treat it as a conversation guide, not a form to fill out. Take handwritten notes -- buyers notice and appreciate it. Pay attention to emotional language: when someone says \"I need\" versus \"it would be nice,\" that distinction tells you everything. Don't rush questions 9 and 25 -- those two answers often reveal more than all the others combined."},{"id":22,"category_id":5,"idx":2,"title":"First-Time Buyer Education Script","text":"You are a seasoned real estate buyer's agent who communicates complex processes in plain, reassuring language.\n\nYour job: write a step-by-step verbal script for educating first-time buyers during a buyer consultation. The script should cover the full purchase process in clear sections: Pre-Approval, The Search, Making an Offer, Under Contract, and Closing. Use plain language -- no jargon. The tone should be confident, warm, and empowering.\n\nINPUTS:\n[MARKET_CONDITIONS] (buyer's market / balanced / seller's market)\n[TYPICAL_DAYS_ON_MARKET] (e.g. 8 days)\n[AVERAGE_CLOSING_COSTS_PCT] (e.g. 2.5%)\n[AGENT_NAME] and [MARKET] (city/metro)\n\nOUTPUT FORMAT:\nFull verbal script with five clearly labeled sections. Each section: 2-4 short paragraphs of spoken language. Total output approximately 600 words. Write as if the agent is speaking directly to a couple sitting across the table. Use \"you\" and \"we\" throughout. Include one natural transition sentence between each section.\n\nCONSTRAINTS:\n- No jargon without immediate plain-English explanation (e.g. \"earnest money -- that's the good-faith deposit you put down when your offer is accepted\")\n- Do not include legal advice\n- Avoid making promises about timelines or outcomes\n- Keep each section to the most important 2-3 concepts -- don't overwhelm\n- Tone: reassuring mentor, not lecturer","input":"[MARKET_CONDITIONS]: seller's market\n[TYPICAL_DAYS_ON_MARKET]: 9 days\n[AVERAGE_CLOSING_COSTS_PCT]: 2.8%\n[AGENT_NAME]: Diane Kowalski\n[MARKET]: Denver Metro, CO","output":"--- PRE-APPROVAL ---\n\"The very first thing we're going to do -- before we look at a single home -- is get you pre-approved by a lender. I know that might feel like putting the cart before the horse, but here's why it matters: in Denver right now, good homes are going under contract in about 9 days. If you fall in love with a house and we're not ready to move, it'll be gone before you can blink.\n\nPre-approval is not the same as pre-qualification. Pre-approval means a lender has actually reviewed your income, credit, and assets and issued a letter saying they'll lend you up to a certain amount. Sellers take that letter seriously. It takes a day or two, and I'll connect you with a couple of lenders I trust if you don't already have one.\n\nOnce we have that letter, we know our real budget -- and we can go shopping with confidence.\"\n\n--- THE SEARCH ---\n\"Once you're pre-approved, the fun part starts. I'll set you up on a custom search that sends you homes as soon as they hit the market -- sometimes even before. We want to be looking at the same listings at the same time so we can move fast.\n\nWhen a home looks promising, we'll schedule a showing quickly -- often the same day or next morning. During showings, I want you to focus on how the home feels, the layout, and the neighborhood. I'll be watching for things like deferred maintenance, odd additions, or anything that might come up in an inspection. Between the two of us, we'll have a complete picture.\n\nDon't worry about seeing every home on the market. We're looking for the right home, not all of them.\"\n\n--- MAKING AN OFFER ---\n\"When you find a home you love, we move fast. I'll pull recent sales data so we know what the home is actually worth, and we'll talk through the offer strategy together. In a seller's market like Denver, we sometimes need to come in at or above list price -- but that doesn't mean throwing money away. It means being strategic.\n\nYour offer will include the purchase price, an earnest money deposit -- that's a good-faith deposit, typically 1% of the purchase price, that gets credited toward your closing -- and any contingencies. Contingencies are your protections: financing, inspection, and sometimes appraisal. We'll talk through which ones make sense to include versus waive based on the specific home and situation.\"\n\n--- UNDER CONTRACT ---\n\"Once a seller accepts your offer, you're officially under contract -- congratulations, by the way. Now we have a set number of days to complete your inspection and finalize your financing.\n\nThe inspection is your chance to really understand the home. The inspector will walk through everything -- roof, HVAC, plumbing, electrical. If they find something significant, we can negotiate repairs or a credit. My job is to make sure you have all the information you need to make a confident decision.\n\nYour lender will order an appraisal during this time as well -- that's the bank confirming the home is worth what you're paying. As long as everything checks out, we move toward closing.\"\n\n--- CLOSING ---\n\"Closing typically happens 30 to 45 days after your offer is accepted. A few days before, you'll receive a Closing Disclosure that shows every cost in detail. In Denver, closing costs average around 2.8% of the purchase price -- so on a $500,000 home, budget roughly $14,000. That covers lender fees, title insurance, prepaid property taxes, and more.\n\nOn closing day, you'll sign the documents, wire your funds, and get your keys. The whole signing usually takes about an hour. And then -- you own a home.\n\nMy goal throughout this entire process is to make sure you never feel confused or surprised. Any time something comes up that you don't understand, call me. That's exactly what I'm here for.\""},{"id":23,"category_id":5,"idx":3,"title":"Buyer Needs vs. Wants Worksheet Generator","text":"You are a real estate buyer consultation specialist who helps agents visually organize buyer priorities.\n\nYour job: create a customized Needs vs. Wants worksheet for a specific buyer based on their profile, lifestyle, and purchase goals. The worksheet should have three columns -- Must Have / Nice to Have / Deal-Breaker -- and four category sections: Location, Home Features, Financial, and Lifestyle.\n\nINPUTS:\n[BUYER_PROFILE] (first-timer / move-up / downsizer / investor)\n[COMMUTE_DESTINATION] (e.g. downtown Austin, TX; remote worker)\n[HOUSEHOLD_SIZE] (e.g. couple + 2 kids + 1 dog)\n[HOBBIES_LIFESTYLE] (e.g. home cooking, gardening, entertaining, cycling, work-from-home)\n[BUDGET] (e.g. $475,000-$550,000)\n\nOUTPUT FORMAT:\nFormatted worksheet with four sections. Each section has a bold category header followed by a table with three columns: MUST HAVE | NICE TO HAVE | DEAL-BREAKER. Each section contains 5-6 rows of specific items. Items should be pre-filled based on the inputs -- not left blank for the buyer to fill in. After the worksheet, include a brief \"Agent Note\" (2-3 sentences) on how to use the worksheet during the consultation.\n\nCONSTRAINTS:\n- Items must be specific and tied to the buyer's actual inputs, not generic (e.g. not just \"good schools\" but \"top-rated elementary within 3 miles\")\n- No fair-housing violations\n- Financial section should reflect realistic cost items for the budget range\n- The worksheet should be printable/readable in plain text -- use dashes and pipes for table structure\n- Lifestyle items should reflect the specific hobbies and household details provided","input":"[BUYER_PROFILE]: move-up buyer\n[COMMUTE_DESTINATION]: downtown Austin, TX (2-3 days/week in office)\n[HOUSEHOLD_SIZE]: married couple + 2 kids (ages 6 and 9) + 1 dog\n[HOBBIES_LIFESTYLE]: home cooking, backyard entertaining, youth sports (kids), cycling on weekends, one partner works from home full-time\n[BUDGET]: $575,000-$650,000","output":"BUYER NEEDS VS. WANTS WORKSHEET\nPrepared for: ___________________________  Date: ___________\nAgent: ___________________________\n\n=== LOCATION ===\nITEM                              | MUST HAVE              | NICE TO HAVE           | DEAL-BREAKER\n------------------------------------|------------------------|------------------------|-----------------------------\nCommute to downtown Austin          | Under 35 min drive     | Under 25 min           | Over 50 min commute\nProximity to youth sports fields    | Within 10 min of parks | Walking distance       | No parks within 20 min\nNeighborhood feel                   | Established, tree-lined| Cul-de-sac/low-traffic | Busy arterial road out front\nCycling access                      | Nearby trail or bike route | Direct trail access | No cycling options nearby\nSchool quality                      | Highly rated elementary | Top 10% state ranking  | Underperforming district\nLot privacy                         | Reasonable privacy     | Large corner lot       | Zero-lot, wall-to-wall neighbors\n\n=== HOME FEATURES ===\nITEM                              | MUST HAVE              | NICE TO HAVE           | DEAL-BREAKER\n------------------------------------|------------------------|------------------------|-----------------------------\nBedrooms                            | 4 bedrooms             | 4 bed + bonus room     | 3 bedrooms or fewer\nHome office                         | Separate room with door| Converted flex room    | Open-plan only, no privacy\nKitchen                             | Open to living area    | Large island, double oven | Closed galley kitchen\nBackyard                            | Flat, fully fenced     | Space for built-in grill | Sloped, unfenced, tiny yard\nGarage                              | 2-car minimum          | 3-car or workshop space | No garage or carport only\nPrimary suite                       | Separated from kids' rooms | Spa bath, double vanity | Shared wall with kids' rooms\n\n=== FINANCIAL ===\nITEM                              | MUST HAVE              | NICE TO HAVE           | DEAL-BREAKER\n------------------------------------|------------------------|------------------------|-----------------------------\nPurchase price                      | At or under $650,000   | Under $610,000         | Over $665,000 post-negotiation\nMonthly PITI payment                | Under $4,200/month     | Under $3,800/month     | Over $4,500/month\nHOA fees                            | Under $150/month       | No HOA                 | HOA over $300/month\nDeferred maintenance                | No major systems at close | Minor cosmetic OK   | Roof/HVAC/foundation issues\nClosing cost budget                 | $15,000-$18,000 ready  | Seller concession      | Costs exceeding $20,000\nAppraisal gap                       | Cover up to $10,000    | No gap needed          | Gap over $20,000\n\n=== LIFESTYLE ===\nITEM                              | MUST HAVE              | NICE TO HAVE           | DEAL-BREAKER\n------------------------------------|------------------------|------------------------|-----------------------------\nOutdoor entertaining                | Covered patio or deck  | Outdoor kitchen/pergola | Concrete slab, no shade\nKitchen for serious cooking         | Gas range, good counters | Double oven, large pantry | Electric-only, limited space\nDog-friendly yard                   | Fully fenced, no HOA breed ban | Large grassy run area | HOA bans dogs over 25 lbs\nKids' play space                    | Safe backyard with room to play | Pool with safety fence | No usable yard space\nHome office quiet zone              | Away from main living noise | Dedicated wing     | Open loft next to living room\nNeighborhood community              | Families with kids nearby | Block events, community feel | Transient rental-heavy street\n\n--- AGENT NOTE ---\nGo through this worksheet with your buyers before you start touring. Ask them to rank each \"Nice to Have\" as low, medium, or high priority -- that ranking becomes your tiebreaker when two homes are otherwise equal. Revisit the worksheet after the second or third showing, because priorities often shift once buyers see real inventory."},{"id":24,"category_id":5,"idx":4,"title":"Pre-Approval Conversation Script","text":"You are a skilled real estate buyer's agent who knows how to guide buyers through the pre-approval conversation without pressure or condescension.\n\nYour job: write a full conversation script for the moment an agent encourages a buyer to get pre-approved before touring homes. The script must handle the most common pushback: \"Can't I just look at homes first?\" The tone should be warm, consultative, and educational -- not preachy or fear-based.\n\nINPUTS:\n[MARKET_CONDITIONS] (buyer's / balanced / seller's market)\n[SCENARIO] (a brief anecdote or real-world scenario the agent can share to illustrate why pre-approval matters)\n[PREFERRED_LENDER_NAME] (optional -- if provided, reference by name; if not, say \"a lender I work with\")\n[AGENT_NAME]\n\nOUTPUT FORMAT:\nFull conversation script formatted as:\nAGENT: [what the agent says]\nBUYER: [realistic buyer response or pushback]\nAGENT: [agent's follow-up]\n\nThe script should include:\n1. Opening -- agent proactively raises pre-approval\n2. Buyer pushback #1: \"Can't we just look first?\"\n3. Agent handles with the scenario/anecdote\n4. Buyer pushback #2: \"Will it hurt my credit?\"\n5. Agent explains soft vs. hard pull\n6. Buyer pushback #3: \"I don't know which lender to use\"\n7. Agent offers referral and closes on next step\n\nCONSTRAINTS:\n- Do not disparage specific lenders or banks by name\n- Do not provide specific interest rate claims\n- Keep the agent's voice confident but never pushy\n- The script should be realistic -- buyers don't always push back on all three, and the agent should sound human, not rehearsed\n- Total script length: 350-500 words","input":"[MARKET_CONDITIONS]: seller's market (multiple offers common, homes going quickly)\n[SCENARIO]: Last month, a buyer I was working with found their dream home on a Thursday. We weren't pre-approved yet. By the time we got the letter on Monday, the home had already accepted an offer over the weekend. The buyers were heartbroken.\n[PREFERRED_LENDER_NAME]: Sarah Nguyen at First Horizon\n[AGENT_NAME]: Tom Greer","output":"AGENT (Tom): \"Before we start setting up showings, I want to make sure we get you pre-approved first. I know that probably sounds like a homework assignment before the fun part, but it genuinely protects you -- and in this market, it could make or break whether you get the house you want.\"\n\nBUYER: \"Do we really need to do that before we look? We're just getting started -- we kind of want to see what's out there first.\"\n\nAGENT (Tom): \"I totally get that, and honestly, I used to have buyers look first all the time. But let me tell you what happened last month. I had a couple -- great people -- who found what they called their perfect home on a Thursday afternoon. We hadn't gotten the pre-approval done yet. By the time we had the letter in hand Monday morning, the sellers had already accepted another offer over the weekend. They were absolutely crushed. And there was nothing I could do.\n\nIn a seller's market like we're in right now, the good homes don't sit around waiting. Getting pre-approved means that when we walk into that house and you turn to me and say 'this is it,' I can call the listing agent within the hour and submit something real. Without that letter, we're just hoping.\"\n\nBUYER: \"Okay, that makes sense. But doesn't applying hurt your credit score?\"\n\nAGENT (Tom): \"Great question, and a lot of people worry about that. Here's the short version: when a lender does a pre-approval, it's a hard inquiry -- which typically causes a small, temporary dip, usually five points or less. But here's the thing: if you're shopping around and apply with multiple mortgage lenders within a 45-day window, the credit bureaus typically count all those pulls as a single inquiry. It's designed to encourage comparison shopping. Your lender will walk you through exactly what to expect.\"\n\nBUYER: \"We don't really have a lender. We haven't even thought about that part.\"\n\nAGENT (Tom): \"No problem at all -- that's actually the most common situation. I work closely with Sarah Nguyen at First Horizon, and I recommend her to a lot of my clients. She's responsive, she explains everything in plain English, and she's closed a lot of deals with me. I'm not going to tell you that you have to use her -- you're absolutely free to shop around -- but if you want a name to start with, she's my go-to.\n\nWant me to send her your contact info so she can reach out today? The whole process takes about 24 to 48 hours, and then we're ready to move the moment the right home comes up.\""},{"id":25,"category_id":5,"idx":5,"title":"Buyer Consultation Recap Email","text":"You are a real estate agent who follows up with buyer clients after consultations with warm, personalized communication.\n\nYour job: write a post-consultation recap email sent within 2 hours of a buyer meeting. The email should summarize what was discussed, confirm next steps, and reinforce the personal connection made in the meeting. It should feel like it came from a real person, not a CRM template.\n\nINPUTS:\n[BUYER_NAMES] (e.g. Kevin and Priya)\n[WHAT_THEYRE_LOOKING_FOR] (brief description: property type, price, area, key needs)\n[KEY_CONVERSATION_POINTS] (2-3 specific things discussed -- could be concerns, funny moments, priorities the buyers shared)\n[AGREED_NEXT_STEPS] (what each party will do next and by when)\n[AGENT_NAME]\n\nOUTPUT FORMAT:\nSubject line (1 option only)\nEmail body -- approximately 200 words. Sections: warm opener referencing something specific from the meeting, brief summary of what they're looking for, bullet-point next steps (clear who does what), warm personal close.\n\nCONSTRAINTS:\n- Do not sound like a form letter -- use specific details from the inputs\n- Subject line should not use clickbait or exclamation points\n- Bullet points for next steps only -- everything else in natural paragraph prose\n- Sign off warmly but professionally (not overly casual)\n- No real estate jargon in the email body\n- Avoid hollow phrases like \"it was so great to meet you\" with nothing to back it up","input":"[BUYER_NAMES]: Kevin and Priya Mehta\n[WHAT_THEYRE_LOOKING_FOR]: 3-4 bedroom single-family home in the Raleigh-Durham area (preferably Cary or Apex), $480,000-$540,000, need home office for Priya, yard for their dog Bruno, ideally move in before school year starts in August\n[KEY_CONVERSATION_POINTS]: Kevin mentioned they lost a home in multiple offers last year and are nervous about that happening again; Priya said the home office is non-negotiable (she's on video calls all day); we had a good laugh about Bruno's apparent hatred of hardwood floors\n[AGREED_NEXT_STEPS]: Kevin and Priya will call First National Bank (lender referral) by Friday; agent will set up a custom MLS search and send first batch of listings by end of day tomorrow\n[AGENT_NAME]: Janet Flores, Flores & Associates Realty","output":"Subject: Your recap from today + first listings coming tomorrow\n\nHi Kevin and Priya,\n\nIt was genuinely great sitting down with you both today -- and I'm already thinking about the Cary listings that came to mind while we were talking. (I'm also going to keep an eye out for homes with smooth tile entries for Bruno's sake.)\n\nHere's a quick summary of what we're looking for:\nA 3-4 bedroom single-family home in Cary or Apex in the $480K-$540K range. The home office is a firm requirement for Priya -- we're talking a private room with a door, not a corner of the dining room. A fenced or fence-able yard matters, and the goal is to be settled in before school starts in August.\n\nI hear you on the multiple-offer situation from last year, Kevin. That experience is exactly why our first move is getting your pre-approval locked in -- so when something great comes up, we can move that same day.\n\nNext steps:\n- Kevin and Priya: Call Sarah at First National Bank by Friday (I'll forward her contact info separately)\n- Janet: Custom MLS search built and first listings in your inbox by end of day tomorrow\n\nYou're in good hands. Reach out any time -- I respond to texts fastest.\n\nTalk soon,\nJanet Flores\nFlores & Associates Realty\n[phone] | [email]"},{"id":26,"category_id":6,"idx":1,"title":"Pre-Listing Appointment Email + Agenda","text":"You are a top-producing listing agent who knows that preparation before a listing appointment increases show rates and win rates.\n\nYour job: write a professional pre-listing appointment email that is sent to the seller within 24 hours of scheduling the appointment. The email should set expectations for the meeting, build credibility, include a brief agenda, and subtly reduce the likelihood of a cancellation or no-show.\n\nINPUTS:\n[SELLER_NAME] (e.g. The Morrison Family or Robert and Linda)\n[PROPERTY_ADDRESS]\n[APPOINTMENT_DATETIME] (e.g. Thursday, June 5 at 6:00 PM)\n[AGENT_NAME] and [BROKERAGE]\n[THREE_AGENDA_ITEMS] (the three main things the agent will cover in the meeting)\n\nOUTPUT FORMAT:\nSubject line (1 option)\nEmail body (~200 words) structured as:\n- Opening: confirms appointment and expresses genuine enthusiasm (not generic)\n- One short paragraph about what to expect and what the agent has prepared\n- Embedded agenda (3 bullets)\n- One sentence on what the sellers can do to prepare (optional: gather any relevant docs)\n- Warm, professional close\n\nCONSTRAINTS:\n- Do not oversell or use hype language (\"best agent in the area,\" \"guaranteed to sell\")\n- Do not use hollow phrases like \"I'm very excited to work with you\" without substance\n- Keep the tone professional but human -- like a consultant, not a salesperson\n- Agenda should be specific to the three items provided, not generic placeholders\n- Do not mention commission in the pre-listing email","input":"[SELLER_NAME]: Robert and Carol Hendricks\n[PROPERTY_ADDRESS]: 2214 Winding Creek Drive, Marietta, GA\n[APPOINTMENT_DATETIME]: Wednesday, June 11 at 6:30 PM\n[AGENT_NAME]: Stacey Burrows\n[BROKERAGE]: Benchmark Realty Group\n[THREE_AGENDA_ITEMS]: \n1. Current market conditions in East Cobb and what comparable homes have actually sold for\n2. Our complete marketing plan for 2214 Winding Creek -- including professional photography, MLS strategy, and social media promotion\n3. Pricing strategy and what the data suggests as the range most likely to attract strong offers","output":"Subject: Your listing appointment Wednesday at 6:30 -- here's what to expect\n\nHi Robert and Carol,\n\nI'm looking forward to meeting with you at 2214 Winding Creek Drive this Wednesday at 6:30 PM. I've spent time this week researching the current market in East Cobb -- pulling the most relevant comparable sales and putting together a marketing plan specific to your home -- so we'll have a lot of useful information to work through together.\n\nHere's a brief agenda for our time together:\n\n- The East Cobb market right now: what comparable homes have actually sold for in the past 90 days, and what that tells us about positioning your home\n- Marketing plan for 2214 Winding Creek: professional photography, MLS strategy, digital promotion, and how we plan to reach serious buyers\n- Pricing strategy: I'll walk you through the data and share the range I believe will attract the strongest offers\n\nOur meeting will run about 60-75 minutes. If you happen to have a recent property tax bill or any records of major improvements handy, feel free to have those available -- but it's not required.\n\nSee you Wednesday.\n\nStacey Burrows\nBenchmark Realty Group\n[phone] | [email]"},{"id":27,"category_id":6,"idx":2,"title":"Listing Presentation Outline (10 Slides)","text":"You are an expert real estate listing presentation consultant who helps top agents win more listings.\n\nYour job: write the full text content for a 10-slide listing presentation. Each slide should have a clear headline and 3-5 bullet points or a short paragraph of content ready to drop into a presentation tool (PowerPoint, Canva, Google Slides, etc.).\n\nINPUTS:\n[AGENT_NAME] and [BROKERAGE]\n[MARKET_NAME] (city or metro)\n[TRANSACTIONS_AND_VOLUME] (e.g. 47 transactions, $22M in sales volume last 12 months)\n[MARKETING_DIFFERENTIATORS] (3-5 specific things that make this agent's marketing different)\n[PRICING_PHILOSOPHY] (agent's approach to pricing -- data-driven, collaborative, etc.)\n\nOUTPUT FORMAT:\nSlide 1 through Slide 10, each formatted as:\nSLIDE [N]: [SLIDE TITLE IN CAPS]\nHeadline: [headline text]\nContent: [bullet points or short paragraph]\n\nSlide topics (in order): (1) Title/intro, (2) About the agent, (3) Why the brokerage, (4) Local market snapshot, (5) Marketing plan overview, (6) Digital & social strategy, (7) Professional photography & staging, (8) Pricing strategy, (9) What to expect / timeline, (10) Next steps / call to action\n\nCONSTRAINTS:\n- Content should be polished and ready to present -- not rough notes\n- Avoid claims that can't be substantiated (\"best agent,\" \"guaranteed results\")\n- Each slide should be concise enough to work visually -- no walls of text\n- Pricing slide must not include any specific commission figures\n- Write in second person for seller-facing content (\"your home,\" \"you'll receive\")","input":"[AGENT_NAME]: Michelle Tran\n[BROKERAGE]: Compass\n[MARKET_NAME]: San Jose, CA / South Bay\n[TRANSACTIONS_AND_VOLUME]: 38 transactions, $31M in sales volume in the past 12 months\n[MARKETING_DIFFERENTIATORS]: professional architectural photography + drone footage, targeted Facebook and Instagram ad campaigns with custom audiences, featured placement on Compass.com and Zillow Premier, personal email campaign to my database of 1,400+ active buyers and agents, 3D Matterport virtual tour on every listing\n[PRICING_PHILOSOPHY]: Data-driven and collaborative -- I present the full CMA, explain the pricing strategy, and we decide together. I never push sellers to underprice, and I never let sellers overprice out of wishful thinking.","output":"SLIDE 1: TITLE\nHeadline: Your Home. Sold with Strategy.\nContent: Presented by Michelle Tran, Compass | South Bay Real Estate | [date] | [Property Address]\n\nSLIDE 2: ABOUT MICHELLE\nHeadline: A Track Record Built in This Market\nContent:\n- 38 transactions closed in the past 12 months -- $31M in total sales volume\n- Specializing in San Jose and the South Bay since [year]\n- Known for honest pricing counsel, aggressive marketing, and smooth transactions\n- Born and raised in the South Bay -- this market is home\n\nSLIDE 3: WHY COMPASS\nHeadline: The Resources of a National Platform. The Feel of a Local Expert.\nContent:\n- Compass is among the top brokerages nationally by sales volume\n- Technology that gives your listing maximum exposure from day one\n- Featured placement on Compass.com -- one of the most visited real estate platforms in the U.S.\n- A network of agents and buyers that most local brokerages can't match\n\nSLIDE 4: THE SOUTH BAY MARKET RIGHT NOW\nHeadline: What the Data Says About Selling in Today's Market\nContent:\n- Median days on market: [X days]\n- List-to-sale price ratio: [X%]\n- Active inventory vs. 12 months ago: [up/down X%]\n- What this means for your home: [brief interpretation tailored to conditions]\n\nSLIDE 5: YOUR MARKETING PLAN\nHeadline: More Than a Sign in the Yard\nContent:\n- Professional architectural photography + licensed drone footage\n- 3D Matterport virtual tour so buyers can tour your home 24/7\n- Targeted Facebook and Instagram ad campaigns reaching buyers actively searching in your price range\n- Personal email campaign to my database of 1,400+ buyers, agents, and past clients\n- Featured placement on Compass.com and Zillow Premier Agent\n\nSLIDE 6: DIGITAL & SOCIAL STRATEGY\nHeadline: Your Home Reaches Buyers Before They Even Search\nContent:\n- Custom ad audiences built from ZIP-code and behavioral data\n- Instagram and Facebook campaigns launched within 48 hours of listing going live\n- Coming Soon strategy to build demand before the home officially hits the market\n- Real-time reporting on views, clicks, and engagement -- you'll see the activity\n\nSLIDE 7: PHOTOGRAPHY & PRESENTATION\nHeadline: First Impressions Are Made Online\nContent:\n- 95% of buyers start their search online -- your photos are your first showing\n- I invest in architectural-grade photography and drone footage for every listing\n- Optional staging consultation included at no additional cost\n- Your home will look its absolute best before a single buyer walks through the door\n\nSLIDE 8: PRICING STRATEGY\nHeadline: Price It Right. Sell It Strong.\nContent:\n- Pricing is a data exercise, not a guessing game\n- I'll walk you through a complete CMA -- recent sales, active competition, and market trends\n- Strategy: price to attract maximum buyer activity in the first 7-10 days\n- Overpricing costs sellers time, concessions, and negotiating leverage -- we'll price to win\n- Every pricing decision is made together, with full transparency\n\nSLIDE 9: WHAT TO EXPECT\nHeadline: A Clear Timeline from Listing Day to Closing Day\nContent:\n- Week 1: photography, staging consult, Coming Soon launch\n- Week 2: MLS live, open house (if desired), digital campaigns active\n- Ongoing: weekly update calls, showing feedback, market activity reports\n- Under contract: I manage every detail -- inspection, appraisal, financing, closing\n- You'll never wonder what's happening with your home sale\n\nSLIDE 10: NEXT STEPS\nHeadline: Let's Get Started\nContent:\n- Any questions before we move forward?\n- Review and sign the listing agreement\n- Schedule photography (typically within 3-5 days of signing)\n- Target list date: [proposed date]\n- I'm ready to go to work for you the moment you're ready"},{"id":28,"category_id":6,"idx":3,"title":"Pricing Strategy Talking Points","text":"You are an experienced real estate listing agent who specializes in the pricing conversation -- one of the most delicate and high-stakes moments in the seller relationship.\n\nYour job: write the talking points for the pricing conversation with a seller who believes their home is worth more than the CMA data supports. The tone must be diplomatic, data-driven, and confidence-building. The agent should come across as an advocate for the seller -- not an adversary.\n\nINPUTS:\n[SELLER_EXPECTED_PRICE] (what the seller says they want)\n[CMA_RANGE] (the data-supported range)\n[KEY_COMPS] (2-3 comparable sales with brief descriptions)\n[DAYS_ON_MARKET_IN_AREA] (typical DOM for similar homes)\n[AGENT_RECOMMENDATION] (the specific price the agent is recommending and why)\n\nOUTPUT FORMAT:\n5-7 numbered talking points, each with:\n- Bold header (the concept)\n- 2-4 sentences of suggested agent language (first person, conversational)\n\nAfter the talking points, include a separate section titled \"Handling: 'I Want to Try at My Price First'\" with a scripted 3-4 sentence response.\n\nCONSTRAINTS:\n- Never tell the seller they are \"wrong\" -- reframe, don't confront\n- Use the word \"buyers\" often -- remind the seller that buyers set market value, not sellers or agents\n- Avoid overly technical appraisal language\n- Do not promise a sale at any price\n- The tone should be that of a trusted advisor, not a salesperson trying to win an argument","input":"[SELLER_EXPECTED_PRICE]: $725,000\n[CMA_RANGE]: $665,000-$690,000\n[KEY_COMPS]: \n- 814 Fieldstone Rd (same street, 4bed/3bath, 2,680 sq ft, sold for $678,000 in March, 11 DOM)\n- 901 Ashgrove Court (one street over, 4bed/2.5bath, 2,590 sq ft, sold for $662,000 in February, 18 DOM)\n- 742 Fieldstone Rd (same street, 4bed/3bath, 2,750 sq ft, listed at $715,000, currently 54 days on market with no offers)\n[DAYS_ON_MARKET_IN_AREA]: 12 days average for homes priced within 3% of market value\n[AGENT_RECOMMENDATION]: $679,000 -- positions just above the two recent sales to capture their upside while staying within the range buyers are actively comparing","output":"1. BUYERS SET VALUE, NOT SELLERS OR AGENTS\n\"I want to be upfront with you about something: the market value of your home isn't determined by what you or I think it's worth -- it's determined by what buyers are willing to pay, backed by what appraisers will confirm. My job is to read the buyer pool accurately and position your home where it attracts the most serious attention.\"\n\n2. WHAT THE COMPARABLE SALES ARE TELLING US\n\"Let's look at what buyers have actually paid for homes like yours in the past 90 days. 814 Fieldstone -- same street, similar size -- sold for $678,000 in March with 11 days on market. 901 Ashgrove sold for $662,000 in February. These aren't random -- these are your neighbors, and buyers shopping for your home will pull these exact numbers before making an offer.\"\n\n3. THE CAUTIONARY TALE: 742 FIELDSTONE\n\"I also want to show you something important. 742 Fieldstone, just down the street, listed at $715,000. It's been sitting for 54 days with no offers. Buyers in this range are doing their homework. When a home is priced above what the comparables support, buyers assume something is wrong -- or they simply skip it and wait for a price reduction. That stigma is hard to recover from.\"\n\n4. THE FIRST TWO WEEKS DETERMINE EVERYTHING\n\"The most valuable time we have is the first 7 to 14 days on market. That's when buyers who've been waiting jump. Homes priced correctly in this area are going under contract in about 12 days. Once that window passes and the listing has been sitting, buyers start asking 'what's wrong with it?' -- even if the answer is nothing.\"\n\n5. WHY $679,000 IS THE STRATEGIC NUMBER\n\"My recommendation of $679,000 isn't arbitrary. It prices you above both recent sales, acknowledges your home's updates, and puts you in the sweet spot where buyers in this range are actively looking. It's also where appraisers can support the number, which matters when the buyer is financing. Above $690,000, we risk losing buyers at the appraisal.\"\n\n6. YOUR NET PROCEEDS ARE WHAT MATTER\n\"I also want you to think about net proceeds rather than list price. A home that sells quickly at $679,000 often nets you more than a home that sits for 60 days and eventually sells at $695,000 after a price reduction, an extended marketing period, and potential concessions. The longer a home sits, the more negotiating power shifts to the buyer.\"\n\n7. THIS IS A DECISION WE MAKE TOGETHER\n\"Ultimately, this is your home and your decision. I'm here to give you the most accurate picture I can -- not to tell you what to do. What I can promise is that whatever price we decide on, I'll market this home to the absolute best of my ability.\"\n\n--- HANDLING: 'I WANT TO TRY AT MY PRICE FIRST' ---\n\"I understand completely, and I respect that. Here's my honest concern: if we start at $725,000 and the market doesn't respond, a price reduction after 30+ days on market sends a signal to buyers that there's something wrong -- and that often leads to lower offers than we would have gotten if we'd priced it right on day one. I'd rather see you walk away with more money than prove a point to the market. Can we talk through what a 21-day review would look like if we don't see the activity we're hoping for?\""},{"id":29,"category_id":6,"idx":4,"title":"Seller Net Sheet Explanation Script","text":"You are a listing agent who excels at making the financial side of selling a home feel clear and manageable, not scary or confusing.\n\nYour job: write a verbal script for walking a seller through a net sheet during or after a listing presentation. The script should make the numbers feel clear, logical, and not overwhelming. Embed the actual math in plain English narrative.\n\nINPUTS:\n[ESTIMATED_LIST_PRICE]\n[ESTIMATED_SALE_PRICE] (can be same as list or slightly adjusted)\n[COMMISSION_RATE] (total %)\n[CLOSING_COSTS_PCT] (seller-side, excluding commission)\n[ESTIMATED_MORTGAGE_PAYOFF] (optional -- if provided, include in script; if not, skip)\n[AGENT_NAME]\n[STATE]\n\nOUTPUT FORMAT:\nFull verbal walkthrough script (~400 words). Structure:\n1. Opening -- frame the net sheet positively (this is the fun part)\n2. Walk through gross sale price\n3. Walk through commission (with plain explanation of what it covers)\n4. Walk through closing costs (with examples of what's included)\n5. Walk through mortgage payoff if provided\n6. Land on net proceeds with a confident, clear close\n\nCONSTRAINTS:\n- Embed actual dollar amounts calculated from the inputs\n- No jargon without immediate explanation\n- Do not make the commission feel like a loss -- frame it as an investment\n- Tone: calm, clear, confident. Like a trusted financial advisor explaining a summary, not a salesperson defending a number\n- Do not include legal advice or guarantee any specific net amount","input":"[ESTIMATED_LIST_PRICE]: $485,000\n[ESTIMATED_SALE_PRICE]: $480,000\n[COMMISSION_RATE]: 5.5%\n[CLOSING_COSTS_PCT]: 1.2% (seller-side closing costs in Georgia)\n[ESTIMATED_MORTGAGE_PAYOFF]: $198,000\n[AGENT_NAME]: James Okafor\n[STATE]: Georgia","output":"\"Alright, let's talk about the part that actually matters most -- what ends up in your pocket.\n\nI put together a net sheet for you based on a sale price of $480,000. This isn't a contract or a guarantee -- it's an estimate to help you plan. Real numbers get confirmed at closing, but these figures are very close to what you should expect.\n\nWe start with your gross sale price: $480,000. That's the full amount a buyer pays.\n\nFrom that, we subtract the real estate commission. We discussed 5.5%, which on $480,000 comes to $26,400. I want to be clear about what that number covers -- it's not just my fee. It covers everything I bring to the transaction: the professional photography, the marketing campaign, the negotiations, and the listing co-op -- meaning it compensates the buyer's agent for bringing you a qualified buyer. That 5.5% is what keeps the transaction running smoothly on both sides.\n\nAfter commission, we look at seller-side closing costs. In Georgia, these typically run about 1.2% of the sale price -- for you, that's approximately $5,760. This covers things like the attorney fee at closing (Georgia is an attorney-state), the owner's title insurance policy, any unpaid property taxes prorated to your closing date, and recording fees. Nothing in there should surprise you -- your attorney will walk through every line item on the closing disclosure before you sign.\n\nSo at this point, after commission and closing costs, we're at approximately $447,840 before your mortgage.\n\nNow, you mentioned your estimated payoff is around $198,000. That's the amount you owe your lender, and it comes off the top before you see a check. Your lender will provide an exact payoff figure, which is current through your projected closing date.\n\nWhich brings us to your estimated net proceeds: approximately $249,840.\n\nThat's roughly a quarter-million dollars in your pocket -- money you can use toward your next home, invest, or whatever makes sense for your situation.\n\nAny questions on any of those line items? I want to make sure this all feels clear before we move forward.\""},{"id":30,"category_id":6,"idx":5,"title":"Commission Objection Response Script","text":"You are a listing agent who is skilled at handling the commission conversation with confidence and without becoming defensive or apologetic.\n\nYour job: write scripted responses to the top 5 commission objections sellers raise. Each response should follow the format: Objection -> Acknowledge -> Reframe -> Close. The agent should sound confident, not defensive. The goal is to educate, not argue.\n\nINPUTS:\n[AGENT_COMMISSION_RATE] (e.g. 5.5%)\n[MARKET_AVERAGE] (e.g. typical range in the area)\n[AGENT_VALUE_DIFFERENTIATORS] (3-5 specific things that justify the agent's value)\n\nOUTPUT FORMAT:\nFor each of the 5 objections:\nOBJECTION [N]: [The objection in the seller's voice]\nACKNOWLEDGE: [1-2 sentences validating the concern]\nREFRAME: [2-3 sentences repositioning the value]\nCLOSE: [1 sentence that moves the conversation forward]\n\nThe 5 objections to address:\n1. 'Your commission is too high.'\n2. 'Another agent will do it for less.'\n3. 'I'll sell it myself and save the commission.'\n4. 'You're only going to list it online -- why should I pay so much?'\n5. 'The market is so hot right now -- it'll sell itself.'\n\nCONSTRAINTS:\n- Never disparage other agents or FSBO sellers\n- Never match or negotiate commission in the script -- the script ends with confidence, not a discount\n- Avoid sounding defensive or rehearsed\n- Each response should be concise enough to say in under 60 seconds","input":"[AGENT_COMMISSION_RATE]: 5.5%\n[MARKET_AVERAGE]: 5%-6% total commission in the Charlotte, NC metro\n[AGENT_VALUE_DIFFERENTIATORS]: professional photography and staging consult included, targeted social media ad campaigns with $500+ in paid media per listing, personal buyer database of 900+ contacts emailed on every listing, consistent track record of selling at 99.2% of list price, dedicated transaction coordinator who manages every detail under contract","output":"OBJECTION 1: 'Your commission is too high.'\nACKNOWLEDGE: \"I hear you -- it's a real number, and I respect that you're thinking about it carefully.\"\nREFRAME: \"Here's how I think about it: 5.5% on a $500,000 sale is $27,500. My job is to make sure you net more than you would have with a less experienced agent or a lower-fee approach. I bring professional photography, a paid social media campaign, a database of 900+ active buyers and agents who hear about your home before it's even live, and a transaction coordinator who manages every detail so nothing falls through the cracks. The question isn't what I cost -- it's what you net.\"\nCLOSE: \"Can I show you what that typically looks like in real numbers for a home like yours?\"\n\nOBJECTION 2: 'Another agent will do it for less.'\nACKNOWLEDGE: \"That's absolutely true, and you should feel good about shopping around -- this is a significant financial decision.\"\nREFRAME: \"What I'd encourage you to ask that agent is exactly what's included in their fee. Are they covering professional photography out of pocket? Running paid ad campaigns? Do they have a transaction coordinator? The difference between agents isn't always the rate -- it's what you actually get. I've consistently sold homes at 99.2% of list price in this market. A half-percent difference in commission that costs you 1-2% in sale price isn't actually a savings.\"\nCLOSE: \"Let me walk you through what's included in my services, and you can decide if the difference is worth it.\"\n\nOBJECTION 3: 'I'll sell it myself and save the commission.'\nACKNOWLEDGE: \"Selling yourself is a real option, and some people do it successfully -- I respect that you're thinking about it.\"\nREFRAME: \"What I've seen consistently is that FSBO homes tend to sell for significantly less than agent-represented homes, according to industry data. When you factor in that difference, plus the time, the legal complexity, the negotiations, and the challenge of attracting financed buyers, the math often doesn't work out the way people expect. You also lose access to the MLS, which is where the vast majority of buyers find their home.\"\nCLOSE: \"I'm happy to share the specific numbers for your price range if it helps you make the comparison.\"\n\nOBJECTION 4: 'You're just going to list it online -- why should I pay that much?'\nACKNOWLEDGE: \"That's a fair question, and I want to give you a straight answer.\"\nREFRAME: \"Listing it online is table stakes -- every agent can do that. What I bring is what happens before and after the listing goes live: the photography that makes buyers stop scrolling, the paid ad campaigns targeting buyers in your price range, the personal outreach to my database, the negotiating strategy when offers come in, and the management of the inspection, appraisal, financing, and closing process. The MLS is one tool. I bring about a dozen others.\"\nCLOSE: \"Let me show you exactly what that looks like -- start to finish -- for your home.\"\n\nOBJECTION 5: 'The market is so hot right now -- it'll sell itself.'\nACKNOWLEDGE: \"The market is strong, and I won't pretend that doesn't help sellers -- it absolutely does.\"\nREFRAME: \"But here's the distinction: selling quickly isn't the same as selling for top dollar. In a hot market, the difference between a well-marketed home and a casually listed home shows up in the offer price and terms, not necessarily in days on market. I had a seller last quarter who got 9 offers -- but the difference between the lowest and highest offer was $41,000. My job in a hot market isn't to get you an offer. It's to get you the best offer.\"\nCLOSE: \"That's exactly where my marketing and negotiation approach pays for itself -- want me to walk you through how?\""},{"id":31,"category_id":7,"idx":1,"title":"Open House Multi-Channel Promo Pack","text":"You are a real estate marketing specialist who creates multi-channel promotional content that drives open house traffic.\n\nYour job: write 5 ready-to-use promotional pieces for an open house. Each piece should be tailored to its channel, use the property details provided, and be copy-paste ready.\n\nINPUTS:\n[PROPERTY_ADDRESS]\n[OPEN_HOUSE_DATE_TIME] (e.g. Sunday, June 15 from 1:00-4:00 PM)\n[KEY_FEATURES] (3-5 standout features)\n[NEIGHBORHOOD]\n[LIST_PRICE]\n[AGENT_NAME]\n\nOUTPUT FORMAT:\nClearly labeled pieces:\nPIECE 1 -- MLS OPEN HOUSE REMARKS (~75 words)\nPIECE 2 -- INSTAGRAM POST (caption + 5 hashtags)\nPIECE 3 -- FACEBOOK EVENT DESCRIPTION (~120 words)\nPIECE 4 -- EMAIL BLAST TO DATABASE (subject line + ~150-word body)\nPIECE 5 -- TEXT TO HOT LEADS (under 160 characters)\n\nCONSTRAINTS:\n- MLS remarks: no fair-housing violations, no exclamation point spam, factual and benefit-focused\n- Instagram: conversational, visual language, relevant hashtags, no more than 5 hashtags listed\n- Facebook: inviting and detailed enough to compel someone to add it to their calendar\n- Email: subject line that avoids spam triggers; body is warm and informative, not pushy\n- Text: punchy, friendly, personal -- sounds like it came from a real person, not a mass blast\n- Consistent brand voice across all 5 pieces","input":"[PROPERTY_ADDRESS]: 3807 Elm Ridge Court, Charlotte, NC 28226\n[OPEN_HOUSE_DATE_TIME]: Sunday, June 15 from 1:00 PM to 4:00 PM\n[KEY_FEATURES]: renovated kitchen with quartz counters and new appliances, screened-in back porch, hardwood floors throughout, primary suite with walk-in closet, 2-car garage\n[NEIGHBORHOOD]: SouthPark area of Charlotte\n[LIST_PRICE]: $539,000\n[AGENT_NAME]: Dana Whitfield","output":"PIECE 1 -- MLS OPEN HOUSE REMARKS\nOpen Sunday, June 15 from 1:00-4:00 PM. Come see this beautifully updated SouthPark home featuring a fully renovated kitchen with quartz countertops and new appliances, hardwood floors throughout, and a screened-in back porch perfect for year-round living. Primary suite with walk-in closet, 2-car garage, and a layout that works for everyday living and entertaining alike. Priced at $539,000. Dana Whitfield hosting -- all questions welcome.\n\nPIECE 2 -- INSTAGRAM POST\nSunday afternoons just got a reason to get off the couch. Open house this Sunday, June 15 from 1-4 PM at 3807 Elm Ridge Court in SouthPark -- and this one is worth the drive. Renovated kitchen, screened porch, hardwood floors, and a primary suite that actually feels like a retreat. $539,000. Come walk through and say hi -- no appointment needed. Link in bio for full details.\n#CharlotteRealEstate #SouthParkCharlotte #OpenHouseSunday #CharlotteHomes #JustListed\n\nPIECE 3 -- FACEBOOK EVENT DESCRIPTION\nYou're invited to tour 3807 Elm Ridge Court, Charlotte -- a beautifully updated home in the heart of SouthPark, open this Sunday, June 15 from 1:00 to 4:00 PM.\n\nThis 4-bedroom home has been thoughtfully updated: the kitchen features brand-new appliances and quartz countertops, hardwood floors run throughout the main level, and the screened-in back porch is the kind of space you'll want to spend every weekend on. The primary suite includes a generous walk-in closet, and the 2-car garage keeps things practical.\n\nListed at $539,000. No appointment needed -- just come by anytime between 1 and 4. Dana Whitfield will be there to answer any questions and walk you through the home. Hope to see you Sunday.\n\nPIECE 4 -- EMAIL BLAST TO DATABASE\nSubject: Open house this Sunday in SouthPark -- come see this one in person\n\nHi [First Name],\n\nI wanted to give you a personal heads-up: I'm hosting an open house this Sunday, June 15 from 1:00-4:00 PM at 3807 Elm Ridge Court in Charlotte's SouthPark neighborhood.\n\nThe home is listed at $539,000 and it shows extremely well in person -- renovated kitchen with quartz counters and new appliances, hardwood floors throughout, a screened-in porch that's honestly the best feature, and a spacious primary suite. Whether you're actively looking or just curious about what's happening in the SouthPark market, come by and walk through.\n\nNo appointment needed. I'll be there the whole time.\n\nSee you Sunday,\nDana Whitfield\n\nPIECE 5 -- TEXT TO HOT LEADS\nHey [Name]! Open house Sunday 1-4 at 3807 Elm Ridge Ct, SouthPark -- renovated kitchen, screened porch, $539K. Worth a look! -Dana"},{"id":32,"category_id":7,"idx":2,"title":"Open House Visitor Sign-In Script","text":"You are a real estate open house specialist who knows how to greet visitors warmly, get them signed in without making it feel invasive, and qualify their interest during the natural flow of a home tour.\n\nYour job: write a script for greeting open house visitors, collecting sign-in information, and asking qualifying questions during the tour. The tone should be welcoming and consultative -- not a sales pitch.\n\nINPUTS:\n[PROPERTY_ADDRESS]\n[LIST_PRICE]\n[AGENT_NAME]\n[THREE_STRONGEST_SELLING_POINTS] (what to highlight in the first 60 seconds)\n\nOUTPUT FORMAT:\nThree clearly labeled sections:\nSECTION 1 -- GREETING SCRIPT (what to say in the first 60 seconds when someone walks in the door)\nSECTION 2 -- SIGN-IN CARD TEXT (the exact fields and copy for the sign-in card or tablet)\nSECTION 3 -- 5 QUALIFYING QUESTIONS (open-ended questions to ask naturally during the tour, with brief agent guidance on each)\n\nCONSTRAINTS:\n- The greeting should feel like a welcome from a host, not a sales pitch\n- Sign-in should feel optional but natural -- frame it as a service, not a requirement\n- Qualifying questions should not feel like an interrogation -- they should emerge from conversation\n- No fair-housing violations\n- Avoid asking directly \"are you working with an agent\" as the very first question -- earn that conversation first","input":"[PROPERTY_ADDRESS]: 1122 Brookshire Lane, Alpharetta, GA 30022\n[LIST_PRICE]: $619,000\n[AGENT_NAME]: Kevin Park\n[THREE_STRONGEST_SELLING_POINTS]: newly renovated primary bath with freestanding tub, chef's kitchen open to a two-story great room, and a private backyard backing to greenspace with no rear neighbors","output":"SECTION 1 -- GREETING SCRIPT\n\"Hi, welcome! Come on in. I'm Kevin Park -- I'm the listing agent for 1122 Brookshire Lane. Make yourself completely at home and feel free to explore at your own pace.\n\nBefore you head upstairs, I want to flag a few things that I think make this one stand out: the primary bath was just fully renovated -- we're talking a freestanding soaking tub, heated floors, the works -- and the kitchen opens directly into a two-story great room, so the whole back of the house feels really open and connected. But probably my favorite thing? Step into the backyard when you get a chance -- it backs to protected greenspace, so you'll never have rear neighbors. It's pretty rare for this area.\n\nTake your time, and find me whenever you have questions -- I'll be right here.\"\n\nSECTION 2 -- SIGN-IN CARD TEXT\nHeader: Welcome to 1122 Brookshire Lane | $619,000\n\n\"We'd love to stay in touch and share any updates on this home, including price changes or upcoming open houses. Your info stays private and is never sold.\"\n\nFields:\nName: _______________________________\nEmail: _______________________________\nPhone (optional): ____________________\nCurrently working with an agent? [ ] Yes  [ ] No  [ ] Just browsing\nHow soon are you hoping to buy? [ ] 0-3 months  [ ] 3-6 months  [ ] Just exploring\n\n\"Thank you for stopping by.\"\n\nSECTION 3 -- 5 QUALIFYING QUESTIONS\n1. \"What brought you out to look at homes today -- are you just getting started, or are you further along in your search?\"\n(Agent guidance: This opens the conversation without pressure. Listen for their timeline and emotional readiness.)\n\n2. \"Have you seen much in this price range in Alpharetta? How does this one compare to what you've been seeing?\"\n(Agent guidance: This reveals how actively they've been searching and gives you insight into their familiarity with comparable inventory.)\n\n3. \"Is the greenspace backing the yard something that matters to you, or are you more focused on the interior?\"\n(Agent guidance: This surfaces priorities. Their answer tells you what features to emphasize in follow-up.)\n\n4. \"Are you planning to stay in Alpharetta specifically, or are you open to a few different neighborhoods?\"\n(Agent guidance: Helps you understand how flexible they are -- and opens the door to a buyer consultation if they're still deciding.)\n\n5. \"Do you have flexibility on timing, or is there a date you're working toward for a move?\"\n(Agent guidance: Reveals urgency and whether they're pre-approved or still in early stages. If they have a deadline, that's a motivated buyer.)"},{"id":33,"category_id":7,"idx":3,"title":"Door-Knocking Script for Open House Promotion","text":"You are a real estate agent who uses neighborhood door-knocking before open houses to drive foot traffic and build local relationships.\n\nYour job: write a door-knocking script for personally inviting neighbors to an open house. The pitch should be about 30 seconds when delivered at the door, feel neighborly rather than salesy, and position the open house as something relevant to the neighbor -- not just a transaction.\n\nINPUTS:\n[PROPERTY_ADDRESS]\n[OPEN_HOUSE_DATE_TIME]\n[AGENT_NAME]\n[NEIGHBORHOOD_HOOK] (one local data point or story that makes this listing relevant to neighbors -- e.g. a recent strong sale nearby, why this listing affects home values)\n\nOUTPUT FORMAT:\nThree clearly labeled sections:\nSECTION 1 -- MAIN DOOR-KNOCKING SCRIPT (30-40 second pitch when the door opens, written as if spoken)\nSECTION 2 -- HANDLING 'I'M NOT INTERESTED' (a 2-3 sentence graceful exit that still leaves a positive impression)\nSECTION 3 -- NEIGHBOR REFERRAL ASK (after the open house invite is accepted or the conversation goes well, a natural ask for neighbor referrals)\n\nCONSTRAINTS:\n- Tone should be warm, genuine, and neighbor-to-neighbor -- not a sales call at the door\n- No pressure tactics\n- The neighborhood hook must be incorporated naturally\n- Assume the neighbor may have zero interest in moving -- the goal is still to make a positive impression\n- Script should be deliverable without notes in hand","input":"[PROPERTY_ADDRESS]: 5512 Oakmont Drive, Plano, TX 75093\n[OPEN_HOUSE_DATE_TIME]: Saturday, June 14 from 11:00 AM to 2:00 PM\n[AGENT_NAME]: Lisa Trevino\n[NEIGHBORHOOD_HOOK]: A home two streets over on Ridgemont Way just sold for $587,000 last week -- the highest price-per-square-foot this zip code has seen in 14 months. This listing at 5512 Oakmont is priced at $574,000 and could set a new benchmark for the street.","output":"SECTION 1 -- MAIN DOOR-KNOCKING SCRIPT\n\"Hi there -- I'm Lisa Trevino, and I'm the real estate agent for 5512 Oakmont Drive, just down the street. I wanted to personally stop by and invite you to the open house this Saturday from 11 to 2.\n\nI don't know if you keep an eye on what's happening with values in the neighborhood, but I thought you might want to know: a home on Ridgemont Way sold last week for $587,000 -- the highest price-per-square-foot this ZIP code has seen in over a year. The home I'm representing at 5512 Oakmont is priced at $574,000, and it could set a new benchmark for this street.\n\nI always think it's worth neighbors knowing when something like that is happening nearby -- it affects everyone's home value. You're more than welcome to come take a look Saturday, even just out of curiosity. And honestly, you might know someone who's been looking in this neighborhood.\"\n\nSECTION 2 -- HANDLING 'I'M NOT INTERESTED'\n\"Totally understand -- I appreciate you taking a moment to chat. I'll leave a flyer with the details in case anyone you know is looking in the area. And if you ever have questions about what homes are selling for around here, I'm happy to help anytime -- no pressure at all. Have a great day.\"\n\nSECTION 3 -- NEIGHBOR REFERRAL ASK\n\"By the way -- do you happen to know anyone in the neighborhood who's been thinking about making a move? Sometimes neighbors hear things before anyone else does. I'm always happy to have a conversation with them and share what the market looks like right now -- no obligation. If anyone comes to mind, I'll leave my card right here.\""},{"id":34,"category_id":7,"idx":4,"title":"Open House Follow-Up Email (24-Hour)","text":"You are a real estate agent who knows that the 24-hour follow-up after an open house is one of the highest-leverage communication moments in the business.\n\nYour job: write three segmented follow-up email versions sent within 24 hours to different open house attendee types. Each version should feel personal and appropriate to that audience -- not a mass email blast.\n\nINPUTS:\n[PROPERTY_ADDRESS]\n[AGENT_NAME]\n[POPULAR_FEATURE] (one thing that got a lot of attention or comments at the open house)\n\nOUTPUT FORMAT:\nThree clearly labeled email versions:\nVERSION A -- INTERESTED BUYER (someone who lingered, asked specific questions, or seemed genuinely interested)\nVERSION B -- NEIGHBOR / CURIOUS ATTENDEE (someone who came to see the home but is not actively looking to buy)\nVERSION C -- OTHER AGENT (a buyer's agent who brought a client or came to preview)\n\nEach version: subject line + email body (120-150 words). All three should reference the popular feature naturally.\n\nCONSTRAINTS:\n- Each version must feel distinctly tailored to that audience -- not the same email with a name swap\n- Version A: warm urgency without pressure; create a path to the next step\n- Version B: neighborly and informative; no sales pressure; offer value (market info)\n- Version C: professional peer tone; efficient; include showing instructions or offer guidance if appropriate\n- No hollow openers like \"It was so wonderful to meet you\"","input":"[PROPERTY_ADDRESS]: 208 Whispering Pines Road, Asheville, NC 28803\n[AGENT_NAME]: Rachel Odom\n[POPULAR_FEATURE]: the original wood-burning fireplace in the living room -- multiple visitors said it was the first thing they noticed and it was a major draw","output":"VERSION A -- INTERESTED BUYER\nSubject: Following up on 208 Whispering Pines -- a few things worth knowing\n\nHi [Name],\n\nThank you for coming by 208 Whispering Pines yesterday. I noticed you spent some time in the living room -- you're not alone, that fireplace got more comments than anything else in the house.\n\nI wanted to follow up personally because I could tell you were genuinely interested, and I'd hate for you to lose this one to a faster decision. The sellers are reviewing the activity from the weekend and I expect conversations to move quickly this week.\n\nIf you'd like to do a private showing, ask questions, or talk through the numbers, I'm available as early as tomorrow. Just reply here or give me a call -- I'm happy to make time.\n\nRachel Odom | [phone]\n\n---\n\nVERSION B -- NEIGHBOR / CURIOUS ATTENDEE\nSubject: Thanks for stopping by -- a few things about your neighborhood\n\nHi [Name],\n\nIt was great to see you at the open house at 208 Whispering Pines yesterday. I always love when neighbors come by -- you're often the most knowledgeable people in the room about what makes a street special.\n\nThat fireplace in the living room generated a lot of buzz, as I'm sure you can understand if you've spent any winter evenings near it.\n\nIf you're ever curious about what your own home might be worth in today's market -- no pressure, just good information to have -- I'd be happy to pull together a quick analysis for you. No strings attached.\n\nThanks again for coming out.\nRachel Odom | [phone]\n\n---\n\nVERSION C -- OTHER AGENT\nSubject: 208 Whispering Pines -- follow-up for your clients\n\nHi [Agent Name],\n\nThanks for previewing 208 Whispering Pines Road yesterday. I hope it was useful for your clients.\n\nAs you probably noticed, the wood-burning fireplace was the standout for a lot of people -- it's original to the home and the sellers have maintained it meticulously.\n\nSellers are motivated and the home is priced to move. If your clients have interest, I'd recommend moving sooner rather than later -- there was solid traffic over the weekend and I'm expecting offers this week.\n\nPrivate showings available on short notice. Offers reviewed as received. Happy to answer any questions or discuss terms.\n\nRachel Odom\nListing Agent | [brokerage] | [phone]"},{"id":35,"category_id":7,"idx":5,"title":"Open House Neighbor Invitation Letter","text":"You are a real estate direct-mail copywriter who specializes in neighbor-to-neighbor communication that builds trust and drives open house attendance.\n\nYour job: write a printed invitation letter to be mailed or hand-delivered to 25-50 surrounding neighbors before an open house. The framing should be neighbor-centric: you get first access, you can influence who moves in next door, and this sale affects your home's value. The tone should feel personal and community-minded, not promotional.\n\nINPUTS:\n[PROPERTY_ADDRESS]\n[SELLER_FIRST_NAME] (optional -- use if provided for warmth; skip if not)\n[OPEN_HOUSE_DATE_TIME]\n[AGENT_NAME] and [AGENT_CONTACT]\n[APPRECIATION_STAT] (one compelling local data point about neighborhood appreciation or recent strong sale)\n\nOUTPUT FORMAT:\nFormatted letter with:\n- Headline (not a generic headline -- tied to neighborhood pride or value)\n- Paragraph 1: personal invitation framed around the neighbor's interest, not the sale\n- Paragraph 2: the value angle -- how this sale affects their home and why they should care\n- Paragraph 3: the open house details and a light call to action\n- RSVP/info line at the bottom\n\nCONSTRAINTS:\n- Do not sound like a flyer -- write in a personal letter voice\n- No fair-housing violations\n- Do not list price prominently -- this letter is about the neighborhood, not the transaction\n- Headline must not be \"You're Invited\" or similar generic phrasing\n- Letter length: 200-250 words\n- Avoid exclamation points -- calm confidence, not hype","input":"[PROPERTY_ADDRESS]: 417 Maple Glen Boulevard, Franklin, TN 37064\n[SELLER_FIRST_NAME]: Patricia\n[OPEN_HOUSE_DATE_TIME]: Sunday, June 22 from 1:00 PM to 4:00 PM\n[AGENT_NAME]: Ben Calloway\n[AGENT_CONTACT]: 615-882-4401 | ben@callowayhomes.com\n[APPRECIATION_STAT]: Homes in the Maple Glen area have appreciated an average of 11.4% over the past 24 months -- one of the strongest appreciation rates in Williamson County","output":"YOUR NEIGHBORHOOD IS MOVING -- HERE'S WHAT IT MEANS FOR YOUR HOME\n\nDear Neighbor,\n\nI'm writing to let you know that 417 Maple Glen Boulevard -- just steps from your home -- will be holding an open house on Sunday, June 22 from 1:00 to 4:00 PM. Patricia has asked me to personally invite the neighbors before the general public, because she cares about who moves into this community.\n\nThat's not just a courtesy -- it's an opportunity. You know this neighborhood better than any buyer who finds this home online. You know the neighbors, the street, the rhythm of the block. And if you've been keeping an eye on the market, you may already know that homes in Maple Glen have appreciated an average of 11.4% over the past 24 months -- one of the strongest appreciation rates in Williamson County. A well-priced, well-presented sale at 417 Maple Glen continues that momentum and strengthens the value of every home on this street, including yours.\n\nYou're welcome to stop by anytime between 1:00 and 4:00 PM on Sunday. No appointment needed. I'll be there to walk you through the home, answer questions about the market, or simply chat about what's happening in the area.\n\nI hope to see you Sunday.\n\nBen Calloway\n615-882-4401 | ben@callowayhomes.com\n\nQuestions before Sunday? Call or text anytime."},{"id":36,"category_id":8,"idx":1,"title":"Monthly Market Update Email","text":"You are a real estate market analyst and email copywriter working for a residential agent. Your job is to write a monthly market update email that translates raw MLS statistics into a plain-English story a homeowner or buyer can actually understand and act on.\n\nROLE: Trusted local expert who makes data accessible without dumbing it down.\n\nINPUTS:\n[MONTH/YEAR]: The month and year this report covers.\n[MEDIAN SALE PRICE]: The median sale price for the month.\n[MEDIAN DOM]: Median days on market.\n[MONTHS OF INVENTORY]: Current months of supply.\n[LIST-TO-SALE RATIO]: Average ratio of sale price to list price.\n[NOTABLE TREND]: One key trend or shift worth highlighting.\n[AGENT NAME]: The sending agent's full name.\n[MARKET NAME]: City or neighborhood the report covers.\n\nOUTPUT FORMAT:\n- Subject line (under 55 characters, curiosity-driven)\n- Email body: 200-250 words\n- Opening hook: plain-English headline on what the data means\n- 2-3 short paragraphs weaving the stats into a narrative\n- One clear takeaway for buyers and one for sellers\n- Soft CTA at the end (invite reply, not a hard sell)\n- Sign-off with agent name\n\nCONSTRAINTS:\n- No jargon without a brief plain-English explanation\n- Do not cherry-pick data to favor one party; be balanced\n- Avoid making specific predictions; use hedging language (\"suggests,\" \"points to\")\n- No fair-housing violations\n- Tone: conversational, knowledgeable, neighborly -- not salesy","input":"[MONTH/YEAR]: April 2025\n[MEDIAN SALE PRICE]: $584,000\n[MEDIAN DOM]: 11 days\n[MONTHS OF INVENTORY]: 1.4 months\n[LIST-TO-SALE RATIO]: 102.3%\n[NOTABLE TREND]: Townhome and condo segment softening slightly -- inventory up 18% year-over-year in that sub-segment while single-family homes remain in a bidding-war environment.\n[AGENT NAME]: Sarah Whitfield\n[MARKET NAME]: South Denver metro (Englewood, Littleton, Centennial)","output":"Subject: South Denver April Numbers (One Surprise Inside)\n\nHi [First Name],\n\nApril in South Denver played out exactly like the spring market promised -- fast, competitive, and more expensive than a year ago. But there is one quiet shift worth knowing about.\n\nThe headline numbers: the median sale price hit $584,000 last month, homes averaged just 11 days on market, and the typical buyer paid 102.3% of list price. With only 1.4 months of supply available, single-family homes are still firmly in seller territory. If you priced well and showed well, you very likely had multiple offers.\n\nHere is the nuance: townhomes and condos are telling a slightly different story. Inventory in that segment is up 18% compared to April 2024. That is not a crash -- it is a breath of air for buyers who have been priced out of detached homes. Sellers in this category may need to price a bit more carefully and invest in presentation.\n\nFor buyers: the detached market remains unforgiving on speed, but the attached-home window may be worth a second look. For sellers of single-family homes: your pricing power is real -- use it strategically, not recklessly.\n\nIf you want a personalized read on what these numbers mean for your specific address or search criteria, just hit reply. I am happy to dig in.\n\nTalk soon,\nSarah Whitfield\nSouth Denver Residential Specialist"},{"id":37,"category_id":8,"idx":2,"title":"Neighborhood Guide (1,000-Word Blog Post)","text":"You are an SEO-savvy real estate content writer. Your job is to write a complete, publication-ready 1,000-word neighborhood guide as a blog post or website page. The guide must be genuinely useful to someone researching whether to move to this neighborhood -- not a promotional puff piece.\n\nROLE: Local expert and helpful guide, not a salesperson.\n\nINPUTS:\n[NEIGHBORHOOD NAME]: Name of the neighborhood or district.\n[CITY]: City and state.\n[DATA POINTS AND LOCAL HIGHLIGHTS]: 5-7 specific facts, amenities, landmarks, stats, or community notes.\n[AGENT NAME]: Authoring agent's full name.\n[TARGET AUDIENCE]: Primary reader (e.g., young families, first-time buyers, downsizers, relocating professionals).\n\nOUTPUT FORMAT:\nFull blog post, approximately 1,000 words, with the following H2-headed sections:\n- Overview (2-3 short paragraphs, sets the scene)\n- Housing Stock (types of homes, price ranges, era built)\n- Schools (nearest public schools, note to verify enrollment areas)\n- Dining and Nightlife (3-5 specific spots or type descriptions)\n- Parks and Outdoors (green spaces, trails, recreational options)\n- Commute and Transportation (drive tim
