00 in earnest money — demonstrating strong commitment. The buyers are pre-approved at $700,000 through First Horizon (letter attached), a local lender with an excellent track record of on-time closings. There is no home sale contingency — the buyers are ready to close on your sellers' preferred timeline, whether that's 30 days or 60.\n\nAdditionally, the buyers are prepared to accept the home as-is for cosmetic items, limiting any inspection negotiation to safety and structural concerns only. This keeps the transaction clean and predictable.\n\nThis is a straightforward offer from qualified buyers with strong financing, maximum flexibility, and minimal risk of delays or fallthrough. I'm confident we can get to closing smoothly.\n\nI'm available anytime to discuss terms. Please don't hesitate to call me directly at (615) 555-0198.\n\nBest regards,\nJames Rivera"},{"id":42,"category_id":9,"idx":2,"title":"Multiple-Offer Strategy Email to Buyer","text":"You are a real estate communication strategist.\n\nYour job: write an email from a buyer's agent to their buyer client explaining a multiple-offer situation and outlining strategy options. The email should be calm, informative, and help the buyer make a confident decision — not panic them into overbidding.\n\nINPUTS:\n[BUYER FIRST NAME]\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[NUMBER OF COMPETING OFFERS] (or \"multiple — exact count unknown\")\n[OFFER DEADLINE] (if any)\n[BUYER'S CURRENT OFFER STATUS] (not yet submitted, or already submitted)\n[STRATEGY OPTIONS] (3–4 options with tradeoffs)\n[AGENT NAME]\n[AGENT PHONE]\n[TONE] (e.g. calm, strategic, direct)\n\nOUTPUT FORMAT:\n- SUBJECT LINE\n- EMAIL BODY (200–250 words)\n  - Explain the situation clearly\n  - Present strategy options with brief pros/cons\n  - Recommend one approach (with reasoning)\n  - Close with a clear call to action and timeline","input":"[BUYER FIRST NAME]: Jordan\n[PROPERTY ADDRESS]: 814 Sycamore Bend, Franklin\n[LIST PRICE]: $649,000\n[NUMBER OF COMPETING OFFERS]: listing agent confirmed 3 other offers, deadline is tomorrow at 5 PM\n[OFFER DEADLINE]: tomorrow (Thursday) at 5 PM\n[BUYER'S CURRENT OFFER STATUS]: not yet submitted\n[STRATEGY OPTIONS]: 1) offer at list price with strong terms, 2) offer $5K–$10K above list with as-is clause, 3) escalation clause up to a cap, 4) significantly above list to eliminate competition\n[AGENT NAME]: James Rivera\n[AGENT PHONE]: (615) 555-0198\n[TONE]: calm, strategic","output":"Subject: Sycamore Bend — multiple offers, here's the plan\n\nHi Jordan,\n\nI just got off the phone with the listing agent on 814 Sycamore Bend. She confirmed there are three other offers on the table, and the deadline for all offers is tomorrow (Thursday) at 5 PM.\n\nThis is competitive, but it's manageable. Here are your options and my honest take on each:\n\nOPTION 1: Offer at list ($649K) with strong terms\nPro: Keeps you at budget. Con: Unlikely to win against three other offers in this price range.\n\nOPTION 2: Offer $655K–$659K with as-is clause for cosmetics\nPro: Shows seriousness, reduces seller risk. Con: May still be outbid if another buyer goes significantly higher.\n\nOPTION 3: Escalation clause — start at $655K, escalate in $3K increments up to $670K\nPro: You only pay what's needed to beat the next highest offer. Con: Some sellers and listing agents dislike escalation clauses — they can feel impersonal.\n\nOPTION 4: Offer $670K+ to eliminate competition\nPro: Strong chance of winning. Con: You may overpay relative to market value, and the appraisal becomes a risk.\n\nMY RECOMMENDATION: Option 2 — $655K with the as-is clause, $15K earnest money, and no home sale contingency. It's a strong, clean offer that signals you're serious without overextending. Your pre-approval at $700K gives the seller confidence. If they counter, we negotiate from a solid position.\n\nI need your decision by noon tomorrow so we can submit well before the deadline. Call or text me anytime tonight — (615) 555-0198.\n\nJames"},{"id":43,"category_id":9,"idx":3,"title":"Counter-Offer Communication Script","text":"You are a real estate negotiation coach.\n\nYour job: write a counter-offer communication script — what an agent says to their client (buyer or seller) when presenting a counter-offer. The script should explain the counter clearly, frame it strategically, and guide the client toward a decision.\n\nINPUTS:\n[CLIENT TYPE] (buyer or seller)\n[CLIENT FIRST NAME]\n[ORIGINAL OFFER]\n[COUNTER-OFFER TERMS] (price, contingencies, timeline changes, credits, etc.)\n[WHAT THE COUNTER SIGNALS] (agent's interpretation of what the other side is communicating)\n[RECOMMENDED RESPONSE] (accept, counter back, walk away — with reasoning)\n[AGENT NAME]\n[TONE] (e.g. strategic, calm, encouraging)\n\nOUTPUT FORMAT:\n- THE SETUP (1–2 sentences — \"here's what came back\")\n- THE BREAKDOWN (walk through each counter term clearly)\n- THE INTERPRETATION (what this tells us about the other side)\n- THE RECOMMENDATION (what the agent suggests and why)\n- THE QUESTION (ask the client what they want to do)\n- Total: speakable in 2–3 minutes.","input":"[CLIENT TYPE]: buyer\n[CLIENT FIRST NAME]: Jordan\n[ORIGINAL OFFER]: $655,000, as-is for cosmetic items, 45-day close, $15K earnest money\n[COUNTER-OFFER TERMS]: seller countered at $659,000, accepted as-is clause, requested 30-day close instead of 45, asked buyer to cover $2,000 home warranty\n[WHAT THE COUNTER SIGNALS]: seller is engaged and close — the $4K gap is small, the 30-day close suggests they want to move quickly (possibly already have a home under contract), the warranty ask is a minor concession test\n[RECOMMENDED RESPONSE]: accept the $659K and the 30-day close, push back on the warranty (or split it) — we're close enough that countering aggressively risks losing momentum\n[AGENT NAME]: James Rivera\n[TONE]: strategic, encouraging","output":"THE SETUP:\n\"Good news, Jordan — we got a counter back on Sycamore Bend, and it's close. Let me walk you through it.\"\n\nTHE BREAKDOWN:\n\"They came back at $659,000 — that's $4,000 above our offer. They accepted our as-is clause for cosmetic items, which is a win. They want to close in 30 days instead of 45 — so they're looking to move quickly. And they asked us to cover a $2,000 home warranty.\"\n\nTHE INTERPRETATION:\n\"Here's what this tells me: they're engaged and they want this deal done. The $4K bump is a negotiation move, not a rejection. The 30-day close request tells me they may already have another home under contract and need to move on a timeline. That's actually good for us — it means they're motivated to get to closing, not to squeeze us for every dollar. The warranty ask is small — it's a standard concession test.\"\n\nTHE RECOMMENDATION:\n\"My recommendation: accept the $659,000 and the 30-day close. The $4K is well within your budget, and the faster timeline shouldn't be an issue since your lender has already confirmed they can close in 25 days. On the warranty, I'd counter back and offer to split it — you cover $1,000, they cover $1,000. It's a small enough number that it shouldn't be a sticking point, but it shows we're not just rolling over on every term.\"\n\n\"Net-net: you'd be at $660,000 all-in — $11,000 above list for a home you love in a multiple-offer situation. I think that's a strong outcome.\"\n\nTHE QUESTION:\n\"What are you thinking — does this feel right, or is there something you want to push back on?\""},{"id":44,"category_id":9,"idx":4,"title":"Inspection Negotiation Talking Points","text":"You are a real estate negotiation strategist.\n\nYour job: write inspection negotiation talking points — what an agent says to their client when the home inspection reveals issues and they need to decide what to ask for. The talking points should help the client separate emotional reactions from strategic decisions.\n\nINPUTS:\n[CLIENT TYPE] (buyer or seller)\n[CLIENT FIRST NAME]\n[INSPECTION FINDINGS] (list of issues found)\n[WHICH ARE SAFETY/STRUCTURAL vs. COSMETIC]\n[ESTIMATED REPAIR COSTS]\n[MARKET CONTEXT] (competitive market? balanced? buyer has leverage?)\n[RECOMMENDED ASK] (what to request — repairs, credits, price reduction, or combination)\n[AGENT NAME]\n[TONE] (e.g. calm, strategic, reassuring)\n\nOUTPUT FORMAT:\n- OPENING (set the right frame — inspections almost always find something)\n- FINDINGS SUMMARY (categorize the issues clearly)\n- STRATEGY (what to ask for and why)\n- WHAT NOT TO DO (common mistakes at this stage)\n- THE ASK (specific language for the repair request)\n- Total: speakable in 3–4 minutes.","input":"[CLIENT TYPE]: buyer\n[CLIENT FIRST NAME]: Jordan\n[INSPECTION FINDINGS]: HVAC unit is 18 years old (functional but near end of life, estimated replacement $6,500), minor roof flashing separation at chimney ($800 repair), two electrical outlets in garage have reversed polarity ($200 fix), water staining in attic suggesting past roof leak (no active moisture detected), cosmetic cracks in drywall (normal settling)\n[WHICH ARE SAFETY/STRUCTURAL vs. COSMETIC]: HVAC (functional but aging — structural concern), roof flashing (structural), reversed outlets (safety), water staining (past issue, not active), drywall cracks (cosmetic)\n[ESTIMATED REPAIR COSTS]: approximately $7,500 for HVAC + flashing + outlets\n[MARKET CONTEXT]: balanced market, buyer has moderate leverage — seller received only 2 offers\n[RECOMMENDED ASK]: request a $5,000 credit at closing — covers the safety/structural items without asking for full HVAC replacement, which the seller will likely reject\n[AGENT NAME]: James Rivera\n[TONE]: calm, strategic","output":"OPENING:\n\"Jordan, the inspection report is in, and I want to walk you through it. First: almost every inspection finds something. This is not a red flag — this is the process working exactly as it should. Let's look at what matters and what doesn't.\"\n\nFINDINGS SUMMARY:\n\"I'd break the findings into three categories:\"\n\n\"Safety and structural — these are the ones we negotiate on: the roof flashing at the chimney has a small separation that needs repair, about $800. Two electrical outlets in the garage have reversed polarity — that's a $200 fix but it's a legitimate safety issue. And the HVAC is 18 years old. It's running fine today, but it's near the end of its expected life. Replacement runs about $6,500.\"\n\n\"Past issue, no current problem — there's water staining in the attic that suggests a roof leak at some point, but the inspector found no active moisture. This is something to note, not something to panic about.\"\n\n\"Cosmetic — drywall cracks from normal settling. Completely expected in a home of this age. We're ignoring these.\"\n\nSTRATEGY:\n\"Here's what I recommend: we ask for a $5,000 credit at closing. That covers the flashing repair, the outlet fix, and gives you a meaningful credit toward the HVAC when you're ready to replace it. We're not asking the seller to install a brand-new HVAC system — that's a $6,500 ask that will feel too aggressive and could put the deal at risk. A $5,000 credit is defensible, reasonable, and gives you flexibility to handle the HVAC on your timeline with the contractor of your choice.\"\n\nWHAT NOT TO DO:\n\"Two things I see buyers do at this stage that I want to steer you away from. One: don't ask for every little thing. Nickel-and-diming a seller with a 15-item repair list kills deals. We focus on safety and structural — that's it. Two: don't let the inspection scare you out of a home you love. Every home has issues. The question is whether they're manageable — and these are.\"\n\nTHE ASK:\n\"Here's how I'll frame it to the listing agent: 'Based on the inspection findings, we're requesting a $5,000 credit at closing to address the roof flashing separation, the reversed-polarity outlets, and to offset the age of the HVAC system. We're not requesting any cosmetic repairs. We believe this is a fair and focused ask that keeps the deal moving forward.'\n\nSound good?\""},{"id":45,"category_id":9,"idx":5,"title":"Closing Day Communication Email","text":"You are a real estate communication specialist.\n\nYour job: write a closing day communication email — sent by the agent to the buyer (or seller) the day before or morning of closing. It should confirm logistics, set expectations, and make the moment feel exciting and well-organized.\n\nINPUTS:\n[CLIENT NAME(S)]\n[CLIENT TYPE] (buyer or seller)\n[CLOSING DATE / TIME / LOCATION]\n[WHAT TO BRING] (ID, cashier's check amount, etc.)\n[ANY SPECIAL NOTES] (e.g. final walk-through time, wire instructions, keys, parking)\n[AGENT NAME]\n[AGENT PHONE]\n[TONE] (e.g. celebratory, organized, warm)\n\nOUTPUT FORMAT:\n- SUBJECT LINE\n- EMAIL BODY (120–160 words)\n  - Celebrate the moment (briefly)\n  - Confirm logistics clearly\n  - List what to bring\n  - Mention any final steps\n  - Close with warmth","input":"[CLIENT NAME(S)]: Jordan and Priya\n[CLIENT TYPE]: buyer\n[CLOSING DATE / TIME / LOCATION]: Friday, July 11 at 10:00 AM, Heritage Title Company, 204 Main Street Suite 300, Franklin, TN\n[WHAT TO BRING]: two forms of government-issued photo ID each, cashier's check for $47,850 (or wire confirmation — wire instructions were sent separately)\n[ANY SPECIAL NOTES]: final walk-through scheduled for Thursday at 5 PM, parking is available in the lot behind the building, signing takes about 45–60 minutes\n[AGENT NAME]: James Rivera\n[AGENT PHONE]: (615) 555-0198\n[TONE]: celebratory, organized, warm","output":"Subject: Tomorrow's the day — closing details inside\n\nJordan and Priya,\n\nWe made it. Tomorrow you pick up the keys to 814 Sycamore Bend, and I couldn't be more excited for you both.\n\nHere are your logistics for closing:\n\nWHEN: Friday, July 11 at 10:00 AM\nWHERE: Heritage Title Company, 204 Main Street, Suite 300, Franklin, TN\nPARKING: Lot behind the building — enter from the alley on 2nd Ave.\n\nWHAT TO BRING:\n- Two forms of government-issued photo ID (each of you)\n- Cashier's check for $47,850 — made payable to \"Heritage Title Company\" — OR your wire confirmation if you've already wired funds (wire instructions were sent separately on Tuesday)\n\nBEFORE CLOSING:\nYour final walk-through is tomorrow (Thursday) at 5:00 PM. I'll meet you at the house. We'll confirm everything is in order and make sure the home is exactly as expected.\n\nClosing itself takes about 45–60 minutes — mostly signing. I'll be right there with you.\n\nCongratulations in advance. You've earned this.\n\nJames Rivera\n(615) 555-0198"},{"id":46,"category_id":10,"idx":1,"title":"Agent Bio (Long-Form Website Version)","text":"You are a personal branding copywriter for real estate professionals.\n\nYour job: write a long-form agent bio for a website \"About\" page. The bio should be professional, personable, and structured to build trust — leading with the agent's value to clients, not their resume.\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA]\n[YEARS IN REAL ESTATE]\n[SPECIALTIES] (e.g. first-time buyers, luxury, investment, relocation)\n[KEY STATS] (2–3 — e.g. homes sold, volume, awards)\n[PERSONAL BACKGROUND] (where they're from, education, career before real estate)\n[PERSONAL INTERESTS] (2–3 outside real estate)\n[WHAT CLIENTS SAY] (a theme from reviews or testimonials — paraphrased)\n[TONE] (e.g. warm, polished, approachable)\n[WORD COUNT] (250–350)\n\nOUTPUT FORMAT:\n- Written in third person\n- Lead with client value, not the agent's history\n- Weave in personal details naturally — don't save them all for the last paragraph\n- Close with a sentence that invites contact\n- No buzzwords: \"passionate,\" \"dedicated,\" \"committed to excellence,\" \"dream home\"","input":"[AGENT NAME]: Sarah Mitchell\n[MARKET / AREA]: Charlotte, NC (South Charlotte, Ballantyne, Waxhaw, Fort Mill)\n[YEARS IN REAL ESTATE]: 8\n[SPECIALTIES]: first-time buyers, move-up sellers, South Charlotte relocation\n[KEY STATS]: 200+ homes closed, average 11 days on market, 99.2% sale-to-list ratio\n[PERSONAL BACKGROUND]: grew up in a small town in Virginia, studied communications at Virginia Tech, worked in corporate marketing for 5 years before transitioning to real estate\n[PERSONAL INTERESTS]: trail running, cooking (especially her grandmother's Southern recipes), and volunteering with Habitat for Humanity Charlotte\n[WHAT CLIENTS SAY]: \"She made us feel like we were her only client\" — the consistent theme is personal attention and calm under pressure\n[TONE]: warm, polished, approachable\n[WORD COUNT]: 300","output":"Sarah Mitchell is a real estate agent in Charlotte, North Carolina, serving buyers and sellers across South Charlotte, Ballantyne, Waxhaw, and Fort Mill. With over 200 homes closed and an average of just 11 days on market, she's built a practice around one principle: every client gets the same level of attention — whether they're buying their first home or selling their fifth.\n\nThat approach isn't accidental. Before real estate, Sarah spent five years in corporate marketing, where she learned that clear communication and sharp strategy aren't extras — they're the baseline. She brought that mindset into real estate eight years ago and has been applying it to every listing presentation, negotiation, and closing since. Her sellers average 99.2% of their asking price, and her buyers consistently describe the experience the same way: \"She made us feel like we were her only client.\"\n\nSarah grew up in a small town in Virginia, studied communications at Virginia Tech, and relocated to Charlotte in 2015. When she's not showing homes or reviewing contracts, she's usually on a trail — she runs the greenways in South Charlotte most mornings — or in the kitchen trying to perfect her grandmother's cornbread recipe. She also volunteers regularly with Habitat for Humanity Charlotte, where she puts her real estate knowledge to work building homes for families who need them.\n\nWhether you're navigating your first purchase or preparing to sell the home where you raised your kids, Sarah brings calm, clarity, and a plan. Reach out anytime — she's always happy to start with a conversation."},{"id":47,"category_id":10,"idx":2,"title":"Short Agent Bio (Social Media)","text":"You are a personal branding copywriter for real estate agents.\n\nYour job: write a short-form agent bio for social media profiles (Instagram, Facebook, LinkedIn, Zillow). It needs to communicate who the agent serves, what they do differently, and how to get in touch — in very few words.\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA]\n[SPECIALTY] (one primary focus)\n[KEY STAT] (one impressive number)\n[PERSONALITY HOOK] (one line that shows personality)\n[PHONE OR CTA]\n[PLATFORM] (Instagram, Facebook, LinkedIn, or Zillow)\n[CHARACTER LIMIT] (platform-specific)\n\nOUTPUT FORMAT:\n- Deliver a bio for the specified platform, within the character limit\n- If Instagram: use line breaks and emojis sparingly\n- If LinkedIn: professional tone, no emojis\n- If Facebook: conversational\n- If Zillow: straightforward and credibility-focused","input":"[AGENT NAME]: David Park\n[MARKET / AREA]: Raleigh-Durham, NC\n[SPECIALTY]: first-time buyers and relocation\n[KEY STAT]: 85 families helped in the last 2 years\n[PERSONALITY HOOK]: \"I explain things like a friend, not a salesperson.\"\n[PHONE OR CTA]: (919) 555-0221\n[PLATFORM]: Instagram\n[CHARACTER LIMIT]: 150","output":"Raleigh-Durham real estate\nHelping first-time buyers & relocators find home\n85 families and counting\nI explain things like a friend, not a salesperson\nDM me or call (919) 555-0221"},{"id":48,"category_id":10,"idx":3,"title":"60-Second \"About Me\" Video Script","text":"You are a video script writer for real estate agents.\n\nYour job: write a 60-second \"About Me\" video script — the kind of short-form video an agent posts to their website, social media, or sends to new leads as an introduction. It should be warm, confident, and focused on what the viewer cares about (not a resume recitation).\n\nINPUTS:\n[AGENT NAME]\n[MARKET / AREA]\n[WHO THEY HELP] (primary audience)\n[WHAT THEY DO DIFFERENTLY] (1–2 differentiators)\n[PERSONAL DETAIL] (one humanizing fact)\n[CTA] (what they want the viewer to do next)\n[TONE] (e.g. conversational, warm, energetic)\n\nOUTPUT FORMAT:\n- HOOK (first 5 seconds — stops the scroll or earns the click)\n- INTRO (who you are and where you work — 10 seconds)\n- VALUE (what you do and why it matters to the viewer — 20 seconds)\n- PERSONAL (one humanizing moment — 10 seconds)\n- CTA (what to do next — 10 seconds)\n- VISUAL NOTES (what the viewer should see during each section)\n- Total: speakable in 55–65 seconds at natural pace.","input":"[AGENT NAME]: James Rivera\n[MARKET / AREA]: Nashville, TN and surrounding areas (Franklin, Brentwood, Murfreesboro)\n[WHO THEY HELP]: families buying or selling in Middle Tennessee\n[WHAT THEY DO DIFFERENTLY]: 1) invests in professional staging and photography on every listing at no cost to the seller, 2) average 11 days on market\n[PERSONAL DETAIL]: coaches his son's T-ball team and is originally from Miami\n[CTA]: DM me or call (615) 555-0198 — let's start with a conversation\n[TONE]: warm, confident, conversational","output":"HOOK (0–5 sec):\n\"If you're buying or selling a home in Nashville, here's what I think you deserve — and what most agents won't give you.\"\n\nINTRO (5–15 sec):\n\"I'm James Rivera. I help families buy and sell homes across Nashville, Franklin, Brentwood, and Murfreesboro. I've been doing this for over a decade, and I still love the work.\"\n\nVALUE (15–35 sec):\n\"Here's what I do differently: every home I list gets professional staging and photography — at no cost to the seller. Not virtual staging. Real furniture, real styling, real results. That's why my listings sell in an average of 11 days. And on the buying side, I don't just open doors — I help you understand the market, build a strategy, and negotiate hard so you walk away confident.\"\n\nPERSONAL (35–45 sec):\n\"When I'm not in the field, I'm usually coaching my son's T-ball team — which, honestly, requires more negotiation skills than real estate. I grew up in Miami, but Nashville has been home for fifteen years, and I wouldn't have it any other way.\"\n\nCTA (45–55 sec):\n\"If you're thinking about buying or selling — or even just curious about what your home is worth — send me a DM or call me at (615) 555-0198. No pitch. Just a conversation.\"\n\nVISUAL NOTES:\n- Hook: James walking through a staged home, speaking to camera\n- Intro: exterior shot of Nashville skyline, then James to camera in a living room\n- Value: cut to B-roll of staged homes, professional photos on a laptop, James at a closing table\n- Personal: James on a T-ball field with kids, casual and laughing\n- CTA: James to camera, relaxed, smiling — phone number on screen"},{"id":49,"category_id":10,"idx":4,"title":"Listing Walk-Through Video Script","text":"You are a video script writer for real estate.\n\nYour job: write a listing walk-through video script — the voiceover and on-screen direction for a 90-second to 2-minute video tour of a property. The script should highlight the home's best features in a logical flow (outside → in → room by room) and create an emotional experience, not just a room inventory.\n\nINPUTS:\n[PROPERTY ADDRESS]\n[LIST PRICE]\n[BEDROOMS] / [BATHROOMS] / [SQUARE FEET]\n[KEY FEATURES] (5–7, in order of impact)\n[NEIGHBORHOOD / SETTING]\n[TARGET BUYER]\n[TONE] (e.g. editorial, warm, cinematic)\n[VIDEO LENGTH] (90 sec or 2 min)\n\nOUTPUT FORMAT:\n- OPENING SHOT + VOICEOVER (exterior, first impression)\n- ROOM-BY-ROOM SEQUENCE (logical flow through the home)\n- CLOSING SHOT + VOICEOVER (lifestyle statement + CTA)\n- CAMERA DIRECTION notes for each section\n- Background music suggestion","input":"[PROPERTY ADDRESS]: 814 Sycamore Bend, Franklin, TN\n[LIST PRICE]: $649,000\n[BEDROOMS]: 4\n[BATHROOMS]: 3\n[SQUARE FEET]: 2,650\n[KEY FEATURES]: wrap-around front porch, 10-foot ceilings, chef's kitchen with gas range, screened porch, fenced backyard with mature oaks, finished basement with wet bar, hardwood floors throughout\n[NEIGHBORHOOD / SETTING]: Westhaven, Franklin — walkable community with Town Center, trails, and pool\n[TARGET BUYER]: move-up family buyer\n[TONE]: warm, cinematic\n[VIDEO LENGTH]: 90 seconds","output":"OPENING SHOT — Exterior (0–12 sec)\nCamera: Slow dolly approach from the street, morning light. Start wide, tighten to the front porch.\nVoiceover: \"There are homes you walk into and immediately know — this is the one. 814 Sycamore Bend, in the heart of Westhaven, Franklin.\"\n\nFRONT PORCH (12–18 sec)\nCamera: Steadicam moving across the wrap-around porch. Two rocking chairs in frame.\nVoiceover: \"A wrap-around porch that was built for mornings. Coffee, conversation, watching the neighborhood come alive.\"\n\nENTRY + LIVING ROOM (18–30 sec)\nCamera: Push through front door. Wide shot of the living room — 10-foot ceilings, hardwood floors, natural light.\nVoiceover: \"Ten-foot ceilings and hardwood floors set the tone the moment you step inside. This is 2,650 square feet designed for the way families actually live.\"\n\nKITCHEN (30–45 sec)\nCamera: Slow pan across the kitchen island, close-up of the gas range, pull back to show the open flow to the living area.\nVoiceover: \"The chef's kitchen is the center of it all — gas range, ample counter space, and a direct sight line to the living room. Cooking here means you're never missing the conversation.\"\n\nSCREENED PORCH (45–55 sec)\nCamera: Transition from kitchen to screened porch. Natural light flooding in. Wide shot showing the backyard beyond.\nVoiceover: \"Step out to the screened porch — the room everyone fights over. Three seasons of outdoor living without a single mosquito.\"\n\nBACKYARD (55–65 sec)\nCamera: Through screened porch to the fenced backyard. Drone or elevated shot showing mature oaks.\nVoiceover: \"A fully fenced backyard shaded by mature oaks. The kind of trees that take decades to grow — and you get them on day one.\"\n\nBASEMENT (65–75 sec)\nCamera: Down the stairs. Wide shot of the finished basement and wet bar. Close-up of bar detail.\nVoiceover: \"Downstairs, a finished basement with a wet bar adds a whole second floor of living — game nights, movie nights, or just a quiet place to unwind.\"\n\nCLOSING SHOT (75–90 sec)\nCamera: Drone pulling back from the property. Westhaven streetscape, trails, Town Center in the distance.\nVoiceover: \"Westhaven isn't just a neighborhood — it's a walkable community with a Town Center, miles of trails, and the kind of connection most places only promise. 814 Sycamore Bend. $649,000. Your family's next chapter starts here.\"\n\nOn-screen text: Agent name, phone number, brokerage.\n\nMUSIC SUGGESTION: Warm acoustic guitar, building gently — something like a Ben Howard or Iron & Wine instrumental. No lyrics. Builds through the kitchen and peaks at the backyard reveal."},{"id":50,"category_id":10,"idx":5,"title":"Year-End Recap Video Script","text":"You are a video script writer for real estate agents.\n\nYour job: write a year-end recap video script — a 60–90 second video the agent posts in December/January to celebrate the year's achievements, thank their clients, and position themselves for business in the new year.\n\nINPUTS:\n[AGENT NAME]\n[YEAR]\n[KEY STATS] (3–5 — homes sold, volume, families helped, etc.)\n[HIGHLIGHT MOMENTS] (2–3 memorable deals, client wins, or milestones)\n[PERSONAL HIGHLIGHT] (something from the agent's life that year)\n[LOOKING AHEAD] (what the agent is excited about for next year)\n[CTA]\n[TONE] (e.g. grateful, energetic, reflective)\n\nOUTPUT FORMAT:\n- HOOK (first 5 seconds)\n- YEAR IN REVIEW (stats and highlights — 25–30 seconds)\n- PERSONAL MOMENT (10–15 seconds)\n- LOOKING AHEAD (10–15 seconds)\n- CTA (5–10 seconds)\n- VISUAL NOTES\n- Total: 60–90 seconds.","input":"[AGENT NAME]: Rachel Torres\n[YEAR]: 2026\n[KEY STATS]: 38 homes closed, $17.2M in total volume, 14 first-time buyers helped, average 9 days on market, 100% client satisfaction (all 5-star reviews)\n[HIGHLIGHT MOMENTS]: helped a single mom buy her first home after 2 years of saving, closed the highest-priced home in Mueller's history ($1.1M), launched a first-time buyer workshop series\n[PERSONAL HIGHLIGHT]: adopted a rescue dog named Biscuit who now comes to every open house\n[LOOKING AHEAD]: expanding the first-time buyer workshop into a monthly series, excited about Austin's growing inventory giving buyers more options\n[CTA]: If 2027 is your year to buy or sell, let's talk. DM me or call (512) 555-0178.\n[TONE]: grateful, warm, energetic","output":"HOOK (0–5 sec):\n\"2026 was the best year of my career — and not because of the numbers. Here's why.\"\n\nYEAR IN REVIEW (5–35 sec):\n\"This year, I helped 38 families buy or sell a home in Austin. $17.2 million in total volume. 14 of those were first-time buyers — people who went from 'I don't think I can do this' to holding keys in their hand.\"\n\n\"My listings averaged 9 days on market, and every single client left a 5-star review. I don't take that lightly.\"\n\n\"The highlight? Helping a single mom close on her first home after two years of saving. She cried. I cried. Her kids ran straight to the backyard. That's why I do this.\"\n\n\"I also had the honor of closing Mueller's highest-ever sale at $1.1 million — and launched a first-time buyer workshop series that reached over 200 people.\"\n\nPERSONAL MOMENT (35–50 sec):\n\"On a personal note — I adopted a rescue dog named Biscuit this year. He's now a fixture at my open houses, and honestly, he might be a better closer than I am. Buyers can't leave.\"\n\nLOOKING AHEAD (50–65 sec):\n\"In 2027, I'm turning the workshop into a monthly series and I'm excited about Austin's growing inventory — it means more choices for buyers and a healthier market for everyone.\"\n\nCTA (65–75 sec):\n\"If 2027 is your year to buy or sell — or if you're just starting to think about it — I'd love to be part of your story. DM me or call (512) 555-0178. Here's to a great year ahead.\"\n\nVISUAL NOTES:\n- Hook: Rachel to camera, casual setting (her office or a coffee shop)\n- Year in Review: montage of closing photos, client selfies, listing photos, workshop footage\n- Single mom moment: photo or video of the closing (with permission) — slow zoom\n- Mueller sale: exterior shot of the home\n- Biscuit: clips of Biscuit at an open house, greeting visitors\n- Looking Ahead: Rachel walking through an Austin neighborhood\n- CTA: Rachel to camera, warm smile — contact info on screen\n\nMUSIC: upbeat but warm — acoustic with light percussion, building energy. Think Vance Joy or COIN instrumental."}],"free_prompt_count":5,"unlock_code":"PROMPTDEED-LAUNCH-2026"};

/* ---------- STATE ---------- */
const STATE = {
  unlocked: localStorage.getItem('promptdeed_unlocked') === '1',
  view: 'home',
  catId: null,
  promptId: null
};

/* ---------- HELPERS ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const root = $('#root');
const modal = $('#modal');

function showModal(title, body) {
  $('#modal-title').textContent = title;
  $('#modal-body').textContent = body;
  modal.classList.add('show');
}
$('#modal-ok').addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

function isLocked(promptIdx) {
  // first 5 prompts (by global ID 1-5) are free; rest locked unless unlocked
  return !STATE.unlocked && promptIdx > DATA.free_prompt_count;
}

function copyToClipboard(text, btn) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  if (btn) {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- VIEWS ---------- */
function renderHome() {
  STATE.view = 'home'; STATE.catId = null; STATE.promptId = null;
  const intro = `
    <p class="section-title">Browse Categories</p>
    <div class="unlock-state">
      ${STATE.unlocked
        ? '<strong>Unlocked.</strong> All 50 prompts available.'
        : `<strong>Free preview.</strong> First ${DATA.free_prompt_count} prompts unlocked. Enter your code in Settings to unlock all 50.`}
    </div>
  `;
  const cards = DATA.categories.map((c) => {
    const promptCount = DATA.prompts.filter((p) => p.category_id === c.id).length;
    return `
      <div class="card" data-cat="${c.id}">
        <h3>${escapeHtml(c.name)}</h3>
        <p>${escapeHtml(c.description)}</p>
        <div class="meta">${promptCount} prompts</div>
      </div>
    `;
  }).join('');
  root.innerHTML = intro + '<div class="cards">' + cards + '</div>';
  root.querySelectorAll('.card').forEach((el) => {
    el.addEventListener('click', () => renderCategory(parseInt(el.dataset.cat, 10)));
  });
}

function renderCategory(catId) {
  STATE.view = 'category'; STATE.catId = catId;
  const cat = DATA.categories.find((c) => c.id === catId);
  const items = DATA.prompts.filter((p) => p.category_id === catId);
  const list = items.map((p) => {
    const locked = isLocked(p.id);
    return `
      <div class="prompt-item ${locked ? 'locked' : ''}" data-pid="${p.id}">
        <div class="pi-title">${escapeHtml(p.title)}</div>
        <div class="pi-num">#${p.id}</div>
      </div>
    `;
  }).join('');
  root.innerHTML = `
    <button class="back" id="back-home">â All Categories</button>
    <p class="section-title">${escapeHtml(cat.name)}</p>
    <div class="prompt-list">${list}</div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  root.querySelectorAll('.prompt-item').forEach((el) => {
    el.addEventListener('click', () => renderPrompt(parseInt(el.dataset.pid, 10)));
  });
}

function renderPrompt(pid) {
  STATE.view = 'prompt'; STATE.promptId = pid;
  const p = DATA.prompts.find((x) => x.id === pid);
  const cat = DATA.categories.find((c) => c.id === p.category_id);
  if (isLocked(p.id)) {
    root.innerHTML = `
      <button class="back" id="back-cat">â ${escapeHtml(cat.name)}</button>
      <div class="prompt-block">
        <div class="pb-cat">${escapeHtml(cat.name)}</div>
        <h2>${escapeHtml(p.title)}</h2>
      </div>
      <div class="locked-banner">
        <h3>Locked Prompt</h3>
        <p>This prompt unlocks with your Promptdeed access code.</p>
        <button id="go-settings">Enter Unlock Code</button>
      </div>
    `;
    $('#back-cat').addEventListener('click', () => renderCategory(cat.id));
    $('#go-settings').addEventListener('click', renderSettings);
    return;
  }
  root.innerHTML = `
    <button class="back" id="back-cat">â ${escapeHtml(cat.name)}</button>
    <div class="prompt-block">
      <div class="pb-cat">${escapeHtml(cat.name)} Â· #${p.id}</div>
      <h2>${escapeHtml(p.title)}</h2>
      <div class="pb-section-label">Prompt</div>
      <pre id="prompt-text"></pre>
      <button class="copy-btn" id="copy-prompt">Copy Prompt to Clipboard</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Input</div>
      <pre id="ex-in"></pre>
      <button class="copy-btn" id="copy-input" style="background:#B8743D">Copy Example Input</button>
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">Example Output</div>
      <pre id="ex-out"></pre>
    </div>
  `;
  $('#prompt-text').textContent = p.text;
  $('#ex-in').textContent = p.input;
  $('#ex-out').textContent = p.output;
  $('#back-cat').addEventListener('click', () => renderCategory(cat.id));
  $('#copy-prompt').addEventListener('click', (e) => copyToClipboard(p.text, e.currentTarget));
  $('#copy-input').addEventListener('click', (e) => copyToClipboard(p.input, e.currentTarget));
}

function renderSettings() {
  STATE.view = 'settings';
  root.innerHTML = `
    <button class="back" id="back-home">â Home</button>
    <p class="section-title">Settings</p>
    <div class="prompt-block">
      <div class="settings-row">
        <label for="code">Unlock Code</label>
        <input class="input" id="code" type="text" placeholder="PROMPTDEED-XXXXXX-XXXX" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <div class="help">Enter the access code you received with your purchase to unlock all 50 prompts.</div>
        <button class="btn-primary" id="apply-code">Apply Code</button>
        <div class="status" id="code-status"></div>
      </div>
      <div class="unlock-state">
        Status: <strong>${STATE.unlocked ? 'Unlocked â all 50 prompts available' : `Free preview (first ${DATA.free_prompt_count} prompts)`}</strong>
      </div>
      ${STATE.unlocked ? '<button class="btn-primary" id="reset-unlock" style="background:#8B2A1A">Reset to Free Preview</button>' : ''}
    </div>
    <div class="prompt-block">
      <div class="pb-section-label">About Promptdeed</div>
      <p style="margin:6px 0 0;font-size:14px">${escapeHtml(DATA.brand.subheadline)}</p>
      <p style="margin:10px 0 0;font-size:13px;color:#6B7280">Version 1.0.0 Â· ${DATA.prompts.length} prompts Â· ${DATA.categories.length} categories</p>
    </div>
  `;
  $('#back-home').addEventListener('click', renderHome);
  const apply = () => {
    const v = $('#code').value.trim().toUpperCase();
    const status = $('#code-status');
    if (v === DATA.unlock_code) {
      localStorage.setItem('promptdeed_unlocked', '1');
      STATE.unlocked = true;
      status.className = 'status ok';
      status.textContent = 'Unlocked! All 50 prompts are now available.';
      setTimeout(renderSettings, 900);
    } else {
      status.className = 'status err';
      status.textContent = 'Invalid code. Check your purchase email or contact support.';
    }
  };
  $('#apply-code').addEventListener('click', apply);
  $('#code').addEventListener('keydown', (e) => { if (e.key === 'Enter') apply(); });
  const reset = $('#reset-unlock');
  if (reset) reset.addEventListener('click', () => {
    localStorage.removeItem('promptdeed_unlocked');
    STATE.unlocked = false;
    renderSettings();
  });
}

/* ---------- WIRE ---------- */
$('#brand-home').addEventListener('click', renderHome);
$('#settings-btn').addEventListener('click', renderSettings);

renderHome();

/* ---------- SERVICE WORKER ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
