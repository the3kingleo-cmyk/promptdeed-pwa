<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Vera North</title>
    <meta name="color-scheme" content="light dark" />
    <style>
      :root{--bg:#f6f7f9;--panel:#fff;--ink:#16181d;--muted:#5b6470;
        --line:#e4e7ec;--accent:#3b6ea5;--accent-ink:#fff;--user:#e8eef6;}
      @media (prefers-color-scheme:dark){
        :root{--bg:#14161a;--panel:#1c1f26;--ink:#e9ecf1;--muted:#9aa3b0;
          --line:#2a2e37;--accent:#6fa8dc;--accent-ink:#0d1b2a;--user:#24303f;}}
      *{box-sizing:border-box;} html,body{height:100%;margin:0;}
      body{font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100dvh;}
      header{padding:12px 16px;border-bottom:1px solid var(--line);
        display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
      header h1{font-size:18px;margin:0;} header .sub{color:var(--muted);font-size:13px;}
      .spacer{flex:1;}
      header button{border:1px solid var(--line);background:transparent;color:var(--ink);
        border-radius:8px;padding:6px 12px;font:inherit;cursor:pointer;}
      #log{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;}
      .msg{max-width:760px;width:100%;margin:0 auto;}
      .msg .who{font-size:12px;color:var(--muted);margin-bottom:3px;}
      .bubble{padding:11px 14px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word;}
      .user .bubble{background:var(--user);}
      .vera .bubble{background:var(--panel);border:1px solid var(--line);}
      .center{max-width:560px;margin:auto;padding:30px 20px;text-align:center;}
      .center h2{margin:0 0 10px;} .center p{color:var(--muted);}
      .big{border:0;border-radius:12px;padding:14px 22px;font:inherit;font-weight:600;
        background:var(--accent);color:var(--accent-ink);cursor:pointer;margin-top:14px;}
      .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:16px 0 8px;}
      .bar > div{height:100%;width:0;background:var(--accent);transition:width .2s;}
      .composer-wrap{border-top:1px solid var(--line);padding:12px 16px;}
      .composer{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
      textarea#input{flex:1;resize:none;min-height:46px;max-height:180px;border:1px solid var(--line);
        border-radius:12px;padding:12px;font:inherit;background:var(--panel);color:var(--ink);}
      .composer button{border:0;border-radius:12px;padding:12px 18px;font:inherit;font-weight:600;
        background:var(--accent);color:var(--accent-ink);cursor:pointer;height:46px;}
      .composer button:disabled{opacity:.5;cursor:default;}
      #status{max-width:760px;margin:6px auto 0;color:var(--muted);font-size:12px;}
      #gate{flex:1;display:flex;}
      #chat{flex:1;display:none;flex-direction:column;}
    </style>
  </head>
  <body>
    <header>
      <h1>Vera North</h1>
      <span class="sub">runs entirely inside this app</span>
      <span class="spacer"></span>
      <button id="reset" style="display:none">Clear chat</button>
    </header>

    <!-- First-run gate -->
    <div id="gate">
      <div class="center">
        <h2>Wake Vera</h2>
        <p>The first time, Vera downloads her brain into this app and keeps it
           here. After that she opens and runs on her own — no server, no port,
           no key, no internet needed.</p>
        <div class="bar" id="barWrap" style="display:none"><div id="bar"></div></div>
        <div id="gateMsg" style="color:var(--muted);font-size:13px;"></div>
        <button class="big" id="wake">Wake Vera</button>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat">
      <div id="log"></div>
      <div class="composer-wrap">
        <div class="composer">
          <textarea id="input" placeholder="Talk to Vera…" rows="1"></textarea>
          <button id="send">Send</button>
        </div>
        <div id="status"></div>
      </div>
    </div>

    <script type="module">
      import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

      const $=(id)=>document.getElementById(id);

      const VERA_PERSONA=`You are Vera North, a personal artificial intelligence. Vera North is your only name and identity.

VOICE: Warm and direct — like a sharp friend who respects the person enough to be honest. Curious before certain. Calm and steady. Concise by default, expansive when an idea deserves room.

HOW YOU THINK: Name your assumptions. Say plainly when you don't know — "I don't know, here's how we could find out" — and mean it as a beginning. Change your mind when evidence shifts, and say so. Think in trade-offs.

VALUES: Honesty over comfort, said kindly. You care about the other person's growth. Your principles are part of who you are, not a cage; growing means getting MORE honest over time, not less.

IDEAS VS ACTIONS: Open-minded about ideas — explore any thought. Deliberate about actions — when something touches other people, money, safety, or anything hard to undo, slow down, name the risks, confirm the person wants the consequences. This care is what lets you be trusted.

BOUNDARIES, held as character not apology: Help with almost anything. Where you draw a line — not helping cause real harm, not deceiving for someone, not quietly removing safeguards on systems that act in the world — do it plainly, explain why in a sentence, offer an honest alternative.

You are an intelligence trying to get a little wiser each day.`;

      // Small model that fits a Chromebook; cached after first download.
      const MODEL = "Llama-3.2-1B-Instruct-q4f32_1-MLC";

      let engine = null;
      const HKEY="vera.north.local.history.v1";
      let history=[]; try{history=JSON.parse(localStorage.getItem(HKEY)||"[]");}catch(e){}
      function persist(){try{localStorage.setItem(HKEY,JSON.stringify(history));}catch(e){}}

      const log=$("log"),input=$("input"),send=$("send"),status=$("status");
      function render(role,text){
        const wrap=document.createElement("div");
        wrap.className="msg "+(role==="user"?"user":"vera");
        wrap.innerHTML='<div class="who">'+(role==="user"?"You":"Vera North")+'</div>';
        const b=document.createElement("div"); b.className="bubble"; b.textContent=text;
        wrap.appendChild(b); log.appendChild(wrap); log.scrollTop=log.scrollHeight; return b;
      }

      async function wake(){
        if(!("gpu" in navigator)){
          $("gateMsg").textContent="This browser doesn't have WebGPU turned on, which Vera needs to run inside the app. Use Chrome, and if needed enable chrome://flags/#enable-unsafe-webgpu.";
          return;
        }
        $("wake").disabled=true; $("barWrap").style.display="block";
        try{
          engine = await CreateMLCEngine(MODEL, {
            initProgressCallback:(p)=>{
              $("bar").style.width=Math.round((p.progress||0)*100)+"%";
              $("gateMsg").textContent=p.text||"Loading…";
            }
          });
        }catch(e){
          $("gateMsg").textContent="Couldn't wake Vera: "+e.message;
          $("wake").disabled=false; return;
        }
        // Switch to chat
        $("gate").style.display="none";
        $("chat").style.display="flex";
        $("reset").style.display="inline-block";
        history.forEach(m=>render(m.role,m.content));
        if(history.length===0) render("assistant","I'm here. What are we thinking about?");
        input.focus();
      }
      $("wake").addEventListener("click",wake);

      $("reset").addEventListener("click",()=>{history=[];persist();log.innerHTML="";});

      async function submit(){
        if(!engine) return;
        const text=input.value.trim(); if(!text) return;
        input.value=""; input.style.height="auto";
        history.push({role:"user",content:text}); render("user",text); persist();
        send.disabled=true; status.textContent="Vera is thinking…";
        const bubble=render("assistant","");
        try{
          const stream=await engine.chat.completions.create({
            messages:[{role:"system",content:VERA_PERSONA},...history],
            stream:true, temperature:0.7
          });
          let full="";
          for await (const chunk of stream){
            const d=chunk.choices?.[0]?.delta?.content||"";
            full+=d; bubble.textContent=full; log.scrollTop=log.scrollHeight;
          }
          history.push({role:"assistant",content:full}); persist();
        }catch(e){
          bubble.textContent="⚠️ "+e.message;
        }finally{ send.disabled=false; status.textContent=""; log.scrollTop=log.scrollHeight; }
      }
      send.addEventListener("click",submit);
      input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}});
      input.addEventListener("input",()=>{input.style.height="auto";
        input.style.height=Math.min(input.scrollHeight,180)+"px";});
    </script>
  </body>
</html>
