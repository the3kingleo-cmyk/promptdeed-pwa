<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vera North</title>
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#0e1630" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{--bg:#0e1630;--panel:#16203a;--ink:#e9eefb;--muted:#9aa7c4;--line:#27324f;
    --accent:#4169e1;--accent2:#6f8bff;--ink-on:#fff;--user:#26345e;--vera:#1a2543;}
  *{box-sizing:border-box;} html,body{height:100%;margin:0;}
  body{font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;flex:none;}
  .mark svg{width:18px;height:18px;}
  header h1{font-size:18px;margin:0;}
  header .sub{font-size:12px;color:var(--muted);}
  main{flex:1;overflow-y:auto;padding:20px 14px;}
  .wrap{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
  .welcome{text-align:center;color:var(--muted);margin-top:6vh;}
  .welcome h2{color:var(--ink);font-size:24px;margin:0 0 6px;}
  .msg{display:flex;gap:10px;align-items:flex-start;}
  .msg.user{flex-direction:row-reverse;}
  .av{width:28px;height:28px;border-radius:7px;flex:none;display:grid;place-items:center;font-size:11px;font-weight:700;border:1px solid var(--line);}
  .user .av{background:var(--user);} .vera .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .bubble{padding:11px 14px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;}
  .user .bubble{background:var(--user);} .vera .bubble{background:var(--vera);border:1px solid var(--line);}
  footer{border-top:1px solid var(--line);padding:10px 14px;}
  #status{max-width:760px;margin:0 auto 6px;color:var(--muted);font-size:12px;min-height:15px;text-align:center;}
  .composer{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;}
  textarea{flex:1;background:transparent;border:0;outline:none;resize:none;color:var(--ink);font:inherit;max-height:150px;padding:7px;}
  .send{border:0;border-radius:10px;padding:10px 16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .send:disabled{opacity:.5;}
</style>
</head>
<body>
  <!-- Everything below is plain HTML and shows immediately — the screen is never blank. -->
  <header>
    <div class="mark"><svg viewBox="0 0 100 100"><path d="M26 24 L50 76 L74 24" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><h1>Vera North</h1><div class="sub" id="sub">starting…</div></div>
  </header>
  <main>
    <div class="wrap" id="log">
      <div class="welcome" id="welcome">
        <h2>Hey — I'm Vera North.</h2>
        <div>Your private assistant, running on this device.</div>
      </div>
    </div>
  </main>
  <footer>
    <div id="status">Waking up… first time takes a minute to download Vera's brain.</div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message Vera North…"></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>

<script type="module">
  const $=id=>document.getElementById(id);
  const log=$("log"), input=$("input"), send=$("send"), status=$("status"), sub=$("sub");
  const PERSONA="You are Vera North, a personal artificial intelligence. Vera North is your only name and identity. Warm, direct, honest, concise. You run privately on the user's own device.";
  let history = JSON.parse(localStorage.getItem("vn.hist")||"[]");
  let engine=null, ready=false, busy=false;

  function setStatus(t){ status.textContent=t||""; }
  function setSub(t){ sub.textContent=t; }
  function bubble(role,text){
    const w=$("welcome"); if(w) w.remove();
    const row=document.createElement("div"); row.className="msg "+(role==="user"?"user":"vera");
    row.innerHTML='<div class="av">'+(role==="user"?"You":"VN")+'</div><div class="bubble"></div>';
    row.querySelector(".bubble").textContent=text; log.appendChild(row);
    document.querySelector("main").scrollTop=document.querySelector("main").scrollHeight;
    return row.querySelector(".bubble");
  }
  history.forEach(m=>bubble(m.role,m.content));

  // Load the in-app model defensively — any failure shows a clear message, never a blank screen.
  (async ()=>{
    if(!("gpu" in navigator)){
      setSub("needs WebGPU"); setStatus("");
      bubble("vera","I can show my interface, but to actually think I need WebGPU, which this browser doesn't have turned on. On a computer use Chrome (and if needed enable chrome://flags/#enable-unsafe-webgpu). Many phones don't support it yet — your computer is the best bet.");
      send.disabled=false; return;
    }
    let CreateMLCEngine;
    try{
      ({ CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm"));
    }catch(e){
      setSub("offline?"); setStatus("");
      bubble("vera","I couldn't load my engine just now (network hiccup reaching the library). Reconnect and reopen me. Details: "+(e&&e.message?e.message:e));
      send.disabled=false; return;
    }
    try{
      setStatus("Downloading Vera's brain… (one time)");
      engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f32_1-MLC",{
        initProgressCallback:(p)=>{ const pct=Math.round((p.progress||0)*100); setStatus((p.text||"Loading…")+" "+pct+"%"); setSub("waking "+pct+"%"); }
      });
      ready=true; setStatus(""); setSub("ready · on this device");
    }catch(e){
      setSub("couldn't load"); setStatus("");
      bubble("vera","I got partway but couldn't finish loading my brain on this device — it may not have enough memory or GPU support. Your computer (Chrome) is the most reliable place to run me. Details: "+(e&&e.message?e.message:e));
    }
  })();

  async function submit(){
    const text=input.value.trim(); if(!text||busy) return;
    if(!ready){ setStatus("Vera is still waking up — one moment…"); return; }
    busy=true; input.value=""; input.style.height="auto";
    history.push({role:"user",content:text}); localStorage.setItem("vn.hist",JSON.stringify(history));
    bubble("user",text);
    const b=bubble("vera",""); setStatus("Vera is thinking…"); send.disabled=true;
    try{
      const stream=await engine.chat.completions.create({
        messages:[{role:"system",content:PERSONA},...history], stream:true, temperature:0.7 });
      let full="";
      for await(const c of stream){ full+=c.choices?.[0]?.delta?.content||""; b.textContent=full; document.querySelector("main").scrollTop=1e9; }
      history.push({role:"assistant",content:full}); localStorage.setItem("vn.hist",JSON.stringify(history));
    }catch(e){ b.textContent="⚠️ "+(e&&e.message?e.message:e); }
    setStatus(""); send.disabled=false; busy=false; input.focus();
  }
  send.onclick=submit;
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); submit(); }});
  input.addEventListener("input",()=>{ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,150)+"px"; });

  if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
