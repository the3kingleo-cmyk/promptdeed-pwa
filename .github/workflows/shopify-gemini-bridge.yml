name: Daily Shopify ↔ Gemini Bridge

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM EST (UTC-5) = 13:00 UTC, every day
  workflow_dispatch:        # manual trigger anytime

jobs:
  bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Shopify ↔ Gemini bridge
        working-directory: bridge
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional overrides (uncomment / set as secrets if you want):
          # GEMINI_MODEL: gemini-2.0-flash
          # SHOPIFY_API_VERSION: 2025-01
          # MAX_PRODUCTS: '25'
          # WRITE_BACK: 'false'
        run: node shopify-gemini-bridge.js

      - name: Commit results
        run: |
          git config user.name "bridge-bot"
          git config user.email "bridge-bot@users.noreply.github.com"
          git add bridge/output/
          git diff --staged --quiet || git commit -m "bridge: $(date +'%Y-%m-%d') Shopify ↔ Gemini update"
          git push
