name: Daily Home Depot Deals

on:
  workflow_dispatch:       # manual trigger only — no automatic schedule

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scraper
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        run: node homedepot.js

      - name: Commit results
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add deals/
          git diff --staged --quiet || git commit -m "deals: $(date +'%Y-%m-%d') Home Depot clearance update"
          git push
